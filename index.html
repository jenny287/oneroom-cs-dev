          {err && <div style={{marginTop:12,padding:'8px 10px',background:'rgba(255,107,107,.12)',border:'1px solid rgba(255,107,107,.4)',color:'#FF6B6B',borderRadius:6,fontSize:12}}>{err}</div>}
        </div>

        {/* 푸터 */}
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button onClick={()=>{if(!saving) onClose();}}
            style={{fontSize:13,padding:'8px 16px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:6,cursor:saving?'not-allowed':'pointer'}} disabled={saving}>취소</button>
          <button onClick={save} disabled={saving || !isValid}
            style={{fontSize:13,padding:'8px 16px',background:isValid?'rgba(246,173,9,.18)':'var(--bg)',border:'1px solid '+(isValid?'rgba(246,173,9,.5)':'var(--border)'),color:isValid?'#F6AD09':'var(--sub)',borderRadius:6,cursor:(saving||!isValid)?'not-allowed':'pointer',opacity:saving?0.6:1}}>
            {saving?'저장 중...':'등록'}
          </button>
        </div>
      </div>
    </div>
  );
}


// ─── RefundEditModal: 환불 요청 수정/삭제/처리 모달 ───────────
// props: row (수정 대상 refunds row), reasons, currentUserEmail, onClose, onSaved
// 상태별 동작:
//   환불 대기  → 모든 필드 수정 가능 + [삭제] + [2차 환불 완료 처리]
//   후처리 대기 → 모든 필드 수정 가능 + [삭제] + [3차 카페24+젠데스크 정리]
//   완료      → 읽기 전용 + [삭제]만 (보존이 안전)
function RefundEditModal({ row, reasons, currentUserEmail, onClose, onSaved }){
  // 행의 현재 상태 판정
  const stKey = refundStatusOf(row).key;  // 'pending2' | 'pending3' | 'done'
  const isReadOnly = stKey==='done';

  // 폼 state - row 값으로 초기화
  const [reasonId,    setReasonId]    = useState(String(row.reason_id||''));
  const [refundAmount,setRefundAmount]= useState(row.refund_amount ? Number(row.refund_amount).toLocaleString() : '');
  const [orderId,     setOrderId]     = useState(row.order_id||'');
  const [bankName,    setBankName]    = useState(row.bank_name||'');
  const [bankQuery,   setBankQuery]   = useState('');
  const [bankOpen,    setBankOpen]    = useState(false);
  const [bankHoverIdx,setBankHoverIdx]= useState(0);
  const [accountNumber,setAccountNumber]=useState(row.account_number||'');
  const [accountHolder,setAccountHolder]=useState(row.account_holder||'');
  const [pgInfo,      setPgInfo]      = useState(row.pg_info||'수기 송금');
  const [customerName,setCustomerName]= useState(row.customer_name||'');
  const [customerPhone,setCustomerPhone]=useState(row.customer_phone||'');
  const [productName, setProductName] = useState(row.product_name||'');
  const [supplierName,setSupplierName]= useState(row.supplier_name||'');
  const [notes,       setNotes]       = useState(row.notes||'');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  // 필수 입력 체크
  const isValid = reasonId && refundAmount && orderId && bankName && accountNumber && accountHolder && pgInfo;

  // 공통 update 호출 (수정 / 2차 처리 / 3차 처리 / 삭제)
  // action: 'save' | 'mark_refund_complete' | 'mark_cafe24_done' | 'delete'
  const performAction = async (action)=>{
    if(action==='save' && !isValid){
      setErr('필수 항목(*)을 모두 입력해주세요.');
      return;
    }
    if(action==='delete'){
      if(!confirm('이 환불 요청을 삭제하시겠습니까?\n삭제된 데이터는 복구할 수 없습니다.')) return;
    }
    if(action==='revert_to_pending2'){
      if(!confirm('환불 완료 상태를 해제하고 환불 대기로 되돌리시겠습니까?\n이미 송금된 건일 수 있습니다. 실제로 송금이 취소되었거나 잘못 처리한 경우에만 사용하세요.')) return;
    }
    setSaving(true);
    setErr('');
    let result;
    if(action==='delete'){
      result = await sb.from('refunds').delete().eq('id', row.id);
    } else {
      // save: 폼 필드 전체 업데이트
      // mark_refund_complete: refund_completed=true + _at/_by + (폼 변경분도 같이)
      // mark_cafe24_done:     cafe24_done=true + _at/_by + (폼 변경분도 같이)
      // revert_to_pending2:   refund_completed=false + _at/_by NULL (환불 대기로 원복)
      const amt = parseInt(String(refundAmount).replace(/[^\d]/g,''),10);
      if(isNaN(amt) || amt<0){ setSaving(false); setErr('금액은 0 이상의 숫자여야 합니다.'); return; }
      const updatePayload = {
        reason_id:      parseInt(reasonId,10),
        refund_amount:  amt,
        order_id:       orderId.trim(),
        bank_name:      bankName,
        account_number: accountNumber.trim(),
        account_holder: accountHolder.trim(),
        pg_info:        pgInfo,
        customer_name:  customerName.trim() || null,
        customer_phone: customerPhone.trim() || null,
        product_name:   productName.trim()  || null,
        supplier_name:  supplierName.trim() || null,
        notes:          notes.trim()        || null,
        updated_by:     currentUserEmail || 'unknown',
      };
      if(action==='mark_refund_complete'){
        updatePayload.refund_completed = true;
        updatePayload.refund_completed_at = new Date().toISOString();
        updatePayload.refund_completed_by = currentUserEmail || 'unknown';
      }
      if(action==='mark_cafe24_done'){
        updatePayload.cafe24_done = true;
        updatePayload.cafe24_done_at = new Date().toISOString();
        updatePayload.cafe24_done_by = currentUserEmail || 'unknown';
      }
      if(action==='revert_to_pending2'){
        // 환불 완료 처리 해제: 상태 + 처리 시각/처리자를 모두 NULL로 (이력 박스에서도 사라짐)
        updatePayload.refund_completed = false;
        updatePayload.refund_completed_at = null;
        updatePayload.refund_completed_by = null;
      }
      result = await sb.from('refunds').update(updatePayload).eq('id', row.id);
    }
    setSaving(false);
    if(result.error){ setErr('처리 실패: '+result.error.message); return; }
    onSaved();
  };

  // 입력 스타일 (읽기전용 분기 포함)
  const inp = (extra={})=>({
    width:'100%',fontSize:13,padding:'8px 10px',
    background: isReadOnly?'var(--surface)':'var(--bg)',
    border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,fontFamily:'inherit',boxSizing:'border-box',
    ...(isReadOnly?{cursor:'not-allowed',opacity:0.7}:{}),
    ...extra
  });
  const lbl = {fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:500};

  // 시간 포맷
  const fmtDateTime = (iso)=>{
    if(!iso) return '-';
    const d = new Date(iso);
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  // 상태 배지 색상
  const stColor = refundStatusOf(row);

  return (
    <div onMouseDown={e=>{if(e.target===e.currentTarget && !saving) onClose();}}
      style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:1900,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:'100%',maxWidth:580,maxHeight:'90vh',display:'flex',flexDirection:'column',border:'1px solid var(--border)'}}>
        {/* 헤더 */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>환불 요청 {isReadOnly?'상세':'수정'}</div>
            <span style={{background:stColor.bg,color:stColor.fg,padding:'3px 8px',borderRadius:4,fontSize:11}}>{stColor.label}</span>
          </div>
          <button onClick={()=>{if(!saving) onClose();}} style={{background:'transparent',border:'none',fontSize:18,color:'var(--sub)',cursor:'pointer'}}>✕</button>
        </div>

        {/* 본문 */}
        <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>
          {/* 주문번호 */}
          <div style={lbl}>주문번호 *</div>
          <input type="text" value={orderId} onChange={e=>setOrderId(e.target.value)}
            disabled={isReadOnly} placeholder="예: 20260525-0009306-01" style={inp({fontFamily:'monospace'})}/>
          <div style={{marginBottom:14}}/>

          {/* 사유 + 금액 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <div style={lbl}>환불 사유 *</div>
              <select value={reasonId} onChange={e=>setReasonId(e.target.value)} disabled={isReadOnly} style={inp()}>
                <option value="">선택...</option>
                {reasons.filter(r=>r.is_active || String(r.id)===String(reasonId)).map(r=>(<option key={r.id} value={r.id}>{r.name}{!r.is_active?' (비활성)':''}</option>))}
              </select>
            </div>
            <div>
              <div style={lbl}>환불 금액 *</div>
              <input type="text" value={refundAmount}
                onChange={e=>{
                  const v = e.target.value.replace(/[^\d]/g,'');
                  setRefundAmount(v ? Number(v).toLocaleString() : '');
                }}
                disabled={isReadOnly} placeholder="₩" style={inp({textAlign:'right'})}/>
            </div>
          </div>

          {/* 고객 정보 */}
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:600,marginTop:8}}>고객 정보</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
            <input type="text" value={customerName} onChange={e=>setCustomerName(e.target.value)} disabled={isReadOnly} placeholder="주문자명" style={inp()}/>
            <input type="text" value={customerPhone} onChange={e=>setCustomerPhone(e.target.value)} disabled={isReadOnly} placeholder="휴대전화" style={inp()}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            <input type="text" value={productName} onChange={e=>setProductName(e.target.value)} disabled={isReadOnly} placeholder="상품명" style={inp()}/>
            <input type="text" value={supplierName} onChange={e=>setSupplierName(e.target.value)} disabled={isReadOnly} placeholder="공급사명" style={inp()}/>
          </div>

          {/* 송금 정보 */}
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:600}}>송금 정보 *</div>
          <div style={{display:'grid',gridTemplateColumns:'160px 1fr 110px',gap:8,marginBottom:14}}>
            {(()=>{
              const q = bankQuery.trim().toLowerCase();
              const matched = q ? REFUND_BANKS.filter(b=>b.toLowerCase().includes(q)) : REFUND_BANKS;
              const safeIdx = matched.length>0 ? Math.min(bankHoverIdx, matched.length-1) : 0;
              return (
              <div style={{position:'relative'}}>
                <input type="text"
                  value={bankName || bankQuery}
                  onChange={e=>{
                    if(isReadOnly) return;
                    setBankName('');
                    setBankQuery(e.target.value);
                    setBankOpen(true);
                    setBankHoverIdx(0);
                  }}
                  onFocus={()=>{if(!isReadOnly) setBankOpen(true);}}
                  onBlur={()=>setTimeout(()=>setBankOpen(false),200)}
                  onKeyDown={e=>{
                    if(isReadOnly || !bankOpen) return;
                    if(e.key==='ArrowDown'){
                      e.preventDefault();
                      setBankHoverIdx(i => Math.min(i+1, matched.length-1));
                    } else if(e.key==='ArrowUp'){
                      e.preventDefault();
                      setBankHoverIdx(i => Math.max(i-1, 0));
                    } else if(e.key==='Enter'){
                      if(matched.length>0){
                        e.preventDefault();
                        const picked = matched[safeIdx];
                        setBankName(picked);
                        setBankQuery('');
                        setBankOpen(false);
                      }
                    } else if(e.key==='Escape'){
                      e.preventDefault();
                      setBankOpen(false);
                    }
                  }}
                  disabled={isReadOnly} placeholder="은행 검색" style={inp()}/>
                {bankName && !isReadOnly && (
                  <button type="button"
                    onClick={()=>{setBankName('');setBankQuery('');setBankHoverIdx(0);setBankOpen(true);}}
                    style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'transparent',border:'none',color:'var(--sub)',cursor:'pointer',fontSize:14,padding:0,lineHeight:1}}>✕</button>
                )}
                {bankOpen && !bankName && !isReadOnly && (
                  <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,maxHeight:220,overflowY:'auto',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>
                    {matched.length===0 ? <div style={{padding:'10px 12px',fontSize:12,color:'var(--sub)'}}>검색 결과 없음</div> :
                      matched.map((b,i)=>(
                        <div key={b}
                          ref={el=>{ if(el && i===safeIdx) el.scrollIntoView({block:'nearest'}); }}
                          onMouseDown={e=>{e.preventDefault(); setBankName(b); setBankQuery(''); setBankOpen(false);}}
                          onMouseEnter={()=>setBankHoverIdx(i)}
                          style={{padding:'8px 12px',fontSize:12,color:'var(--text)',cursor:'pointer',borderBottom:'1px solid var(--border)',background:i===safeIdx?'rgba(246,173,9,.12)':'transparent'}}>
                          {b}
                        </div>
                      ))
                    }
                  </div>
                )}
              </div>
              );
            })()}
            <input type="text" value={accountNumber} onChange={e=>setAccountNumber(e.target.value)} disabled={isReadOnly} placeholder="계좌번호" style={inp({fontFamily:'monospace'})}/>
            <input type="text" value={accountHolder} onChange={e=>setAccountHolder(e.target.value)} disabled={isReadOnly} placeholder="예금주" style={inp()}/>
          </div>

          {/* PG 정보 */}
          <div style={lbl}>PG 정보 *</div>
          <select value={pgInfo} onChange={e=>setPgInfo(e.target.value)} disabled={isReadOnly} style={inp({marginBottom:14})}>
            <option value="수기 송금">수기 송금</option>
          </select>

          {/* 특이사항 */}
          <div style={lbl}>특이사항</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} disabled={isReadOnly}
            placeholder="자유롭게 메모 입력"
            style={inp({minHeight:70,resize:'vertical',fontFamily:'inherit'})}/>

          {/* 이력 박스 */}
          <div style={{marginTop:16,padding:'10px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,fontSize:11,color:'var(--sub)',lineHeight:1.7}}>
            <div><b style={{color:'var(--text)'}}>등록</b>: {fmtDateTime(row.created_at)} · {row.created_by||'-'}</div>
            {row.updated_at && row.updated_at!==row.created_at && (
              <div><b style={{color:'var(--text)'}}>최종 수정</b>: {fmtDateTime(row.updated_at)} · {row.updated_by||'-'}</div>
            )}
            {row.refund_completed && (
              <div><b style={{color:'#F6AD09'}}>환불 완료(2차)</b>: {fmtDateTime(row.refund_completed_at)} · {row.refund_completed_by||'-'}</div>
            )}
            {row.cafe24_done && (
              <div><b style={{color:'#78AAFF'}}>후처리 완료(3차)</b>: {fmtDateTime(row.cafe24_done_at)} · {row.cafe24_done_by||'-'}</div>
            )}
          </div>

          {/* 에러 메시지 */}
          {err && <div style={{marginTop:12,padding:'8px 10px',background:'rgba(255,107,107,.12)',border:'1px solid rgba(255,107,107,.4)',color:'#FF6B6B',borderRadius:6,fontSize:12}}>{err}</div>}
        </div>

        {/* 푸터: 상태별 액션 버튼 */}
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {/* 좌측: 삭제 + (후처리 대기 상태일 때) 환불 대기로 원복 */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>performAction('delete')} disabled={saving}
              style={{fontSize:12,padding:'8px 14px',background:'transparent',border:'1px solid rgba(255,107,107,.4)',color:'#FF6B6B',borderRadius:6,cursor:saving?'not-allowed':'pointer'}}>
              🗑 삭제
            </button>
            {stKey==='pending3' && (
              <button onClick={()=>performAction('revert_to_pending2')} disabled={saving}
                style={{fontSize:12,padding:'8px 14px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:6,cursor:saving?'not-allowed':'pointer'}}
                title="환불 완료 상태 해제 → 환불 대기로 되돌림">
                ↺ 환불 대기로 원복
              </button>
            )}
          </div>
          {/* 우측: 닫기 + (상태별) 처리 액션 */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={()=>{if(!saving) onClose();}} disabled={saving}
              style={{fontSize:13,padding:'8px 14px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:6,cursor:saving?'not-allowed':'pointer'}}>닫기</button>
            {!isReadOnly && (
              <button onClick={()=>performAction('save')} disabled={saving || !isValid}
                style={{fontSize:13,padding:'8px 14px',background:isValid?'var(--bg)':'transparent',border:'1px solid var(--border)',color:isValid?'var(--text)':'var(--sub)',borderRadius:6,cursor:(saving||!isValid)?'not-allowed':'pointer'}}>
                {saving?'저장 중...':'수정 저장'}
              </button>
            )}
            {stKey==='pending2' && (
              <button onClick={()=>performAction('mark_refund_complete')} disabled={saving || !isValid}
                style={{fontSize:13,padding:'8px 14px',background:'rgba(246,173,9,.18)',border:'1px solid rgba(246,173,9,.5)',color:'#F6AD09',borderRadius:6,cursor:(saving||!isValid)?'not-allowed':'pointer',fontWeight:600}}>
                ✓ 환불 완료 처리
              </button>
            )}
            {stKey==='pending3' && (
              <button onClick={()=>performAction('mark_cafe24_done')} disabled={saving || !isValid}
                style={{fontSize:13,padding:'8px 14px',background:'rgba(120,170,255,.18)',border:'1px solid rgba(120,170,255,.5)',color:'#78AAFF',borderRadius:6,cursor:(saving||!isValid)?'not-allowed':'pointer',fontWeight:600}}>
                ✓ 후처리 완료
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── RefundReasonsModal: 환불 사유 마스터 관리 ───────────
// props: reasons (현재 사유 마스터 배열), refundsUsageMap ({reason_id: 사용 건수}), onClose, onSaved
// 저장 정책:
//   - 이름·색상·정렬 변경 → 모달 내부 state에 보관, [저장] 클릭 시 일괄 UPSERT
//   - 신규 추가 / 비활성화 / 재활성화 / 진짜 삭제 → 즉시 DB 반영 후 목록 새로고침
function RefundReasonsModal({ reasons: initialReasons, refundsUsageMap, onClose, onSaved }){
  // 모달 내부 작업용 로컬 복사본 (이름/색상/순서 편집은 여기에 누적)
  const [items,setItems] = useState(()=>initialReasons.map(r=>({...r})));
  const [newName,setNewName] = useState('');
  const [newColor,setNewColor] = useState('gray');
  const [saving,setSaving] = useState(false);
  const [err,setErr] = useState('');

  // 색상 옵션
  const COLOR_KEYS = ['purple','teal','coral','pink','gray','blue','green','amber','red'];

  // 활성/비활성 분리 + sort_order 순으로 정렬
  const active   = items.filter(r=>r.is_active).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const inactive = items.filter(r=>!r.is_active).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));

  // 활성 항목 안에서 한 행을 위/아래로 이동 (sort_order 재배치)
  const moveItem = (id, direction)=>{
    const idx = active.findIndex(r=>r.id===id);
    if(idx<0) return;
    const targetIdx = direction==='up' ? idx-1 : idx+1;
    if(targetIdx<0 || targetIdx>=active.length) return;
    // sort_order 두 항목 swap
    const a = active[idx];
    const b = active[targetIdx];
    setItems(prev=>prev.map(r=>{
      if(r.id===a.id) return {...r, sort_order:b.sort_order};
      if(r.id===b.id) return {...r, sort_order:a.sort_order};
      return r;
    }));
  };

  const updateField = (id, field, value)=>{
    setItems(prev=>prev.map(r=>r.id===id ? {...r, [field]:value} : r));
  };

  // 신규 추가 (즉시 DB 반영)
  const addNew = async ()=>{
    const name = newName.trim();
    if(!name){ setErr('사유 이름을 입력해주세요.'); return; }
    // 활성 상태에서 동명 사유 있는지 체크 (DB의 unique 인덱스로도 막히지만 사용자 친화적 메시지)
    if(items.some(r=>r.is_active && r.name===name)){
      setErr(`이미 활성화된 사유 "${name}"이(가) 있습니다.`);
      return;
    }
    setSaving(true);
    setErr('');
    // 새 sort_order는 활성 마지막 + 10
    const maxOrder = active.length>0 ? Math.max(...active.map(r=>r.sort_order||0)) : 0;
    const { data, error } = await sb.from('refund_reasons').insert({
      name, color:newColor, sort_order:maxOrder+10, is_active:true
    }).select().single();
    setSaving(false);
    if(error){ setErr('추가 실패: '+error.message); return; }
    setItems(prev=>[...prev, data]);
    setNewName('');
    setNewColor('gray');
  };

  // 비활성화 (즉시 DB 반영) - 사용 중인 사유는 비활성화만, 0건이면 진짜 삭제 옵션 제공
  const deactivate = async (item)=>{
    const usageCount = refundsUsageMap[item.id] || 0;
    if(usageCount===0){
      // 사용 0건 → 진짜 삭제 vs 비활성화 선택
      const reallyDelete = confirm(`"${item.name}"은(는) 사용된 적이 없습니다.\n\n[확인] = 완전 삭제 (목록에서 사라짐)\n[취소] = 작업 취소`);
      if(!reallyDelete) return;
      setSaving(true);
      const { error } = await sb.from('refund_reasons').delete().eq('id', item.id);
      setSaving(false);
      if(error){ setErr('삭제 실패: '+error.message); return; }
      setItems(prev=>prev.filter(r=>r.id!==item.id));
    } else {
      // 사용 1건 이상 → 비활성화만
      if(!confirm(`"${item.name}"은(는) ${usageCount}건의 환불 요청에서 사용 중입니다.\n비활성화하시겠습니까?\n(과거 데이터는 보존되며 드롭다운에서만 사라집니다)`)) return;
      setSaving(true);
      const { error } = await sb.from('refund_reasons').update({is_active:false}).eq('id', item.id);
      setSaving(false);
      if(error){ setErr('비활성화 실패: '+error.message); return; }
      setItems(prev=>prev.map(r=>r.id===item.id?{...r, is_active:false}:r));
    }
  };

  // 재활성화 (즉시 DB 반영)
  const reactivate = async (item)=>{
    // 동명 활성 사유가 있으면 충돌
    if(items.some(r=>r.is_active && r.name===item.name && r.id!==item.id)){
      setErr(`이미 활성화된 동명 사유 "${item.name}"이(가) 있습니다. 그 사유를 먼저 비활성화하거나 이름을 바꿔주세요.`);
      return;
    }
    setSaving(true);
    setErr('');
    const maxOrder = active.length>0 ? Math.max(...active.map(r=>r.sort_order||0)) : 0;
    const { error } = await sb.from('refund_reasons').update({is_active:true, sort_order:maxOrder+10}).eq('id', item.id);
    setSaving(false);
    if(error){ setErr('재활성화 실패: '+error.message); return; }
    setItems(prev=>prev.map(r=>r.id===item.id?{...r, is_active:true, sort_order:maxOrder+10}:r));
  };

  // 이름·색상·순서 변경분을 일괄 저장
  const saveChanges = async ()=>{
    // 빈 이름 검증
    const emptyName = items.find(r=>r.is_active && !String(r.name||'').trim());
    if(emptyName){ setErr('활성 사유 이름은 비울 수 없습니다.'); return; }
    // 활성 사유 안에서 동명 사유 충돌 검증
    const activeNames = items.filter(r=>r.is_active).map(r=>r.name.trim());
    const dupName = activeNames.find((n,i)=>activeNames.indexOf(n)!==i);
    if(dupName){ setErr(`활성 사유 중 중복 이름이 있습니다: "${dupName}"`); return; }
    // 변경된 행만 추려서 UPDATE (성능)
    const originalById = {};
    initialReasons.forEach(r=>{originalById[r.id]=r;});
    const changed = items.filter(r=>{
      const o = originalById[r.id];
      if(!o) return false;  // DB에 없는 항목 (방어, 정상엔 안 옴)
      return o.name!==r.name || o.color!==r.color || (o.sort_order||0)!==(r.sort_order||0);
    });
    if(changed.length===0){
      // 변경사항 없으면 그대로 닫기
      onSaved();
      return;
    }
    setSaving(true);
    setErr('');
    // Supabase는 batch update를 위해 upsert 사용 가능 (id 기준)
    const payload = changed.map(r=>({
      id: r.id,
      name: r.name.trim(),
      color: r.color,
      sort_order: r.sort_order,
      // is_active도 같이 (방어), updated_at은 trigger가 자동
      is_active: r.is_active,
    }));
    const { error } = await sb.from('refund_reasons').upsert(payload, {onConflict:'id'});
    setSaving(false);
    if(error){ setErr('저장 실패: '+error.message); return; }
    onSaved();
  };

  // 스타일
  const inp = {fontSize:12,padding:'7px 10px',background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:5,fontFamily:'inherit',boxSizing:'border-box'};
  const smallBtn = (color)=>({fontSize:11,padding:'5px 8px',background:'transparent',border:'1px solid var(--border)',color:color||'var(--sub)',borderRadius:4,cursor:'pointer',fontFamily:'inherit'});

  // 색상 미리보기 dot
  const colorDot = (c)=>(
    <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:(REFUND_COLOR_MAP[c]||REFUND_COLOR_MAP.gray).fg,marginRight:6,verticalAlign:'middle'}}/>
  );

  return (
    <div onMouseDown={e=>{if(e.target===e.currentTarget && !saving) onClose();}}
      style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:1900,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:'100%',maxWidth:680,maxHeight:'90vh',display:'flex',flexDirection:'column',border:'1px solid var(--border)'}}>
        {/* 헤더 */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>환불 사유 관리</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>활성 {active.length}개{inactive.length>0?` · 비활성 ${inactive.length}개`:''} · 드롭다운에는 활성만 노출</div>
          </div>
          <button onClick={()=>{if(!saving) onClose();}} style={{background:'transparent',border:'none',fontSize:18,color:'var(--sub)',cursor:'pointer'}}>✕</button>
        </div>

        {/* 본문 */}
        <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>
          {/* 활성 사유 목록 */}
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:8,fontWeight:600}}>활성 사유</div>
          {active.length===0 ? (
            <div style={{padding:'20px',textAlign:'center',color:'var(--sub)',fontSize:12,background:'var(--bg)',borderRadius:6}}>활성 사유가 없습니다.</div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
              {active.map((r,idx)=>{
                const usageCount = refundsUsageMap[r.id] || 0;
                const colorBadge = REFUND_COLOR_MAP[r.color] || REFUND_COLOR_MAP.gray;
                return (
                  <div key={r.id} style={{display:'flex',alignItems:'center',gap:6,padding:8,background:'var(--bg)',borderRadius:6,border:'1px solid var(--border)'}}>
                    {/* 순서 변경 */}
                    <div style={{display:'flex',flexDirection:'column',gap:1}}>
                      <button onClick={()=>moveItem(r.id,'up')} disabled={idx===0||saving}
                        style={{padding:'0 6px',fontSize:10,lineHeight:'14px',background:'transparent',border:'1px solid var(--border)',color:idx===0?'var(--border)':'var(--sub)',borderRadius:3,cursor:idx===0?'not-allowed':'pointer'}}>▲</button>
                      <button onClick={()=>moveItem(r.id,'down')} disabled={idx===active.length-1||saving}
                        style={{padding:'0 6px',fontSize:10,lineHeight:'14px',background:'transparent',border:'1px solid var(--border)',color:idx===active.length-1?'var(--border)':'var(--sub)',borderRadius:3,cursor:idx===active.length-1?'not-allowed':'pointer'}}>▼</button>
                    </div>
                    {/* 미리보기 뱃지 */}
                    <span style={{background:colorBadge.bg,color:colorBadge.fg,padding:'3px 8px',borderRadius:4,fontSize:11,minWidth:120,textAlign:'center',whiteSpace:'nowrap'}}>{r.name||'(이름 없음)'}</span>
                    {/* 이름 입력 */}
                    <input type="text" value={r.name||''} onChange={e=>updateField(r.id,'name',e.target.value)}
                      placeholder="사유 이름" style={{...inp,flex:1,minWidth:120}}/>
                    {/* 색상 선택 */}
                    <select value={r.color} onChange={e=>updateField(r.id,'color',e.target.value)} style={{...inp,width:90}}>
                      {COLOR_KEYS.map(c=>(<option key={c} value={c}>{c}</option>))}
                    </select>
                    {/* 사용 건수 */}
                    <span style={{fontSize:10,color:'var(--sub)',minWidth:48,textAlign:'right',whiteSpace:'nowrap'}}>{usageCount}건 사용</span>
                    {/* 비활성화/삭제 */}
                    <button onClick={()=>deactivate(r)} disabled={saving}
                      style={smallBtn(usageCount===0?'#FF6B6B':'var(--sub)')}
                      title={usageCount===0?'완전 삭제 가능 (사용 0건)':'비활성화 (과거 데이터 보존)'}>
                      {usageCount===0?'🗑 삭제':'비활성화'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}

          {/* 비활성 사유 목록 */}
          {inactive.length>0 && (
            <>
              <div style={{fontSize:11,color:'var(--sub)',marginBottom:8,marginTop:16,fontWeight:600}}>비활성 사유 (과거 데이터 보존용)</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
                {inactive.map(r=>{
                  const usageCount = refundsUsageMap[r.id] || 0;
                  return (
                    <div key={r.id} style={{display:'flex',alignItems:'center',gap:8,padding:8,background:'var(--bg)',borderRadius:6,border:'1px solid var(--border)',opacity:0.6}}>
                      <span style={refundColorStyle(r.color)}>{r.name}</span>
                      <span style={{fontSize:10,color:'var(--sub)',flex:1}}>{usageCount}건 사용</span>
                      <button onClick={()=>reactivate(r)} disabled={saving}
                        style={smallBtn('#7ED957')}>↺ 재활성화</button>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* 신규 추가 */}
          <div style={{marginTop:16,padding:12,background:'var(--bg)',border:'1px dashed var(--border)',borderRadius:6}}>
            <div style={{fontSize:11,color:'var(--sub)',marginBottom:8,fontWeight:600}}>새 사유 추가</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="text" value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter') addNew();}}
                placeholder="사유 이름" style={{...inp,flex:1}}/>
              <select value={newColor} onChange={e=>setNewColor(e.target.value)} style={{...inp,width:90}}>
                {COLOR_KEYS.map(c=>(<option key={c} value={c}>{c}</option>))}
              </select>
              <button onClick={addNew} disabled={saving||!newName.trim()}
                style={{fontSize:12,padding:'7px 14px',background:newName.trim()?'rgba(126,217,87,.18)':'transparent',border:'1px solid '+(newName.trim()?'rgba(126,217,87,.5)':'var(--border)'),color:newName.trim()?'#7ED957':'var(--sub)',borderRadius:5,cursor:(saving||!newName.trim())?'not-allowed':'pointer',fontWeight:600}}>+ 추가</button>
            </div>
          </div>

          {/* 안내 */}
          <div style={{marginTop:14,padding:'10px 12px',background:'rgba(120,170,255,.08)',borderRadius:6,fontSize:11,color:'#78AAFF',lineHeight:1.6}}>
            ℹ️ 이름·색상·순서 변경은 [저장] 클릭 시 일괄 반영됩니다.<br/>
            추가·비활성화·삭제·재활성화는 즉시 반영됩니다.<br/>
            사용 중인 사유는 삭제할 수 없고 비활성화만 가능합니다 (과거 데이터 보존).
          </div>

          {/* 에러 */}
          {err && <div style={{marginTop:12,padding:'8px 10px',background:'rgba(255,107,107,.12)',border:'1px solid rgba(255,107,107,.4)',color:'#FF6B6B',borderRadius:6,fontSize:12}}>{err}</div>}
        </div>

        {/* 푸터 */}
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button onClick={()=>{if(!saving) onClose();}} disabled={saving}
            style={{fontSize:13,padding:'8px 16px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:6,cursor:saving?'not-allowed':'pointer'}}>닫기</button>
          <button onClick={saveChanges} disabled={saving}
            style={{fontSize:13,padding:'8px 16px',background:'rgba(246,173,9,.18)',border:'1px solid rgba(246,173,9,.5)',color:'#F6AD09',borderRadius:6,cursor:saving?'not-allowed':'pointer',fontWeight:600}}>
            {saving?'저장 중...':'변경사항 저장'}
          </button>
        </div>
      </div>
    </div>
  );
}


// ─── RefundReportTab: 환불 Report 탭 (기간 설정 + 시각화) ───────────
// props: reasons (사유 마스터 배열, 색상/이름 표시용)
function RefundReportTab({ reasons }){
  // 로컬 시간 기준 YYYY-MM-DD 포맷 (toISOString의 UTC 변환 버그 회피)
  const fmtDate = (d)=>{
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  };
  const today = new Date();
  const daysAgo = (n)=>{ const d=new Date(); d.setDate(d.getDate()-n); return d; };

  // 기간 state (기본: 지난 30일)
  const [from,setFrom] = useState(fmtDate(daysAgo(30)));
  const [to,setTo]     = useState(fmtDate(today));
  const [metric,setMetric] = useState('count');   // 'count' | 'amount' — 사유/공급사/상품 차트 기준
  const [loading,setLoading] = useState(true);
  const [rows,setRows] = useState([]);

  // 빠른 기간 선택
  const applyQuick = (type)=>{
    const d = new Date();
    if(type==='7d'){ setFrom(fmtDate(daysAgo(7))); setTo(fmtDate(d)); }
    else if(type==='30d'){ setFrom(fmtDate(daysAgo(30))); setTo(fmtDate(d)); }
    else if(type==='this_month'){ setFrom(fmtDate(new Date(d.getFullYear(),d.getMonth(),1))); setTo(fmtDate(d)); }
    else if(type==='last_month'){
      const lm = new Date(d.getFullYear(),d.getMonth()-1,1);
      const lmEnd = new Date(d.getFullYear(),d.getMonth(),0);
      setFrom(fmtDate(lm)); setTo(fmtDate(lmEnd));
    }
  };

  // 데이터 로드 (기간 내 전체, 페이지네이션으로 안전하게)
  const load = async ()=>{
    setLoading(true);
    // created_at 기준 기간 필터. to는 그날 끝까지 포함
    const fromIso = from + 'T00:00:00';
    const toIso   = to   + 'T23:59:59';
    let all = [];
    let rangeFrom = 0;
    const PAGE = 1000;
    while(true){
      const { data, error } = await sb.from('refunds')
        .select('*')
        .gte('created_at', fromIso)
        .lte('created_at', toIso)
        .order('created_at',{ascending:true})
        .range(rangeFrom, rangeFrom+PAGE-1);
      if(error){ break; }
      all = all.concat(data||[]);
      if(!data || data.length<PAGE) break;
      rangeFrom += PAGE;
    }
    setRows(all);
    setLoading(false);
  };
  useEffect(()=>{ load(); }, [from, to]);

  // 사유 매핑
  const reasonById = {};
  reasons.forEach(r=>{ reasonById[r.id]=r; });

  // ── 집계 ──
  const totalCount = rows.length;
  const totalAmount = rows.reduce((s,r)=>s+(r.refund_amount||0),0);
  const avgAmount = totalCount>0 ? Math.round(totalAmount/totalCount) : 0;

  // 평균 처리 소요시간 (완료된 건만: created_at → cafe24_done_at)
  const doneRows = rows.filter(r=>r.cafe24_done && r.cafe24_done_at && r.created_at);
  const avgLeadMs = doneRows.length>0
    ? doneRows.reduce((s,r)=>s+(new Date(r.cafe24_done_at)-new Date(r.created_at)),0)/doneRows.length
    : null;
  const fmtDuration = (ms)=>{
    if(ms==null) return '—';
    const totalMin = Math.round(ms/60000);
    const days = Math.floor(totalMin/1440);
    const hours = Math.floor((totalMin%1440)/60);
    const mins = totalMin%60;
    if(days>0) return `${days}일 ${hours}시간`;
    if(hours>0) return `${hours}시간 ${mins}분`;
    return `${mins}분`;
  };

  // 값 선택 헬퍼 (metric에 따라 건수 or 금액)
  const valOf = (arr)=> metric==='count' ? arr.length : arr.reduce((s,r)=>s+(r.refund_amount||0),0);
  const fmtVal = (v)=> metric==='count' ? `${v}건` : KRW(v);

  // ① 일자별 추이 (건수 + 금액 2축)
  const byDate = {};
  rows.forEach(r=>{
    const d = String(r.created_at).slice(0,10);
    if(!byDate[d]) byDate[d]={count:0, amount:0};
    byDate[d].count += 1;
    byDate[d].amount += (r.refund_amount||0);
  });
  const dateLabels = Object.keys(byDate).sort();
  const dateCounts = dateLabels.map(d=>byDate[d].count);
  const dateAmounts = dateLabels.map(d=>byDate[d].amount);

  // ② 사유별 분포
  const byReason = {};
  rows.forEach(r=>{
    const key = r.reason_id || 'none';
    if(!byReason[key]) byReason[key]=[];
    byReason[key].push(r);
  });
  const reasonEntries = Object.entries(byReason)
    .map(([rid,arr])=>{
      const reason = reasonById[rid];
      return { rid, name: reason?reason.name:'(삭제된 사유)', color: reason?reason.color:'gray', value: valOf(arr), count:arr.length };
    })
    .sort((a,b)=>b.value-a.value);

  // ③ 공급사별 (상위 10)
  const bySupplier = {};
  rows.forEach(r=>{
    const key = r.supplier_name || '(미지정)';
    if(!bySupplier[key]) bySupplier[key]=[];
    bySupplier[key].push(r);
  });
  const supplierEntries = Object.entries(bySupplier)
    .map(([name,arr])=>({ name, value: valOf(arr), count:arr.length }))
    .sort((a,b)=>b.value-a.value).slice(0,10);

  // ④ 상품별 (상위 10)
  const byProduct = {};
  rows.forEach(r=>{
    const key = r.product_name || '(미지정)';
    if(!byProduct[key]) byProduct[key]=[];
    byProduct[key].push(r);
  });
  const productEntries = Object.entries(byProduct)
    .map(([name,arr])=>({ name, value: valOf(arr), count:arr.length }))
    .sort((a,b)=>b.value-a.value).slice(0,10);

  // 차트 색상 해석 (사유 color → hex)
  const reasonHex = (color)=>(REFUND_COLOR_MAP[color]||REFUND_COLOR_MAP.gray).fg;

  // 공용 스타일
  const card = {background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16};
  const kpiCard = {background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'};
  const chartTitle = {fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:12};
  const quickBtn = {fontSize:11,padding:'7px 12px',background:'transparent',color:'var(--sub)',border:'none',cursor:'pointer',fontFamily:'inherit',borderRight:'1px solid var(--border)'};
  const dateInput = {fontSize:12,padding:'6px 10px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,fontFamily:'inherit'};

  return (
    <div>
      {/* 기간 설정 */}
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:20}}>
        <div style={{display:'inline-flex',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
          <button onClick={()=>applyQuick('7d')} style={quickBtn}>지난 7일</button>
          <button onClick={()=>applyQuick('30d')} style={quickBtn}>지난 30일</button>
          <button onClick={()=>applyQuick('this_month')} style={quickBtn}>이번 달</button>
          <button onClick={()=>applyQuick('last_month')} style={{...quickBtn,borderRight:'none'}}>지난 달</button>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input type="date" value={from} max={to} onChange={e=>setFrom(e.target.value)} style={dateInput}/>
          <span style={{color:'var(--sub)',fontSize:12}}>~</span>
          <input type="date" value={to} min={from} max={fmtDate(today)} onChange={e=>setTo(e.target.value)} style={dateInput}/>
        </div>
        {/* 건수/금액 토글 */}
        <div style={{display:'inline-flex',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginLeft:'auto'}}>
          <button onClick={()=>setMetric('count')}
            style={{fontSize:11,padding:'7px 14px',background:metric==='count'?'rgba(246,173,9,.18)':'transparent',color:metric==='count'?'#F6AD09':'var(--sub)',border:'none',cursor:'pointer',fontFamily:'inherit',borderRight:'1px solid var(--border)'}}>건수</button>
          <button onClick={()=>setMetric('amount')}
            style={{fontSize:11,padding:'7px 14px',background:metric==='amount'?'rgba(246,173,9,.18)':'transparent',color:metric==='amount'?'#F6AD09':'var(--sub)',border:'none',cursor:'pointer',fontFamily:'inherit'}}>금액</button>
        </div>
      </div>

      {loading ? (
        <div style={{padding:'60px',textAlign:'center',color:'var(--sub)'}}>집계 중...</div>
      ) : totalCount===0 ? (
        <div style={{padding:'60px',textAlign:'center',color:'var(--sub)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8}}>선택한 기간에 환불 데이터가 없습니다.</div>
      ) : (<>
        {/* KPI 4개 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
          <div style={kpiCard}>
            <div style={{fontSize:11,color:'var(--sub)'}}>총 환불 건수</div>
            <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{totalCount}건</div>
          </div>
          <div style={kpiCard}>
            <div style={{fontSize:11,color:'var(--sub)'}}>총 환불 금액</div>
            <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{KRW(totalAmount)}</div>
          </div>
          <div style={kpiCard}>
            <div style={{fontSize:11,color:'var(--sub)'}}>평균 환불 금액</div>
            <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{KRW(avgAmount)}</div>
          </div>
          <div style={kpiCard}>
            <div style={{fontSize:11,color:'var(--sub)'}}>평균 처리 소요시간</div>
            <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{fmtDuration(avgLeadMs)}</div>
            <div style={{fontSize:9,color:'var(--sub)',marginTop:2}}>완료 {doneRows.length}건 기준</div>
          </div>
        </div>

        {/* ① 일자별 추이 (2축) */}
        <div style={{...card,marginBottom:16}}>
          <div style={chartTitle}>일자별 환불 추이 (건수 + 금액)</div>
          <div style={{height:260}}>
            <ChartComp type="bar"
              options={{
                ...BASE_OPTS,
                scales:{
                  x:{...BASE_OPTS.scales.x},
                  y:{...BASE_OPTS.scales.y, position:'left', title:{display:true,text:'건수',color:'#7a8fbb',font:{size:10}}},
                  y1:{...BASE_OPTS.scales.y, position:'right', grid:{drawOnChartArea:false}, ticks:{...BASE_OPTS.scales.y.ticks, callback:v=>'₩'+(v>=10000?(v/10000)+'만':v)}, title:{display:true,text:'금액',color:'#7a8fbb',font:{size:10}}},
                },
              }}
              data={{labels:dateLabels,datasets:[
                {type:'bar', label:'건수', data:dateCounts, backgroundColor:'rgba(246,173,9,.5)', borderColor:'#F6AD09', yAxisID:'y', order:2},
                {type:'line', label:'금액', data:dateAmounts, borderColor:'#78AAFF', backgroundColor:'rgba(120,170,255,.2)', yAxisID:'y1', tension:0.3, order:1},
              ]}}/>
          </div>
        </div>

        {/* ②③ 2단: 사유별 도넛 + 공급사별 막대 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          {/* ② 사유별 도넛 */}
          <div style={card}>
            <div style={chartTitle}>사유별 분포 ({metric==='count'?'건수':'금액'})</div>
            <div style={{height:260}}>
              <ChartComp type="doughnut"
                options={{
                  ...BASE_OPTS, scales:{},
                  plugins:{...BASE_OPTS.plugins, legend:{position:'right',labels:{color:'#7a8fbb',font:{size:10},boxWidth:10}},
                    tooltip:{callbacks:{label:(ctx)=>` ${ctx.label}: ${fmtVal(ctx.parsed)}`}}},
                }}
                data={{labels:reasonEntries.map(e=>e.name),datasets:[{
                  data:reasonEntries.map(e=>e.value),
                  backgroundColor:reasonEntries.map(e=>reasonHex(e.color)),
                  borderColor:'var(--surface)', borderWidth:2,
                }]}}/>
            </div>
          </div>
          {/* ③ 공급사별 막대 */}
          <div style={card}>
            <div style={chartTitle}>공급사별 환불 ({metric==='count'?'건수':'금액'}) · 상위 10</div>
            <div style={{height:260}}>
              <ChartComp type="bar"
                options={{
                  ...BASE_OPTS, indexAxis:'y',
                  plugins:{...BASE_OPTS.plugins, legend:{display:false},
                    tooltip:{callbacks:{label:(ctx)=>` ${fmtVal(ctx.parsed.x)}`}}},
                }}
                data={{labels:supplierEntries.map(e=>e.name),datasets:[{
                  data:supplierEntries.map(e=>e.value),
                  backgroundColor:'rgba(105,210,201,.5)', borderColor:'#69D2C9', borderWidth:1,
                }]}}/>
            </div>
          </div>
        </div>

        {/* ④ 상품별 막대 */}
        <div style={{...card,marginBottom:16}}>
          <div style={chartTitle}>상품별 환불 ({metric==='count'?'건수':'금액'}) · 상위 10</div>
          <div style={{height:280}}>
            <ChartComp type="bar"
              options={{
                ...BASE_OPTS, indexAxis:'y',
                plugins:{...BASE_OPTS.plugins, legend:{display:false},
                  tooltip:{callbacks:{label:(ctx)=>` ${fmtVal(ctx.parsed.x)}`}}},
              }}
              data={{labels:productEntries.map(e=>e.name),datasets:[{
                data:productEntries.map(e=>e.value),
                backgroundColor:'rgba(168,150,255,.5)', borderColor:'#A896FF', borderWidth:1,
              }]}}/>
          </div>
        </div>

        {/* 사유별 집계표 */}
        <div style={card}>
          <div style={chartTitle}>사유별 집계</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{color:'var(--sub)',fontSize:11}}>
                  <th style={{textAlign:'left',padding:'8px',borderBottom:'1px solid var(--border)'}}>사유</th>
                  <th style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)'}}>건수</th>
                  <th style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)'}}>금액</th>
                  <th style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)'}}>비율({metric==='count'?'건수':'금액'})</th>
                </tr>
              </thead>
              <tbody>
                {reasonEntries.map(e=>{
                  const denom = metric==='count' ? totalCount : totalAmount;
                  const pct = denom>0 ? (e.value/denom*100) : 0;
                  const amount = byReason[e.rid].reduce((s,r)=>s+(r.refund_amount||0),0);
                  return (
                    <tr key={e.rid}>
                      <td style={{padding:'8px',borderBottom:'1px solid var(--border)'}}><span style={refundColorStyle(e.color)}>{e.name}</span></td>
                      <td style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)',color:'var(--text)'}}>{e.count}건</td>
                      <td style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)',color:'var(--text)'}}>{KRW(amount)}</td>
                      <td style={{textAlign:'right',padding:'8px',borderBottom:'1px solid var(--border)',color:'var(--sub)'}}>{pct.toFixed(1)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </>)}
    </div>
  );
}


function RefundManagementPage({ currentUserEmail }) {
  const [tab,setTab]=useState('request');            // 'request' | 'report'
  const [addOpen,setAddOpen]=useState(false);        // 환불 요청 추가 모달
  const [editRow,setEditRow]=useState(null);         // 환불 요청 수정/처리 모달 (행 클릭 시 set)
  const [reasonsModalOpen,setReasonsModalOpen]=useState(false); // 사유 관리 모달
  const [selectedIds,setSelectedIds]=useState(new Set()); // 일괄 처리용 체크된 행 id Set
  const [bulkProcessing,setBulkProcessing]=useState(false); // 일괄 처리 중 잠금
  const [loading,setLoading]=useState(true);
  const [refunds,setRefunds]=useState([]);
  const [reasons,setReasons]=useState([]);
  // 필터
  const [fReason,setFReason]=useState('');           // reason_id 또는 ''
  const [fStatus,setFStatus]=useState('');           // '', 'pending2', 'pending3', 'done'
  const [fWriter,setFWriter]=useState('');           // 작성자 email 또는 ''
  const [fSearch,setFSearch]=useState('');
  const [period,setPeriod]=useState('all');          // 'all','this_month','last_month','last_7d'
  const [activeKpi,setActiveKpi]=useState(null);     // null|'thisMonth'|'pendingRefund'|'pendingCafe24'

  const load = async ()=>{
    setLoading(true);
    // 페이지네이션은 D-1에선 단순하게 500건까지 (충분히 큰 한도)
    const [r1,r2] = await Promise.all([
      sb.from('refunds').select('*').order('created_at',{ascending:false}).limit(500),
      sb.from('refund_reasons').select('*').order('sort_order',{ascending:true}),
    ]);
    setRefunds(r1.data||[]);
    setReasons(r2.data||[]);
    setSelectedIds(new Set());  // 데이터 새로 로드되면 stale한 선택 정리
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  // 사유 id → 사유 객체 매핑
  const reasonById = {};
  reasons.forEach(r=>{ reasonById[r.id]=r; });

  // 사유별 사용 건수 매핑 (사유 관리 모달에서 "삭제 가능 여부" 판단용)
  const reasonUsageMap = {};
  refunds.forEach(r=>{
    if(r.reason_id) reasonUsageMap[r.reason_id] = (reasonUsageMap[r.reason_id]||0) + 1;
  });

  // 기간 범위 계산 - period state에 따라 (today 기준 로컬 시간)
  // 'all'이면 null, 아니면 {fromYM (포함)|fromDate (포함), toYM (포함)|toDate (포함)} 반환
  // 단순화를 위해 created_at 문자열 prefix 비교
  const periodFilter = (()=>{
    if(period==='all') return null;
    const d = new Date();
    if(period==='this_month'){
      const ym = d.toISOString().slice(0,7);
      return (r)=>String(r.created_at).slice(0,7)===ym;
    }
    if(period==='last_month'){
      const lm = new Date(d.getFullYear(), d.getMonth()-1, 1);
      const ym = lm.toISOString().slice(0,7);
      return (r)=>String(r.created_at).slice(0,7)===ym;
    }
    if(period==='last_7d'){
      const from = new Date(d.getTime() - 7*24*3600*1000).toISOString().slice(0,10);
      return (r)=>String(r.created_at).slice(0,10) >= from;
    }
    return null;
  })();

  // 필터링
  const filtered = refunds.filter(r=>{
    if(periodFilter && !periodFilter(r)) return false;
    if(activeKpi==='pendingRefund' && r.refund_completed) return false;
    if(activeKpi==='pendingCafe24' && !(r.refund_completed && !r.cafe24_done)) return false;
    if(fReason && String(r.reason_id)!==String(fReason)) return false;
    if(fStatus){
      const st = refundStatusOf(r).key;
      if(st!==fStatus) return false;
    }
    if(fWriter && r.created_by!==fWriter) return false;
    if(fSearch){
      const s = fSearch.toLowerCase();
      const hay = [
        r.order_id, r.customer_name, r.customer_phone, r.product_name, r.supplier_name,
      ].map(x=>String(x||'').toLowerCase()).join(' ');
      if(!hay.includes(s)) return false;
    }
    return true;
  });

  // 그룹화: "동일 주문번호 + 동일 환불계좌"일 때만 묶기 (필터링된 결과 안에서)
  // 같은 주문이라도 환불 계좌(은행/계좌번호/예금주)가 다르면 따로 송금해야 하므로 그룹 분리.
  // 복합 그룹 키 = order_group_id | 은행 | 계좌번호 | 예금주
  const groupKeyOf = (r)=>{
    if(!r.order_group_id) return null;  // 주문번호 없으면 그룹 대상 아님
    const bank = (r.bank_name||'').trim();
    const acct = (r.account_number||'').trim();
    const holder = (r.account_holder||'').trim();
    return `${r.order_group_id}|${bank}|${acct}|${holder}`;
  };
  const groupCounts = {};
  filtered.forEach(r=>{
    const g = groupKeyOf(r);
    if(!g) return;
    groupCounts[g]=(groupCounts[g]||0)+1;
  });
  const groupSums = {};
  filtered.forEach(r=>{
    const g = groupKeyOf(r);
    if(g && groupCounts[g]>=2){
      groupSums[g]=(groupSums[g]||0)+(r.refund_amount||0);
    }
  });

  // 그룹 행은 붙여서 표시 (정렬: 그룹의 대표 created_at DESC 기준, 그룹 내부도 created_at DESC)
  // filtered는 이미 created_at DESC. 같은 그룹에 속하는 행끼리 한 곳으로 모으면서 그룹의 첫 등장 위치를 유지.
  const displayed = (()=>{
    const out = [];
    const seenGroups = new Set();   // 그룹 내 모든 행을 한 번에 push했는지 추적
    filtered.forEach(r=>{
      const g = groupKeyOf(r);
      const isGrouped = g && groupCounts[g]>=2;
      if(!isGrouped){
        out.push(r);
        return;
      }
      if(seenGroups.has(g)) return;  // 이 그룹은 이미 묶어서 push 했음
      // 같은 그룹의 모든 행을 created_at DESC 순서로 묶어서 push
      const members = filtered.filter(x=>groupKeyOf(x)===g);
      members.forEach(m=>out.push(m));
      seenGroups.add(g);
    });
    return out;
  })();

  // 일괄 환불 완료 처리 함수
  const bulkMarkRefundComplete = async ()=>{
    const ids = Array.from(selectedIds);
    if(ids.length===0) return;
    if(!confirm(`선택한 ${ids.length}건을 일괄 환불 완료 처리하시겠습니까?\n실제 계좌이체가 완료된 건만 처리해주세요.`)) return;
    setBulkProcessing(true);
    const nowIso = new Date().toISOString();
    const userTag = currentUserEmail || 'unknown';
    const { error } = await sb.from('refunds').update({
      refund_completed:    true,
      refund_completed_at: nowIso,
      refund_completed_by: userTag,
      updated_by:          userTag,
    }).in('id', ids);
    setBulkProcessing(false);
    if(error){ alert('일괄 처리 실패: '+error.message); return; }
    setSelectedIds(new Set());
    load();
  };

  // 일괄 후처리 완료 처리 (후처리 대기 → 완료)
  const bulkMarkCafe24Done = async ()=>{
    const ids = Array.from(selectedIds);
    if(ids.length===0) return;
    if(!confirm(`선택한 ${ids.length}건을 일괄 후처리 완료 처리하시겠습니까?\n카페24 주문 환불완료 변경과 젠데스크 CS 종료가 모두 끝난 건만 처리해주세요.`)) return;
    setBulkProcessing(true);
    const nowIso = new Date().toISOString();
    const userTag = currentUserEmail || 'unknown';
    const { error } = await sb.from('refunds').update({
      cafe24_done:    true,
      cafe24_done_at: nowIso,
      cafe24_done_by: userTag,
      updated_by:     userTag,
    }).in('id', ids);
    setBulkProcessing(false);
    if(error){ alert('일괄 처리 실패: '+error.message); return; }
    setSelectedIds(new Set());
    load();
  };

  // 체크 가능한 행: 환불 대기 또는 후처리 대기 (완료 행은 체크 불가)
  // 환불 대기 행만, 또는 후처리 대기 행만 선택했을 때 각각 다른 일괄 처리 버튼이 노출됨
  const selectableIds = displayed.filter(r=>!(r.refund_completed && r.cafe24_done)).map(r=>r.id);
  // 전체 선택 상태 판정
  const allSelected = selectableIds.length>0 && selectableIds.every(id=>selectedIds.has(id));
  const someSelected = selectableIds.some(id=>selectedIds.has(id)) && !allSelected;
  // 선택된 행들의 상태 분포 (일괄 처리 버튼 활성화 판단)
  const selectedRows = displayed.filter(r=>selectedIds.has(r.id));
  const selectedAllPending2 = selectedRows.length>0 && selectedRows.every(r=>!r.refund_completed);
  const selectedAllPending3 = selectedRows.length>0 && selectedRows.every(r=>r.refund_completed && !r.cafe24_done);

  // KPI 계산 - 기간 필터에 따라 동적 변경
  // periodFilter가 null('all')이면 전체, 아니면 기간 내 데이터만 집계
  const inPeriod = periodFilter ? refunds.filter(periodFilter) : refunds;
  const periodLabel = ({all:'전체',this_month:'이번 달',last_month:'지난 달',last_7d:'지난 7일'})[period];
  const kpi = {
    periodCount:    inPeriod.length,
    pendingRefund:  inPeriod.filter(r=>!r.refund_completed).length,
    pendingCafe24:  inPeriod.filter(r=>r.refund_completed && !r.cafe24_done).length,
    periodAmount:   inPeriod.reduce((s,r)=>s+(r.refund_amount||0),0),
  };

  // 작성자 옵션 (목록의 distinct created_by)
  const writerOptions = Array.from(new Set(refunds.map(r=>r.created_by).filter(Boolean))).sort();

  // 공용 스타일
  const th = {padding:'10px 8px',textAlign:'left',fontSize:11,fontWeight:600,color:'var(--sub)',background:'var(--surface)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'};
  const td = {padding:'10px 8px',fontSize:12,color:'var(--text)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'};

  return (
    <div className="section" style={{contain:'inline-size'}}>
      {/* 페이지 헤더 (공통) */}
      <div style={{marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:700,margin:0,color:'var(--text)'}}>💸 환불 관리</h1>
        <div style={{fontSize:12,color:'var(--sub)',marginTop:4}}>환불 요청 등록 · 처리 진행 추적 · master 전용</div>
      </div>

      {/* 탭 */}
      <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)',marginBottom:20}}>
        {[
          {id:'request',label:'요청'},
          {id:'report', label:'Report'},
        ].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)}
            style={{
              padding:'12px 20px',cursor:'pointer',fontSize:13,
              fontWeight: tab===t.id ? 700 : 500,
              color:      tab===t.id ? '#F6AD09' : 'var(--sub)',
              borderBottom: tab===t.id ? '2px solid #F6AD09' : '2px solid transparent',
              marginBottom:'-1px',userSelect:'none',
            }}>{t.label}</div>
        ))}
      </div>

      {/* Report 탭 */}
      {tab==='report' && <RefundReportTab reasons={reasons}/>}

      {/* 요청 탭 */}
      {tab==='request' && (<>
      {/* 요청 탭 헤더 (기간 토글 + 액션 버튼) */}
      <div style={{marginBottom:20,display:'flex',justifyContent:'flex-end',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        {/* 기간 토글 */}
        <div style={{display:'inline-flex',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
          {[
            {k:'all',       label:'전체'},
            {k:'this_month',label:'이번 달'},
            {k:'last_month',label:'지난 달'},
            {k:'last_7d',   label:'지난 7일'},
          ].map(p=>(
            <button key={p.k} onClick={()=>setPeriod(p.k)}
              style={{
                fontSize:11,padding:'7px 12px',
                background: period===p.k ? 'rgba(246,173,9,.18)' : 'transparent',
                color:      period===p.k ? '#F6AD09'              : 'var(--sub)',
                border:'none',cursor:'pointer',fontFamily:'inherit',
                borderRight:'1px solid var(--border)',
              }}>{p.label}</button>
          ))}
        </div>
        <button onClick={()=>setReasonsModalOpen(true)}
          style={{fontSize:12,padding:'8px 12px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,cursor:'pointer'}} title="환불 사유 마스터 관리">⚙️ 사유 관리</button>
        <button onClick={()=>setAddOpen(true)}
          style={{fontSize:13,padding:'8px 14px',background:'rgba(246,173,9,.18)',border:'1px solid rgba(246,173,9,.5)',color:'#F6AD09',borderRadius:6,cursor:'pointer',fontWeight:600}}>+ 환불 요청 추가</button>
      </div>

      {/* KPI 4개 (클릭으로 필터 토글) */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {(()=>{
          // 카드 공용: 선택 상태일 때 강조 보더 + 약한 배경
          const baseStyle = {background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',cursor:'pointer',transition:'all 0.15s'};
          const activeStyle = (color)=>({borderColor:color,background:`color-mix(in srgb, ${color} 8%, var(--surface))`,boxShadow:`0 0 0 1px ${color} inset`});
          // 이번 달 요청·환불액 카드는 KPI 카드로는 토글 안 함 (기간 토글로 이미 컨트롤). 단순 표시 + 클릭 시 KPI 필터(activeKpi) 해제하는 정도
          const card1Active = !activeKpi;  // KPI 필터 없을 때 강조 없음. 이 카드는 KPI 필터 비활성 의미
          const card2Active = activeKpi==='pendingRefund';
          const card3Active = activeKpi==='pendingCafe24';
          return (<>
            <div onClick={()=>setActiveKpi(null)}
              style={{...baseStyle, ...(activeKpi===null?{}:{opacity:0.85})}}>
              <div style={{fontSize:11,color:'var(--sub)'}}>{periodLabel} 요청</div>
              <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{kpi.periodCount}건</div>
            </div>
            <div onClick={()=>setActiveKpi(card2Active?null:'pendingRefund')}
              style={{...baseStyle, ...(card2Active?activeStyle('#F6AD09'):{})}}>
              <div style={{fontSize:11,color:'var(--sub)',display:'flex',alignItems:'center',gap:4}}>환불 대기 {card2Active && <span style={{fontSize:9,color:'#F6AD09'}}>● 필터 적용 중</span>}</div>
              <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'#F6AD09'}}>{kpi.pendingRefund}건</div>
            </div>
            <div onClick={()=>setActiveKpi(card3Active?null:'pendingCafe24')}
              style={{...baseStyle, ...(card3Active?activeStyle('#78AAFF'):{})}}>
              <div style={{fontSize:11,color:'var(--sub)',display:'flex',alignItems:'center',gap:4}}>후처리 대기 {card3Active && <span style={{fontSize:9,color:'#78AAFF'}}>● 필터 적용 중</span>}</div>
              <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'#78AAFF'}}>{kpi.pendingCafe24}건</div>
            </div>
            <div onClick={()=>setActiveKpi(null)}
              style={{...baseStyle, ...(activeKpi===null?{}:{opacity:0.85})}}>
              <div style={{fontSize:11,color:'var(--sub)'}}>{periodLabel} 환불액</div>
              <div style={{fontSize:22,fontWeight:700,marginTop:4,color:'var(--text)'}}>{KRW(kpi.periodAmount)}</div>
            </div>
          </>);
        })()}
      </div>

      {/* 필터 */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <select value={fReason} onChange={e=>setFReason(e.target.value)} style={{fontSize:12,padding:'7px 10px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,minWidth:130}}>
          <option value="">전체 사유</option>
          {reasons.map(r=>(<option key={r.id} value={r.id}>{r.name}</option>))}
        </select>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{fontSize:12,padding:'7px 10px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,minWidth:120}}>
          <option value="">전체 상태</option>
          <option value="pending2">환불 대기</option>
          <option value="pending3">후처리 대기</option>
          <option value="done">완료</option>
        </select>
        <select value={fWriter} onChange={e=>setFWriter(e.target.value)} style={{fontSize:12,padding:'7px 10px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,minWidth:160}}>
          <option value="">전체 작성자</option>
          {writerOptions.map(w=>(<option key={w} value={w}>{w}</option>))}
        </select>
        <input type="text" value={fSearch} onChange={e=>setFSearch(e.target.value)} placeholder="주문번호 · 고객명 · 상품명 검색"
          style={{fontSize:12,padding:'7px 10px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,flex:1,minWidth:200}}/>
        {(fReason||fStatus||fWriter||fSearch||period!=='all'||activeKpi) && (
          <button onClick={()=>{setFReason('');setFStatus('');setFWriter('');setFSearch('');setPeriod('all');setActiveKpi(null);}}
            style={{fontSize:11,padding:'7px 12px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:6,cursor:'pointer'}}>초기화</button>
        )}
      </div>

      {/* 일괄 처리 액션 바 (선택된 행 있을 때만 노출) */}
      {selectedIds.size>0 && (
        <div style={{marginBottom:12,padding:'10px 14px',background:'rgba(246,173,9,.08)',border:'1px solid rgba(246,173,9,.4)',borderRadius:6,display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{fontSize:12,color:'var(--text)'}}>
            <b style={{color:'#F6AD09'}}>{selectedIds.size}건</b> 선택됨
            <button onClick={()=>setSelectedIds(new Set())}
              style={{marginLeft:10,fontSize:11,padding:'3px 8px',background:'transparent',border:'1px solid var(--border)',color:'var(--sub)',borderRadius:4,cursor:'pointer'}}>선택 해제</button>
            {!selectedAllPending2 && !selectedAllPending3 && (
              <span style={{marginLeft:10,fontSize:11,color:'#FF6B6B'}}>⚠ 같은 상태의 행끼리만 일괄 처리 가능합니다 (환불 대기끼리 또는 후처리 대기끼리)</span>
            )}
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {selectedAllPending2 && (
              <button onClick={bulkMarkRefundComplete} disabled={bulkProcessing}
                style={{fontSize:13,padding:'8px 14px',background:'rgba(246,173,9,.18)',border:'1px solid rgba(246,173,9,.5)',color:'#F6AD09',borderRadius:6,cursor:bulkProcessing?'not-allowed':'pointer',fontWeight:600}}>
                {bulkProcessing?'처리 중...':'✓ 일괄 환불 완료 처리'}
              </button>
            )}
            {selectedAllPending3 && (
              <button onClick={bulkMarkCafe24Done} disabled={bulkProcessing}
                style={{fontSize:13,padding:'8px 14px',background:'rgba(120,170,255,.18)',border:'1px solid rgba(120,170,255,.5)',color:'#78AAFF',borderRadius:6,cursor:bulkProcessing?'not-allowed':'pointer',fontWeight:600}}>
                {bulkProcessing?'처리 중...':'✓ 일괄 후처리 완료'}
              </button>
            )}
          </div>
        </div>
      )}

      {/* 목록 테이블 */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:1180,fontFamily:'inherit'}}>
            <thead>
              <tr>
                <th style={{...th,width:40,textAlign:'center',padding:'10px 4px'}}>
                  <input type="checkbox"
                    checked={allSelected}
                    ref={el=>{if(el) el.indeterminate=someSelected;}}
                    onChange={e=>{
                      if(e.target.checked){
                        setSelectedIds(new Set(selectableIds));
                      } else {
                        setSelectedIds(new Set());
                      }
                    }}
                    disabled={selectableIds.length===0}
                    style={{cursor:selectableIds.length===0?'not-allowed':'pointer',accentColor:'#F6AD09'}}
                    title="처리 가능한 행 전체 선택"/>
                </th>
                <th style={{...th,width:50,textAlign:'center'}}></th>
                <th style={{...th,width:70}}>일자</th>
                <th style={{...th,width:130}}>작성자</th>
                <th style={{...th,width:95}}>사유</th>
                <th style={{...th,textAlign:'center',width:90}}>금액</th>
                <th style={{...th,width:80}}>환불 은행</th>
                <th style={{...th,width:140}}>환불 계좌</th>
                <th style={{...th,width:80}}>예금주</th>
                <th style={{...th,width:80}}>주문자</th>
                <th style={{...th,width:160}}>주문번호</th>
                <th style={{...th,width:180}}>상품명</th>
                <th style={{...th,width:100}}>공급사</th>
                <th style={{...th,width:100,textAlign:'center'}}>처리 상태</th>
              </tr>
            </thead>
            <tbody>
              {loading ? (
                <tr><td colSpan="14" style={{...td,textAlign:'center',color:'var(--sub)',padding:'40px 0'}}>로딩 중...</td></tr>
              ) : displayed.length===0 ? (
                <tr><td colSpan="14" style={{...td,textAlign:'center',color:'var(--sub)',padding:'40px 0'}}>
                  {refunds.length===0 ? '등록된 환불 요청이 없습니다. 우측 상단 [+ 환불 요청 추가] 버튼으로 첫 요청을 등록해보세요.' : '검색 결과가 없습니다.'}
                </td></tr>
              ) : displayed.map((r,idx)=>{
                const reason = reasonById[r.reason_id];
                const st = refundStatusOf(r);
                const gKey = groupKeyOf(r);
                const isInGroup = gKey && groupCounts[gKey]>=2;
                const groupSum = isInGroup ? groupSums[gKey] : null;
                const rowBg = isInGroup ? 'rgba(246,173,9,.04)' : 'transparent';
                // 그룹의 마지막 행인지: 다음 행이 같은 그룹이 아니면 마지막
                const next = displayed[idx+1];
                const isLastInGroup = isInGroup && (!next || groupKeyOf(next)!==gKey);
                // 그룹의 첫 행인지: 이전 행이 같은 그룹이 아니면 첫 행
                const prev = displayed[idx-1];
                const isFirstInGroup = isInGroup && (!prev || groupKeyOf(prev)!==gKey);
                const selectable = !(r.refund_completed && r.cafe24_done);  // 완료 행만 체크 불가
                const checked = selectedIds.has(r.id);
                return (
                  <tr key={r.id} style={{background:rowBg,cursor:'pointer',borderBottom:isInGroup && !isLastInGroup?'1px solid rgba(246,173,9,.15)':undefined}}
                    onClick={()=>setEditRow(r)}
                    onMouseEnter={e=>{e.currentTarget.style.background = isInGroup ? 'rgba(246,173,9,.10)' : 'rgba(246,173,9,.04)';}}
                    onMouseLeave={e=>{e.currentTarget.style.background = rowBg;}}>
                    {/* 체크박스 */}
                    <td style={{...td,textAlign:'center',padding:'10px 4px'}} onClick={e=>e.stopPropagation()}>
                      {selectable && (
                        <input type="checkbox" checked={checked}
                          onChange={e=>{
                            setSelectedIds(prev=>{
                              const next = new Set(prev);
                              if(e.target.checked) next.add(r.id); else next.delete(r.id);
                              return next;
                            });
                          }}
                          style={{cursor:'pointer',accentColor:'#F6AD09'}}/>
                      )}
                    </td>
                    {/* 그룹 표시 (그룹 첫 행에만 아이콘+합계금액 표시) */}
                    <td style={{...td,textAlign:'center',borderLeft:isInGroup?'3px solid #F6AD09':'3px solid transparent'}}>
                      {isInGroup && isFirstInGroup && (
                        <div title={`주문 그룹 합계: ${KRW(groupSum)}`} style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:1}}>
                          <span style={{fontSize:14}}>🔗</span>
                          <span style={{fontSize:9,color:'#F6AD09'}}>{KRW(groupSum)}</span>
                        </div>
                      )}
                    </td>
                    <td style={{...td,fontSize:11}}>
                      {(()=>{
                        const dt = new Date(r.created_at);
                        const pad = n=>String(n).padStart(2,'0');
                        const date = `${pad(dt.getMonth()+1)}/${pad(dt.getDate())}`;
                        const time = `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
                        return (<>
                          <div>{date}</div>
                          <div style={{color:'var(--sub)',fontSize:10}}>{time}</div>
                        </>);
                      })()}
                    </td>
                    <td style={{...td,fontSize:11,color:'var(--sub)'}}>{r.created_by}</td>
                    <td style={td}>{reason ? <span style={refundColorStyle(reason.color)}>{reason.name}</span> : <span style={{color:'var(--sub)',fontSize:11}}>—</span>}</td>
                    <td style={{...td,textAlign:'center',fontWeight:600}}>{KRW(r.refund_amount)}</td>
                    <td style={td}>{r.bank_name||'—'}</td>
                    <td style={{...td,fontFamily:'monospace',fontSize:11}}>{r.account_number||'—'}</td>
                    <td style={td}>{r.account_holder||'—'}</td>
                    <td style={td}>{r.customer_name||'—'}</td>
                    <td style={{...td,fontFamily:'monospace',fontSize:11}} title={r.order_id}>{r.order_id}</td>
                    <td style={{...td,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}} title={r.product_name}>{r.product_name||'—'}</td>
                    <td style={td}>{r.supplier_name||'—'}</td>
                    <td style={{...td,textAlign:'center'}}>
                      <span style={{background:st.bg,color:st.fg,padding:'3px 8px',borderRadius:4,fontSize:11,whiteSpace:'nowrap'}}>{st.label}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{padding:'10px 12px',fontSize:11,color:'var(--sub)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span>총 {displayed.length}건{displayed.length!==refunds.length?` (전체 ${refunds.length}건 중 필터링)`:''}</span>
          <span style={{display:'flex',alignItems:'center',gap:12}}>
            <span>행 클릭 → 수정 · 삭제 · 처리</span>
            <span style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{color:'#F6AD09'}}>🔗</span>
              <span>= 같은 카페24 주문 그룹</span>
            </span>
          </span>
        </div>
      </div>
      </>)}

      {/* 환불 요청 추가 모달 */}
      {addOpen && (
        <RefundAddModal
          reasons={reasons}
          currentUserEmail={currentUserEmail}
          onClose={()=>setAddOpen(false)}
          onSaved={()=>{ setAddOpen(false); load(); }}
        />
      )}

      {/* 환불 요청 수정/처리 모달 */}
      {editRow && (
        <RefundEditModal
          row={editRow}
          reasons={reasons}
          currentUserEmail={currentUserEmail}
          onClose={()=>setEditRow(null)}
          onSaved={()=>{ setEditRow(null); load(); }}
        />
      )}

      {/* 환불 사유 관리 모달 */}
      {reasonsModalOpen && (
        <RefundReasonsModal
          reasons={reasons}
          refundsUsageMap={reasonUsageMap}
          onClose={()=>setReasonsModalOpen(false)}
          onSaved={()=>{ setReasonsModalOpen(false); load(); }}
        />
      )}
    </div>
  );
}


// ── AGENT ANALYSIS PAGE (master only) ───────────
function AgentAnalysisPage(){
  // 빠른 선택 옵션
  const QUICK_RANGES = [
    {label:'지난 7일', days:7},
    {label:'지난 30일', days:30},
    {label:'이번 달', value:'this_month'},
    {label:'지난 달', value:'last_month'},
  ];
  // 로컬 시간 기준 YYYY-MM-DD 포맷 (toISOString의 UTC 변환 버그 회피)
  const fmtLocal=(d)=>{
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const todayStr=()=>fmtLocal(new Date());
  const dateOffsetStr=(days)=>{const d=new Date();d.setDate(d.getDate()-days);return fmtLocal(d);};
  const monthRange=(offset=0)=>{
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);
    const y=d.getFullYear(), m=d.getMonth();
    const first=fmtLocal(new Date(y,m,1));
    const last=fmtLocal(new Date(y,m+1,0));
    return [first,last];
  };

  const [from,setFrom]=useState(dateOffsetStr(7));
  const [to,setTo]=useState(todayStr());
  const [activeQuick,setActiveQuick]=useState('지난 7일');
  const [agentOps,setAgentOps]=useState([]);          // 현재 기간 데이터
  const [prevAgentOps,setPrevAgentOps]=useState([]);  // 직전 같은 기간 데이터
  const [agentMap,setAgentMap]=useState({});          // 등록 상담원 매핑 {name: resigned_at|null}
  const [loading,setLoading]=useState(true);

  // 데이터 로드: 현재 기간 + 직전 같은 기간 동시에
  const load=async(f,t)=>{
    if(!f||!t) return;
    setLoading(true);
    // 직전 같은 기간 계산
    const fDate=new Date(f), tDate=new Date(t);
    const days=Math.round((tDate-fDate)/(1000*60*60*24))+1;
    const prevTo=new Date(fDate); prevTo.setDate(prevTo.getDate()-1);
    const prevFrom=new Date(prevTo); prevFrom.setDate(prevFrom.getDate()-days+1);
    const prevToStr=fmtLocal(prevTo);
    const prevFromStr=fmtLocal(prevFrom);

    const [r1,r2,r3]=await Promise.all([
      sb.from('agent_daily_ops').select('*').gte('date',f).lte('date',t).order('date',{ascending:true}),
      sb.from('agent_daily_ops').select('*').gte('date',prevFromStr).lte('date',prevToStr),
      sb.from('agents').select('name,resigned_at,role'),
    ]);
    setAgentOps(r1.data||[]);
    setPrevAgentOps(r2.data||[]);
    const m={}; (r3.data||[]).forEach(r=>{ if(r.role==='파트장') return; m[r.name]=r.resigned_at; }); setAgentMap(m);
    setLoading(false);
  };
  useEffect(()=>{load(from,to);},[]);

  // 빠른 선택 클릭
  const onQuickClick=(opt)=>{
    setActiveQuick(opt.label);
    let f,t;
    if(opt.days){f=dateOffsetStr(opt.days-1);t=todayStr();}
    else if(opt.value==='this_month'){const[a,b]=monthRange(0);f=a;t=b;}
    else if(opt.value==='last_month'){const[a,b]=monthRange(-1);f=a;t=b;}
    setFrom(f);setTo(t);
    load(f,t);
  };
  // 직접 입력 변경 시
  const onDateChange=(which,val)=>{
    const newFrom=which==='from'?val:from;
    const newTo=which==='to'?val:to;
    if(which==='from')setFrom(val);
    else setTo(val);
    setActiveQuick(null);
    load(newFrom,newTo);
  };

  // 처리량 합산 헬퍼: 한 row의 총 처리량
  const sumRow=(r)=>(Number(r.answered_calls)||0)+(Number(r.ob_count)||0)+(Number(r.board_count)||0)+(Number(r.chat_count)||0);

  // 상담원별 집계
  const computeStats=()=>{
    // 현재 기간 — 모든 상담원 (재직자) 기준
    const fDate=new Date(from), tDate=new Date(to);
    const totalDays=Math.round((tDate-fDate)/(1000*60*60*24))+1;
    
    // 표시 대상 필터: agents 테이블에 등록된 사람 중
    //   - 재직자(resigned_at=null) → 항상 표시
    //   - 퇴사자 → 퇴사일이 조회 시작일(from) 이후일 때만 표시 (조회 기간과 재직 기간 겹침)
    // agents 테이블에 없는 이름(삭제)은 자동으로 제외됨.
    const byAgent={};
    Object.keys(agentMap).forEach(name=>{
      const resignedAt=agentMap[name];
      const include = !resignedAt || (String(resignedAt).slice(0,10) >= from);
      if(include) byAgent[name]={current:0, prev:0, byDate:{}};
    });
    
    agentOps.forEach(r=>{
      if(!byAgent[r.agent_name]) return; // 삭제/조회기간 밖 퇴사자는 무시
      const sum=sumRow(r);
      byAgent[r.agent_name].current+=sum;
      byAgent[r.agent_name].byDate[r.date]=(byAgent[r.agent_name].byDate[r.date]||0)+sum;
    });
    prevAgentOps.forEach(r=>{
      if(!byAgent[r.agent_name]) return; // 삭제/조회기간 밖 퇴사자는 무시
      byAgent[r.agent_name].prev+=sumRow(r);
    });

    const names=Object.keys(byAgent);
    const totalCurrent=names.reduce((a,n)=>a+byAgent[n].current,0);
    const avgCurrent=names.length>0?totalCurrent/names.length:0;

    const rows=names.map(name=>{
      const d=byAgent[name];
      const dailyAvg=totalDays>0?d.current/totalDays:0;
      // 평균 대비 %
      const vsAvg=avgCurrent>0?((d.current-avgCurrent)/avgCurrent)*100:0;
      // 본인 과거 대비 %
      const vsPrev=d.prev>0?((d.current-d.prev)/d.prev)*100:(d.current>0?100:0);
      // 상태 판정
      let status='평균', statusColor='#A8DEF6', statusBg='rgba(168,222,246,.18)';
      if(vsAvg>=20){status='우수';statusColor='#22d3a0';statusBg='rgba(34,211,160,.18)';}
      else if(vsPrev<=-15){status='⚠ 하락';statusColor='#f87171';statusBg='rgba(248,113,113,.18)';}
      else if(vsAvg<=-15){status='⚠ 주의';statusColor='#F6AD09';statusBg='rgba(246,173,9,.25)';}
      
      const isLow = (vsAvg<=-15 || vsPrev<=-15); // 행 강조 여부
      
      return {name, current:d.current, dailyAvg, vsAvg, vsPrev, status, statusColor, statusBg, isLow, byDate:d.byDate};
    }).sort((a,b)=>b.current-a.current);
    
    return {rows, totalDays, avgCurrent};
  };

  // 일별 차트용 데이터 (라인 차트)
  const buildChartData=(stats)=>{
    const fDate=new Date(from), tDate=new Date(to);
    const dates=[];
    for(let d=new Date(fDate); d<=tDate; d.setDate(d.getDate()+1)){
      dates.push(fmtLocal(d));
    }
    const labels=dates.map(d=>d.slice(5)); // MM-DD
    const COLORS=['#22d3a0','#A8DEF6','#A89AE0','#F6AD09','#f87171','#7AC4E8','#FFBC72','#9FE1CB','#D89400','#a8defb'];
    const datasets=stats.rows.map((r,i)=>({
      label:r.name,
      data:dates.map(d=>r.byDate[d]||0),
      borderColor:COLORS[i%COLORS.length],
      backgroundColor:COLORS[i%COLORS.length],
      borderWidth: r.isLow?2.5:2,
      tension:0.2,
      pointRadius:2,
    }));
    // 평균 라인 (점선)
    const avgPerDay=dates.map(d=>{
      const sum=stats.rows.reduce((a,r)=>a+(r.byDate[d]||0),0);
      return stats.rows.length>0?sum/stats.rows.length:0;
    });
    datasets.push({
      label:'평균',
      data:avgPerDay,
      borderColor:'#A8DEF6',
      borderWidth:1.5,
      borderDash:[6,4],
      pointRadius:0,
      tension:0.2,
      backgroundColor:'transparent',
    });
    return {labels, datasets};
  };

  if(loading) return <div style={{padding:30,textAlign:'center',color:'var(--sub)'}}>📊 분석 데이터 로드 중...</div>;

  const stats = computeStats();
  const chartData = buildChartData(stats);

  // 화살표 + 색상 헬퍼
  const fmtPct=(v)=>{
    if(Math.abs(v)<1) return {arrow:'━', text:'±0%', color:'#c4d3e6'};
    if(v>=15) return {arrow:'▲', text:'+'+Math.round(v)+'%', color:'#22d3a0'};
    if(v>=1) return {arrow:'▲', text:'+'+Math.round(v)+'%', color:'#22d3a0'};
    if(v<=-15) return {arrow:'▼', text:Math.round(v)+'%', color:'#f87171'};
    return {arrow:'━', text:Math.round(v)+'%', color:'#c4d3e6'};
  };

  return (
    <div style={{padding:'20px 28px'}}>
      {/* 헤더 */}
      <div style={{marginBottom:18}}>
        <h1 style={{fontSize:18,fontWeight:700,color:'var(--text)',margin:0,marginBottom:4}}>상담원 분석</h1>
        <div style={{fontSize:11,color:'var(--sub)'}}>기간별 상담원 처리량 비교 · master 전용</div>
      </div>

      {/* 기간 선택 */}
