// ─────────────────────────────────────────────────────────────────────────────
// [Phase B-2] AutoDeliveryPage — 디지털 상품 발송 페이지 (등록 탭 + 발송 내역 탭)
// ─────────────────────────────────────────────────────────────────────────────
function AutoDeliveryPage({ isMaster=false, isManager=false, currentUserEmail }) {
  const [tab, setTab] = useState('register');
  const canManage = isMaster || isManager;

  if (!canManage) {
    return (
      <div style={{padding:'60px 28px',textAlign:'center',color:'var(--sub)'}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>접근 권한이 없습니다</div>
        <div style={{fontSize:12}}>이 페이지는 master/manager 권한 사용자만 사용할 수 있습니다.</div>
      </div>
    );
  }

  const tabs = [
    { id:'register', label:'등록' },
    { id:'history',  label:'발송 내역' },
  ];

  return (
    <div className="section" style={{contain:'inline-size'}}>
      <div style={{marginBottom:20,display:'flex',alignItems:'baseline',gap:12}}>
        <h1 style={{fontSize:20,fontWeight:700,margin:0,color:'var(--text)'}}>📧 디지털 상품 발송</h1>
        <span style={{fontSize:12,color:'var(--sub)'}}>결제 완료(N10) 시점에 등록된 메일을 자동으로 발송합니다.</span>
      </div>
      <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)',marginBottom:24}}>
        {tabs.map(t => (
          <div key={t.id}
            onClick={()=>setTab(t.id)}
            style={{
              padding:'12px 20px',
              cursor:'pointer',
              fontSize:13,
              fontWeight: tab===t.id ? 700 : 500,
              color: tab===t.id ? '#F6AD09' : 'var(--sub)',
              borderBottom: tab===t.id ? '2px solid #F6AD09' : '2px solid transparent',
              marginBottom:'-1px',
              userSelect:'none',
            }}>
            {t.label}
          </div>
        ))}
      </div>
      {tab==='register' && <AutoDeliveryRegisterTab currentUserEmail={currentUserEmail}/>}
      {tab==='history'  && <AutoDeliveryHistoryTab/>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// AutoDeliveryRegisterTab — 템플릿 등록/관리 (목록 + KPI + 모달)
// ─────────────────────────────────────────────────────────────────────────────
function AutoDeliveryRegisterTab({ currentUserEmail }) {
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchTerm, setSearchTerm] = useState('');
  const [activeFilter, setActiveFilter] = useState('all');
  const [modalOpen, setModalOpen] = useState(false);
  const [editingTemplate, setEditingTemplate] = useState(null);

  // ─── 수동 발송 다이얼로그 (Phase D-2-3) ─────────────────────────────────────
  const [manualOpen, setManualOpen] = useState(false);
  const [manualTpl, setManualTpl] = useState(null);          // 발송 대상 템플릿
  const [manualOrderId, setManualOrderId] = useState('');    // 입력한 주문번호
  const [manualStep, setManualStep] = useState('input');     // input | confirm | sending | done
  const [manualLookup, setManualLookup] = useState(null);    // Cafe24 조회 결과
  const [manualEmail, setManualEmail] = useState('');        // 받는 이메일 (수정 가능)
  const [manualError, setManualError] = useState('');
  const [manualResult, setManualResult] = useState(null);    // 발송 결과

  const fmtIsoLocal = (iso) => {
    if (!iso) return '-';
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  // HTML 태그 제거하고 일반 텍스트만 추출 (미리보기 컬럼용)
  const stripHtml = (html) => {
    if (!html) return '';
    return String(html).replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
  };

  const load = async () => {
    setLoading(true);
    try {
      const { data, error } = await sb.from('auto_delivery_templates')
        .select('*')
        .order('updated_at', { ascending: false });
      if (error) throw error;
      setTemplates(data || []);
    } catch (e) {
      console.error('[AutoDeliveryRegisterTab] 로드 실패:', e);
      alert('템플릿 로드 실패: ' + (e.message || e));
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { load(); }, []);

  const toggleActive = async (tpl) => {
    try {
      // 활성 토글은 '수정'이 아닌 운영 스위치
      // → updated_at/updated_by를 갱신하지 않아 행의 정렬 위치가 유지됨
      const { error } = await sb.from('auto_delivery_templates')
        .update({ is_active: !tpl.is_active })
        .eq('id', tpl.id);
      if (error) throw error;
      await load();
    } catch (e) {
      alert('활성 상태 변경 실패: ' + (e.message || e));
    }
  };

  const handleDelete = async (tpl) => {
    const confirmed = window.confirm(
      `정말 삭제하시겠어요?\n\n상품: ${tpl.product_name || tpl.product_code}\n\n` +
      `※ 일시 중단이 목적이라면 "활성 토글 OFF"를 권장합니다.`
    );
    if (!confirmed) return;
    try {
      const { error } = await sb.from('auto_delivery_templates').delete().eq('id', tpl.id);
      if (error) throw error;
      await load();
    } catch (e) {
      alert('삭제 실패: ' + (e.message || e));
    }
  };

  // 수동 발송 — 다이얼로그 열기 (Phase D-2-3)
  const handleManualSend = (tpl) => {
    if (!tpl.is_active) {
      alert('비활성 템플릿입니다. 먼저 활성 토글을 ON 해주세요.');
      return;
    }
    setManualTpl(tpl);
    setManualOrderId('');
    setManualStep('input');
    setManualLookup(null);
    setManualEmail('');
    setManualError('');
    setManualResult(null);
    setManualOpen(true);
  };

  // 주문번호로 Cafe24 조회 (Phase D-2-3)
  const doManualLookup = async () => {
    const orderId = (manualOrderId || '').trim();
    if (!orderId) {
      setManualError('주문번호를 입력해주세요.');
      return;
    }
    if (!manualTpl) {
      setManualError('템플릿 정보가 없습니다. 다이얼로그를 다시 열어주세요.');
      return;
    }
    setManualError('');
    setManualStep('sending');  // 임시로 sending 상태 (조회 중 = 발송 중과 동일 UI 패턴)
    try {
      const { data, error } = await sb.functions.invoke('cafe24-order-lookup', {
        body: {
          orderId: orderId,
          productCode: manualTpl.product_code,
        },
      });
      if (error) {
        setManualError('조회 실패: ' + (error.message || String(error)));
        setManualStep('input');
        return;
      }
      if (data?.error) {
        setManualError(data.error);
        setManualStep('input');
        // 매칭 실패 시 allItems가 있으면 lookup에 저장 (다이얼로그에서 보여주기 위함)
        if (data.allItems) setManualLookup(data);
        return;
      }
      if (!data?.matched) {
        setManualError(data?.error || '주문 매칭 실패');
        if (data?.allItems) setManualLookup(data);
        setManualStep('input');
        return;
      }
      // 매칭 성공 — 받는 이메일 자동 채움
      setManualLookup(data);
      setManualEmail(data.buyerEmail || '');
      setManualStep('confirm');
    } catch (e) {
      setManualError('조회 중 오류: ' + String(e?.message || e));
      setManualStep('input');
    }
  };

  // 실제 발송 (Phase D-2-3)
  const doManualSend = async () => {
    if (!manualTpl || !manualLookup) return;
    const email = (manualEmail || '').trim();
    if (!email) {
      setManualError('받는 이메일을 입력해주세요.');
      return;
    }
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      setManualError('이메일 형식이 올바르지 않습니다.');
      return;
    }
    setManualError('');
    setManualStep('sending');

    // 변수 치환 값 매핑 (비어있으면 '-'로 폴백)
    const fb = (v) => (v && String(v).trim()) ? String(v) : '-';
    const orderDateFmt = (iso) => {
      if (!iso) return '-';
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '-';
        const pad = n => String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } catch (_e) { return '-'; }
    };
    const m = manualLookup.matchedItem || {};
    const values = {
      '{고객명}':   (manualLookup.buyerName && String(manualLookup.buyerName).trim()) ? String(manualLookup.buyerName) : '고객',
      '{주문번호}': fb(manualLookup.orderId),
      '{상품명}':   fb(m.productName || manualTpl.product_name),
      '{옵션명}':   fb(m.optionValue),
      '{구매수량}': fb(m.quantity),
      '{주문일시}': orderDateFmt(manualLookup.orderDate),
      '{이메일}':   fb(email),  // 운영자가 수정한 이메일 사용
      '{연락처}':   fb(manualLookup.buyerCellphone),
    };

    // 변수 치환 + HTML 합성
    const finalSubject = renderTemplate(manualTpl.subject || '', values);
    const finalBody    = renderTemplate(manualTpl.body || '', values);
    const finalButtons = Array.isArray(manualTpl.buttons)
      ? manualTpl.buttons.filter(b => (b.label || '').trim() && (b.url || '').trim())
      : [];
    const finalHtml = composeEmailHtml(finalSubject, finalBody, finalButtons);

    try {
      const { data, error } = await sb.functions.invoke('auto-delivery-send', {
        body: {
          to: email,
          toName: manualLookup.buyerName || undefined,
          subject: finalSubject,
          html: finalHtml,
          triggeredBy: 'manual',
          templateId: manualTpl.id,
          productCode: manualTpl.product_code,
          productName: manualTpl.product_name,
          orderId: manualLookup.orderId,
          recipientName: manualLookup.buyerName || undefined,
        },
      });
      if (error) {
        setManualResult({ success: false, error: error.message || String(error) });
      } else if (data?.success === false) {
        setManualResult({ success: false, error: data.detail || data.error || '발송 실패' });
      } else {
        setManualResult({ success: true, messageId: data?.messageId || null });
      }
    } catch (e) {
      setManualResult({ success: false, error: String(e?.message || e) });
    }
    setManualStep('done');
  };

  const openNew = () => { setEditingTemplate(null); setModalOpen(true); };
  const openEdit = (tpl) => { setEditingTemplate(tpl); setModalOpen(true); };

  const norm = (s) => String(s||'').replace(/\s+/g,'').toLowerCase();
  const filtered = templates.filter(t => {
    if (activeFilter === 'active' && !t.is_active) return false;
    if (activeFilter === 'inactive' && t.is_active) return false;
    if (searchTerm.trim()) {
      const q = norm(searchTerm);
      const n = norm(t.product_name);
      const c = norm(t.product_code);
      if (!n.includes(q) && !c.includes(q)) return false;
    }
    return true;
  });

  const totalCount = templates.length;
  const activeCount = templates.filter(t => t.is_active).length;
  const inactiveCount = totalCount - activeCount;

  // 테이블 그리드: 상품 폭 축소 + 수동 발송 컬럼 추가
  const gridCols = 'minmax(140px,1.4fr) 80px minmax(140px,1.6fr) 55px 60px 130px 80px 100px';

  return (
    <>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:18}}>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>전체 템플릿</div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--text)'}}>{totalCount}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>활성</div>
          <div style={{fontSize:22,fontWeight:700,color:'#22d3a0'}}>{activeCount}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>비활성</div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--sub)'}}>{inactiveCount}</div>
        </div>
      </div>

      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
        <input
          type="text"
          value={searchTerm}
          onChange={e=>setSearchTerm(e.target.value)}
          placeholder="상품명 또는 상품코드 검색"
          style={{flex:1,padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}
        />
        <select
          value={activeFilter}
          onChange={e=>setActiveFilter(e.target.value)}
          style={{padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}
        >
          <option value="all">전체 상태</option>
          <option value="active">활성만</option>
          <option value="inactive">비활성만</option>
        </select>
        <button
          onClick={openNew}
          style={{padding:'8px 18px',background:'#F6AD09',color:'#0d1628',border:'1px solid #F6AD09',borderRadius:6,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}
        >+ 새 템플릿</button>
      </div>

      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:gridCols,gap:0,padding:'10px 12px',background:'#162244',fontSize:11,color:'var(--sub)',fontWeight:600,letterSpacing:'.04em'}}>
          <div>상품</div>
          <div>발송 채널</div>
          <div>본문 미리보기</div>
          <div style={{textAlign:'center'}}>버튼수</div>
          <div style={{textAlign:'center'}}>활성</div>
          <div>수정일시 / 등록일시</div>
          <div style={{textAlign:'center'}}>수동 발송</div>
          <div style={{textAlign:'center'}}>작업</div>
        </div>
        {loading ? (
          <div style={{padding:40,textAlign:'center',color:'var(--sub)',fontSize:13}}>로딩 중...</div>
        ) : filtered.length === 0 ? (
          <div style={{padding:40,textAlign:'center',color:'var(--sub)',fontSize:13}}>
            {templates.length === 0
              ? '아직 등록된 템플릿이 없습니다. 우상단 "+ 새 템플릿" 버튼으로 추가해주세요.'
              : '검색 조건에 맞는 템플릿이 없습니다.'}
          </div>
        ) : filtered.map(t => (
          <div key={t.id}
            style={{
              display:'grid',
              gridTemplateColumns:gridCols,
              gap:0,
              padding:'12px',
              borderBottom:'1px solid var(--border)',
              alignItems:'center',
              fontSize:12,
              opacity: t.is_active ? 1 : 0.55,
            }}>
            <div style={{minWidth:0,paddingRight:6}}>
              <div style={{fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.product_name || '(이름 없음)'}</div>
              <div style={{fontSize:10,color:'var(--sub)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.product_code}</div>
            </div>
            <div>
              <span style={{background:'rgba(96,165,250,.15)',color:'#60a5fa',fontSize:10,padding:'3px 8px',borderRadius:4,fontWeight:600}}>메일</span>
            </div>
            <div style={{color:'var(--sub)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0,paddingRight:8}}>
              {stripHtml(t.body).slice(0, 80) || '(본문 없음)'}
            </div>
            <div style={{textAlign:'center',color:'var(--text)'}}>
              {Array.isArray(t.buttons) ? t.buttons.length : 0}
            </div>
            <div style={{textAlign:'center'}}>
              <label style={{position:'relative',display:'inline-block',width:28,height:16,cursor:'pointer'}}>
                <input type="checkbox" checked={t.is_active} onChange={()=>toggleActive(t)} style={{opacity:0,width:0,height:0}}/>
                <span style={{position:'absolute',top:0,left:0,right:0,bottom:0,background: t.is_active ? '#22d3a0' : 'var(--border)',borderRadius:8,transition:'background 0.2s'}}>
                  <span style={{position:'absolute',top:2,left: t.is_active ? 14 : 2,width:12,height:12,background:'#fff',borderRadius:'50%',transition:'left 0.2s'}}/>
                </span>
              </label>
            </div>
            <div style={{fontSize:11,color:'var(--sub)',lineHeight:1.5}}>
              <div style={{color:'var(--text)'}}>{fmtIsoLocal(t.updated_at)}</div>
              <div style={{fontSize:10,marginTop:2}}>등록 {fmtIsoLocal(t.created_at)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <button onClick={()=>handleManualSend(t)}
                style={{padding:'4px 10px',background:'rgba(96,165,250,.15)',border:'1px solid rgba(96,165,250,.3)',borderRadius:4,color:'#60a5fa',fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}
                title="해당 템플릿으로 특정 주문에 수동 발송 (Phase D 후 활성화)">
                📨 발송
              </button>
            </div>
            <div style={{textAlign:'center',display:'flex',gap:8,justifyContent:'center'}}>
              <button onClick={()=>openEdit(t)} style={{background:'none',border:'none',color:'#60a5fa',cursor:'pointer',fontSize:11,padding:0,fontFamily:'inherit'}}>수정</button>
              <span style={{color:'var(--sub)'}}>·</span>
              <button onClick={()=>handleDelete(t)} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:11,padding:0,fontFamily:'inherit'}}>삭제</button>
            </div>
          </div>
        ))}
      </div>

      {modalOpen && (
        <AutoDeliveryModal
          editingTemplate={editingTemplate}
          currentUserEmail={currentUserEmail}
          onClose={()=>setModalOpen(false)}
          onSaved={()=>load()}
        />
      )}

      {/* 수동 발송 다이얼로그 (Phase D-2-3) */}
      {manualOpen && <ManualSendDialog
        tpl={manualTpl}
        orderId={manualOrderId}
        setOrderId={setManualOrderId}
        step={manualStep}
        lookup={manualLookup}
        email={manualEmail}
        setEmail={setManualEmail}
        error={manualError}
        result={manualResult}
        onLookup={doManualLookup}
        onSend={doManualSend}
        onClose={()=>setManualOpen(false)}
        onReset={()=>{
          setManualStep('input');
          setManualLookup(null);
          setManualEmail('');
          setManualError('');
          setManualResult(null);
        }}
      />}
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ManualSendDialog — 수동 발송 다이얼로그 (Phase D-2-3)
// ─────────────────────────────────────────────────────────────────────────────
function ManualSendDialog({ tpl, orderId, setOrderId, step, lookup, email, setEmail, error, result, onLookup, onSend, onClose, onReset }) {
  // ESC 키 닫기
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && step !== 'sending') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [step, onClose]);

  const onOverlayMouseDown = (e) => {
    // overlay 자체에 mouseDown이 시작된 경우만 닫음
    // (모달 내부에서 텍스트 드래그가 overlay로 끝나는 경우는 무시)
    if (e.target === e.currentTarget && step !== 'sending') onClose();
  };

  // 주문 미리보기 헬퍼
  const fb = (v) => (v && String(v).trim()) ? String(v) : '-';
  const orderDateFmt = (iso) => {
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '-';
      const pad = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    } catch (_e) { return '-'; }
  };

  // 변수 치환 미리보기 (confirm 단계에서)
  let previewSubject = '', previewBody = '', previewButtons = [];
  if (step === 'confirm' && lookup && tpl) {
    const m = lookup.matchedItem || {};
    const values = {
      '{고객명}':   (lookup.buyerName && String(lookup.buyerName).trim()) ? String(lookup.buyerName) : '고객',
      '{주문번호}': fb(lookup.orderId),
      '{상품명}':   fb(m.productName || tpl.product_name),
      '{옵션명}':   fb(m.optionValue),
      '{구매수량}': fb(m.quantity),
      '{주문일시}': orderDateFmt(lookup.orderDate),
      '{이메일}':   fb(email),
      '{연락처}':   fb(lookup.buyerCellphone),
    };
    previewSubject = renderTemplate(tpl.subject || '', values);
    previewBody    = renderTemplate(tpl.body || '', values);
    previewButtons = Array.isArray(tpl.buttons)
      ? tpl.buttons.filter(b => (b.label || '').trim() && (b.url || '').trim())
      : [];
  }

  const labelStyle = {display:'block',fontSize:11,color:'var(--sub)',marginBottom:4,fontWeight:600,letterSpacing:'.04em'};

  return (
    <div
      style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.6)',zIndex:1100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}
      onMouseDown={onOverlayMouseDown}
    >
      <div
        style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,width:'100%',maxWidth:560,display:'flex',flexDirection:'column',overflow:'hidden',maxHeight:'90vh'}}
        onClick={e => e.stopPropagation()}
      >
        <div style={{padding:'14px 18px',background:'#162244',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:'#fff'}}>📨 수동 발송</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:3,lineHeight:1.5}}>
              {tpl?.product_name || tpl?.product_code} · 주문번호로 조회 후 발송합니다.
            </div>
          </div>
          <button
            onClick={onClose}
            disabled={step === 'sending'}
            style={{background:'none',border:'none',color:'var(--sub)',fontSize:18,cursor: step==='sending'?'not-allowed':'pointer',lineHeight:1,padding:0,marginLeft:8}}
            aria-label="닫기"
          >✕</button>
        </div>

        <div style={{padding:'16px 18px',overflowY:'auto',flex:1}}>

          {/* [STEP 1] 주문번호 입력 */}
          {step === 'input' && (
            <>
              <label style={labelStyle}>주문번호 <span style={{color:'#f87171'}}>*</span></label>
              <input
                type="text"
                value={orderId}
                onChange={e => setOrderId(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && onLookup()}
                placeholder="예: 20260518-0020464"
                autoFocus
                style={{width:'100%',padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
              />
              <div style={{fontSize:10,color:'var(--sub)',marginTop:6,lineHeight:1.5}}>
                ℹ️ Cafe24 주문번호를 정확히 입력해주세요. 조회 후 받는 이메일을 확인할 수 있어요.
              </div>

              {error && (
                <div style={{marginTop:14,padding:'10px 12px',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.25)',borderRadius:6,fontSize:12,color:'#f87171',lineHeight:1.5}}>
                  {error}
                  {lookup && Array.isArray(lookup.allItems) && lookup.allItems.length > 0 && (
                    <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(248,113,113,.2)'}}>
                      <div style={{fontSize:11,color:'var(--sub)',marginBottom:4}}>이 주문의 상품 목록:</div>
                      {lookup.allItems.map((it, i) => (
                        <div key={i} style={{fontSize:11,color:'var(--text)',padding:'3px 0'}}>
                          • {it.productName} <span style={{color:'var(--sub)',fontFamily:'monospace',fontSize:10}}>{it.productCode}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </>
          )}

          {/* [STEP 2] 조회 성공 — 정보 + 이메일 수정 + 미리보기 + 발송 */}
          {step === 'confirm' && lookup && (
            <>
              <div style={{padding:'10px 12px',background:'rgba(34,211,160,.08)',border:'1px solid rgba(34,211,160,.25)',borderRadius:6,fontSize:11,color:'#22d3a0',marginBottom:14}}>
                ✓ 주문 조회 성공
              </div>

              {/* 주문 정보 */}
              <div style={{padding:'12px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,marginBottom:14}}>
                <div style={{fontSize:10,color:'var(--sub)',marginBottom:8,fontWeight:600,letterSpacing:'.04em'}}>주문 정보</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
                  <div>
                    <div style={{color:'var(--sub)',fontSize:10,marginBottom:2}}>주문자</div>
                    <div style={{color:'var(--text)'}}>{fb(lookup.buyerName)}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--sub)',fontSize:10,marginBottom:2}}>주문일시</div>
                    <div style={{color:'var(--text)'}}>{orderDateFmt(lookup.orderDate)}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--sub)',fontSize:10,marginBottom:2}}>주문번호</div>
                    <div style={{color:'var(--text)',fontFamily:'monospace',fontSize:11}}>{fb(lookup.orderId)}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--sub)',fontSize:10,marginBottom:2}}>연락처</div>
                    <div style={{color:'var(--text)'}}>{fb(lookup.buyerCellphone)}</div>
                  </div>
                  <div style={{gridColumn:'1 / -1'}}>
                    <div style={{color:'var(--sub)',fontSize:10,marginBottom:2}}>상품 / 옵션</div>
                    <div style={{color:'var(--text)'}}>{fb(lookup.matchedItem?.productName)} <span style={{color:'var(--sub)'}}>· 수량 {fb(lookup.matchedItem?.quantity)}</span></div>
                    <div style={{color:'var(--sub)',fontSize:11,marginTop:2,whiteSpace:'pre-wrap',lineHeight:1.5}}>{lookup.matchedItem?.optionValue || '-'}</div>
                  </div>
                </div>
              </div>

              {/* 경고 표시 */}
              {Array.isArray(lookup.warnings) && lookup.warnings.length > 0 && (
                <div style={{marginBottom:14,padding:'10px 12px',background:'rgba(246,173,9,.08)',border:'1px solid rgba(246,173,9,.25)',borderRadius:6}}>
                  <div style={{fontSize:11,color:'#F6AD09',fontWeight:600,marginBottom:4}}>⚠️ 확인 필요</div>
                  {lookup.warnings.map((w, i) => (
                    <div key={i} style={{fontSize:11,color:'var(--text)',lineHeight:1.6}}>• {w}</div>
                  ))}
                </div>
              )}

              {/* 받는 이메일 (수정 가능) */}
              <label style={labelStyle}>받는 이메일 <span style={{color:'#f87171'}}>*</span></label>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                placeholder="example@gmail.com"
                style={{width:'100%',padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box',marginBottom:6}}
              />
              <div style={{fontSize:10,color:'var(--sub)',marginBottom:14,lineHeight:1.5}}>
                옵션명에서 자동 추출한 이메일이에요. 필요하면 수정 후 발송하세요.
              </div>

              {/* 발송될 메일 미리보기 */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:'var(--sub)',fontWeight:600,letterSpacing:'.04em',marginBottom:6}}>발송될 메일 미리보기</div>
                <div style={{padding:'10px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,marginBottom:8}}>
                  <div style={{fontSize:10,color:'var(--sub)',marginBottom:3}}>제목</div>
                  <div style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{previewSubject || '(제목 없음)'}</div>
                </div>
                {previewBody && (
                  <div>
                    <div style={{fontSize:10,color:'var(--sub)',marginBottom:6}}>본문 (실제 발송 외관)</div>
                    <iframe
                      srcDoc={composeEmailHtml(previewSubject, previewBody, previewButtons)}
                      sandbox=""
                      style={{width:'100%',height:340,border:'1px solid var(--border)',borderRadius:6,background:'#fff'}}
                      title="manual-send-preview"
                    />
                  </div>
                )}
              </div>

              {error && (
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.25)',borderRadius:6,fontSize:12,color:'#f87171'}}>
                  {error}
                </div>
              )}
            </>
          )}

          {/* [STEP 3] 발송 중 */}
          {step === 'sending' && (
            <div style={{padding:'40px 20px',textAlign:'center',color:'var(--text)',fontSize:13}}>
              <div style={{fontSize:24,marginBottom:12}}>⏳</div>
              <div>{lookup ? '발송 중...' : '주문 조회 중...'}</div>
            </div>
          )}

          {/* [STEP 4] 발송 완료 */}
          {step === 'done' && result && (
            <div style={{padding:'20px 12px',textAlign:'center'}}>
              {result.success ? (
                <>
                  <div style={{fontSize:28,marginBottom:10}}>✓</div>
                  <div style={{fontSize:14,fontWeight:600,color:'#22d3a0',marginBottom:6}}>발송 성공</div>
                  <div style={{fontSize:11,color:'var(--sub)',marginBottom:14}}>{email}</div>
                  {result.messageId && (
                    <div style={{fontSize:10,color:'var(--sub)',fontFamily:'monospace',padding:'6px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,display:'inline-block'}}>
                      {result.messageId}
                    </div>
                  )}
                  <div style={{fontSize:11,color:'var(--sub)',marginTop:14,lineHeight:1.6}}>
                    발송 내역 탭에서 상세 내용을 확인할 수 있어요.
                  </div>
                </>
              ) : (
                <>
                  <div style={{fontSize:28,marginBottom:10,color:'#f87171'}}>✗</div>
                  <div style={{fontSize:14,fontWeight:600,color:'#f87171',marginBottom:8}}>발송 실패</div>
                  <div style={{fontSize:11,color:'var(--text)',padding:'10px 12px',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.25)',borderRadius:6,wordBreak:'break-all',lineHeight:1.5}}>
                    {result.error || '알 수 없는 오류'}
                  </div>
                  <div style={{fontSize:11,color:'var(--sub)',marginTop:14,lineHeight:1.6}}>
                    실패 이력은 발송 내역 탭에서 확인할 수 있어요.
                  </div>
                </>
              )}
            </div>
          )}

        </div>

        {/* 푸터 — step에 따라 버튼 변경 */}
        <div style={{padding:'12px 18px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8,background:'#162244'}}>
          {step === 'input' && (
            <>
              <button
                onClick={onClose}
                style={{padding:'7px 14px',background:'transparent',border:'1px solid var(--border)',borderRadius:6,fontSize:12,cursor:'pointer',color:'var(--sub)',fontFamily:'inherit'}}
              >취소</button>
              <button
                onClick={onLookup}
                style={{padding:'7px 18px',background:'#F6AD09',color:'#0d1628',border:'1px solid #F6AD09',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}
              >조회</button>
            </>
          )}
          {step === 'confirm' && (
            <>
              <button
                onClick={onReset}
                style={{padding:'7px 14px',background:'transparent',border:'1px solid var(--border)',borderRadius:6,fontSize:12,cursor:'pointer',color:'var(--sub)',fontFamily:'inherit'}}
              >다른 주문</button>
              <button
                onClick={onSend}
                style={{padding:'7px 18px',background:'#F6AD09',color:'#0d1628',border:'1px solid #F6AD09',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}
              >📨 발송하기</button>
            </>
          )}
          {step === 'sending' && (
            <button
              disabled
              style={{padding:'7px 18px',background:'rgba(246,173,9,0.4)',color:'#0d1628',border:'1px solid rgba(246,173,9,0.4)',borderRadius:6,fontSize:12,cursor:'not-allowed',fontWeight:700,fontFamily:'inherit'}}
            >진행 중...</button>
          )}
          {step === 'done' && (
            <>
              <button
                onClick={onReset}
                style={{padding:'7px 14px',background:'transparent',border:'1px solid var(--border)',borderRadius:6,fontSize:12,cursor:'pointer',color:'var(--sub)',fontFamily:'inherit'}}
              >다른 주문 발송</button>
              <button
                onClick={onClose}
                style={{padding:'7px 18px',background:'#F6AD09',color:'#0d1628',border:'1px solid #F6AD09',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}
              >닫기</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// AutoDeliveryHistoryTab — 발송 내역 조회 (auto_delivery_logs)
// 현재는 빈 상태 (Phase D 발송 기능 완성 후 자동으로 데이터 차오름)
// ─────────────────────────────────────────────────────────────────────────────
function AutoDeliveryHistoryTab() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [statusFilter, setStatusFilter] = useState('all');
  const [triggerFilter, setTriggerFilter] = useState('all');
  const [searchTerm, setSearchTerm] = useState('');
  const [expandedId, setExpandedId] = useState(null);  // 클릭한 행 expand

  const fmtIsoLocal = (iso) => {
    if (!iso) return '-';
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  const load = async () => {
    setLoading(true);
    try {
      // 정렬: created_at 기준 (sent_at은 dry-run에서 null이라 부적합)
      // 화면에 표시되는 시각은 sent_at || created_at로 그대로 사용
      const { data, error } = await sb.from('auto_delivery_logs')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(200);
      if (error) throw error;
      setLogs(data || []);
    } catch (e) {
      console.error('[AutoDeliveryHistoryTab] 로드 실패:', e);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { load(); }, []);

  // 필터
  const norm = (s) => String(s||'').replace(/\s+/g,'').toLowerCase();
  const filtered = logs.filter(l => {
    if (statusFilter !== 'all' && l.status !== statusFilter) return false;
    if (triggerFilter !== 'all' && l.triggered_by !== triggerFilter) return false;
    if (searchTerm.trim()) {
      const q = norm(searchTerm);
      const ok = [l.order_id, l.product_code, l.recipient_email, l.recipient_name]
        .some(v => norm(v).includes(q));
      if (!ok) return false;
    }
    return true;
  });

  // KPI
  const totalCount = logs.length;
  const successCount = logs.filter(l => l.status === 'success').length;
  const failedCount = logs.filter(l => l.status === 'failed').length;
  const pendingCount = logs.filter(l => l.status === 'pending').length;

  const statusBadge = (status) => {
    const map = {
      success: { bg:'rgba(34,211,160,.15)', color:'#22d3a0', label:'성공' },
      failed:  { bg:'rgba(248,113,113,.15)', color:'#f87171', label:'실패' },
      pending: { bg:'rgba(246,173,9,.15)',  color:'#F6AD09', label:'대기' },
    };
    const s = map[status] || { bg:'var(--border)', color:'var(--sub)', label:status };
    return <span style={{background:s.bg,color:s.color,fontSize:10,padding:'3px 8px',borderRadius:4,fontWeight:600}}>{s.label}</span>;
  };

  const triggerLabel = (t) => {
    if (t === 'auto') return '자동';
    if (t === 'manual') return '수동';
    if (t === 'resend') return '재발송';
    if (t === 'test') return '테스트';
    return t || '-';
  };

  const toggleExpand = (id) => {
    setExpandedId(prev => prev === id ? null : id);
  };

  return (
    <>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>전체 발송</div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--text)'}}>{totalCount}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>성공</div>
          <div style={{fontSize:22,fontWeight:700,color:'#22d3a0'}}>{successCount}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>실패</div>
          <div style={{fontSize:22,fontWeight:700,color:'#f87171'}}>{failedCount}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:14}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6}}>대기</div>
          <div style={{fontSize:22,fontWeight:700,color:'#F6AD09'}}>{pendingCount}</div>
        </div>
      </div>

      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
        <input
          type="text"
          value={searchTerm}
          onChange={e=>setSearchTerm(e.target.value)}
          placeholder="주문번호, 상품코드, 수신자로 검색"
          style={{flex:1,padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}
        />
        <select
          value={statusFilter}
          onChange={e=>setStatusFilter(e.target.value)}
          style={{padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}
        >
          <option value="all">전체 상태</option>
          <option value="success">성공</option>
          <option value="failed">실패</option>
          <option value="pending">대기</option>
        </select>
        <select
          value={triggerFilter}
          onChange={e=>setTriggerFilter(e.target.value)}
          style={{padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}
        >
          <option value="all">전체 트리거</option>
          <option value="auto">자동</option>
          <option value="manual">수동</option>
          <option value="test">테스트</option>
          <option value="resend">재발송</option>
        </select>
      </div>

      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'24px 130px 130px 1fr 180px 70px 80px',gap:0,padding:'10px 12px',background:'#162244',fontSize:11,color:'var(--sub)',fontWeight:600,letterSpacing:'.04em'}}>
          <div></div>
          <div>발송일시</div>
          <div>주문번호</div>
          <div>상품 / 제목</div>
          <div>수신자</div>
          <div style={{textAlign:'center'}}>상태</div>
          <div style={{textAlign:'center'}}>트리거</div>
        </div>
        {loading ? (
          <div style={{padding:40,textAlign:'center',color:'var(--sub)',fontSize:13}}>로딩 중...</div>
        ) : filtered.length === 0 ? (
          <div style={{padding:'60px 20px',textAlign:'center',color:'var(--sub)',fontSize:13,lineHeight:1.7}}>
            {logs.length === 0
              ? <>아직 발송 이력이 없습니다.<br/><span style={{fontSize:11,color:'var(--sub)'}}>Phase D(자동 발송 기능) 완성 후 자동으로 데이터가 쌓입니다.</span></>
              : '검색 조건에 맞는 발송 이력이 없습니다.'}
          </div>
        ) : filtered.map(l => {
          const isExpanded = expandedId === l.id;
          return (
            <React.Fragment key={l.id}>
              <div
                onClick={() => toggleExpand(l.id)}
                style={{
                  display:'grid',
                  gridTemplateColumns:'24px 130px 130px 1fr 180px 70px 80px',
                  gap:0,
                  padding:'12px',
                  borderBottom: isExpanded ? '1px solid var(--border)' : '1px solid var(--border)',
                  alignItems:'center',
                  fontSize:12,
                  cursor:'pointer',
                  background: isExpanded ? 'rgba(246,173,9,0.05)' : 'transparent',
                }}>
                <div style={{textAlign:'center',color:'var(--sub)',fontSize:10}}>
                  {isExpanded ? '▼' : '▶'}
                </div>
                <div style={{color:'var(--text)',fontSize:11}}>{fmtIsoLocal(l.sent_at || l.created_at)}</div>
                <div style={{color:'var(--sub)',fontSize:11,fontFamily:'monospace'}}>{l.order_id || '-'}</div>
                <div style={{minWidth:0,paddingRight:8}}>
                  <div style={{color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.rendered_subject || '(제목 없음)'}</div>
                  <div style={{fontSize:10,color:'var(--sub)',marginTop:2}}>{l.product_code || '-'}</div>
                </div>
                <div style={{fontSize:11,color:'var(--sub)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.recipient_email || '-'}</div>
                <div style={{textAlign:'center'}}>{statusBadge(l.status)}</div>
                <div style={{textAlign:'center',fontSize:10,color:'var(--sub)'}}>{triggerLabel(l.triggered_by)}</div>
              </div>

              {isExpanded && (
                <div style={{background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'16px 20px'}}>
                  {/* 메타 정보 */}

function DelayAlimtalkPreview({ selectedProduct, variants, selectedVariantCodes, allVariants, reasonText, etaDate, editingRow }){
  const isEdit = !!editingRow;
  // 미리보기에 표시할 옵션 텍스트 (Q2의 c 안: 첫 선택 옵션만 표시)
  const previewOption = (()=>{
    if(isEdit){
      // 편집 모드: editingRow의 옵션 그대로
      return editingRow.option_text_snapshot || '단일 옵션';
    }
    if(!selectedProduct) return '{옵션}';
    if(allVariants || variants.length===0) return '단일 옵션';
    if(selectedVariantCodes.size===0) return '{옵션}';
    const firstSelected = Array.from(selectedVariantCodes)[0];
    const v = variants.find(x=>x.variant_code===firstSelected);
    return v?.option_text || '{옵션}';

  const totalSendCount = (()=>{
    if(isEdit) return 1;  // 편집 모드는 단일 행

    return selectedVariantCodes.size;

  const productName = selectedProduct?.product_name || '{상품명}';

  const isVar = (s)=>typeof s==='string' && s.startsWith('{') && s.endsWith('}');
  const renderVal = (val,key)=> isVar(val) ? <span key={key} style={varStyle}>{val}</span> : <span key={key} style={{color:'#222'}}>{val}</span>;

    <div style={{position:'sticky',top:0}}>

      {/* 발송 건수 안내 */}

        )}
      </div>

      {/* 카카오톡 풍 미리보기 */}
      <div style={{background:'#9BBBD4',borderRadius:12,padding:'12px 10px',fontFamily:'Pretendard, sans-serif'}}>
        {/* 상단 헤더 */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,paddingLeft:4}}>
          <div style={{width:32,height:32,borderRadius:8,background:'#2A478D',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>원룸</div>

        {/* 노란 알림톡 도착 헤더 */}
        <div style={{background:'#FEE500',padding:'8px 14px',borderTopLeftRadius:10,borderTopRightRadius:10,fontSize:12,fontWeight:700,color:'#222',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>알림톡 도착</span>

function DelayHistoryTab(){
  // ─── 필터 state ──────────────────────────────────────────────────────
  const todayStr = new Date().toISOString().slice(0,10);
  const weekAgoStr = (()=>{ const d=new Date(); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();
  const [dateFrom,setDateFrom] = useState(weekAgoStr);
  const [dateTo,setDateTo] = useState(todayStr);
  const [statusFilter,setStatusFilter] = useState('all');     // all | success | failed | scheduled | queued
  const [channelFilter,setChannelFilter] = useState('all');   // all | alimtalk | sms | lms
  const [supplierFilter,setSupplierFilter] = useState('all');
  const [triggerFilter,setTriggerFilter] = useState('all');   // all | blast | poll
  const [search,setSearch] = useState('');

  // ─── 데이터 state ─────────────────────────────────────────────────────
  const [rows,setRows] = useState([]);
  const [total,setTotal] = useState(0);
  const [loading,setLoading] = useState(false);
  const [page,setPage] = useState(0);
  const PAGE = 50;
  const prevPageRef = useRef(0);  // 마지막으로 로드한 페이지 (중복/누락 로드 방지)
  const [supplierList,setSupplierList] = useState([]);
  const [kpi,setKpi] = useState({total:0, alimtalk_success:0, sms_fallback:0, failed:0});

  // 마스킹 해제 상태 (행별 토글)
  const [unmaskedIds,setUnmaskedIds] = useState(new Set());

  // 펼침 행
  const [expandedId,setExpandedId] = useState(null);

  // ─── 필터 → 쿼리 빌더 ─────────────────────────────────────────────────
  const buildQuery = (selectCols, isCount=false)=>{
    let q = sb.from('delay_notifications').select(selectCols, isCount?{count:'exact',head:isCount&&!selectCols}:{});
    // 기간 필터 (sent_at)
    if(dateFrom) q = q.gte('sent_at', dateFrom+'T00:00:00');
    if(dateTo)   q = q.lte('sent_at', dateTo  +'T23:59:59');
    // 상태/채널/트리거
    if(statusFilter!=='all')  q = q.eq('status', statusFilter);
    if(channelFilter!=='all') q = q.eq('channel', channelFilter);
    if(triggerFilter!=='all') q = q.eq('trigger_type', triggerFilter);
    // 검색 (상품명/주문번호/고객명 ILIKE)
    if(search.trim()){
      const term = search.trim();
      q = q.or(`product_name_snapshot.ilike.%${term}%,order_id.ilike.%${term}%,customer_name.ilike.%${term}%`);
    }
    return q;
  };

  // ─── 데이터 로드 ──────────────────────────────────────────────────────
  const load = async(pageIdx)=>{
    setLoading(true);
    try {
      // 페이지 데이터
      const from = pageIdx*PAGE;
      const to   = from + PAGE - 1;
      let q = buildQuery('*', true)  // count:'exact' 포함 → total 집계 (페이지네이션 표시용)
        .order('sent_at', {ascending:false})
        .range(from, to);
      const {data,error,count} = await q;
      if(error) throw error;

      // 공급사 필터는 클라이언트에서 (delay_notifications에는 공급사 컬럼 없음 → product code 조인 필요)
      // products 테이블과 별도로 조인하는 대신, 이미 등록 시 supplier_name_snapshot 있으면 거기 사용
      // 현재 delay_notifications 스키마에는 supplier_name이 없으므로 product_code → products 조회로 보강
      const codes = [...new Set((data||[]).map(r=>r.product_code))];
      let supplierMap = {};
      if(codes.length>0){
        const {data:prods} = await sb.from('products').select('product_code,supplier_name').in('product_code',codes);
        (prods||[]).forEach(p=>{ supplierMap[p.product_code] = p.supplier_name; });
      }
      let merged = (data||[]).map(r=>({...r, supplier_name: supplierMap[r.product_code]||null}));
      // 공급사 필터 (클라이언트)
      if(supplierFilter!=='all'){
        merged = merged.filter(r=>r.supplier_name===supplierFilter);
      }
      setRows(merged);
      setTotal(count||0);
    } catch(e){
      console.error('발송 내역 로드 실패:',e);
      alert('발송 내역 조회 실패: '+(e?.message||e));
    } finally {
      setLoading(false);
    }
  };

  // KPI 별도 조회 (현재 필터 기반)
  const loadKpi = async()=>{
    try {
      const baseQuery = ()=>buildQuery(null, true);
      // 총 발송
      const {count:totalCount} = await baseQuery();
      // 알림톡 성공 (channel=alimtalk + status=success)
      const {count:alimtalkCount} = await buildQuery(null,true).eq('channel','alimtalk').eq('status','success');
      // SMS/LMS 폴백 (channel=sms or lms + status=success)
      const {count:smsCount} = await buildQuery(null,true).in('channel',['sms','lms']).eq('status','success');
      // 실패
      const {count:failedCount} = await buildQuery(null,true).eq('status','failed');
      setKpi({total:totalCount||0, alimtalk_success:alimtalkCount||0, sms_fallback:smsCount||0, failed:failedCount||0});
    } catch(e){
      console.error('KPI 로드 실패:',e);
    }
  };

  // 공급사 distinct 로드 (1회)
  useEffect(()=>{
    sb.from('products').select('supplier_name').then(({data})=>{
      const uniq = [...new Set((data||[]).map(r=>r.supplier_name).filter(Boolean))].sort();
      setSupplierList(uniq);
    });
  },[]);

  // 필터 바뀌면 1페이지부터 다시 로드 + KPI 재계산
  useEffect(()=>{
    prevPageRef.current = 0;  // 필터 변경 시 page effect의 중복 로드 방지
    setPage(0);
    load(0);
    loadKpi();
  },[dateFrom,dateTo,statusFilter,channelFilter,supplierFilter,triggerFilter,search]);

  // 페이지 변경 시 (이전 로드 페이지와 다를 때만 — 0페이지 복귀 포함, 필터 변경 직후 중복 로드는 제외)
  useEffect(()=>{
    if(prevPageRef.current !== page){
      prevPageRef.current = page;
      load(page);
    }
  },[page]);

  // ─── CSV 다운로드 ─────────────────────────────────────────────────────
  const handleCsvDownload = async()=>{
    try {
      // 1. 먼저 필터 결과 총 건수 조회 (count head)
      const {count:totalCount} = await buildQuery(null, true);
      const actualTotal = totalCount || 0;

      // 2. 5000건 초과 시 안내
      const CSV_LIMIT = 5000;
      if(actualTotal > CSV_LIMIT){
        if(!window.confirm(
          `현재 필터 결과는 ${actualTotal.toLocaleString()}건입니다.\n` +
          `CSV는 최대 ${CSV_LIMIT.toLocaleString()}건까지만 다운로드 가능합니다.\n\n` +
          `최근 ${CSV_LIMIT.toLocaleString()}건만 다운로드됩니다. 계속하시겠습니까?\n\n` +
          `(전체 데이터가 필요하시면 기간/필터를 좁혀서 여러 번 나눠 받아주세요.)`
        )){
          return;
        }
      }

      // 3. 현재 필터 그대로 + 최대 5000건
      let q = buildQuery('*', false).order('sent_at',{ascending:false}).range(0, CSV_LIMIT-1);
      const {data,error} = await q;
      if(error) throw error;
      // 공급사 보강
      const codes = [...new Set((data||[]).map(r=>r.product_code))];
      let supplierMap = {};
      if(codes.length>0){
        const {data:prods} = await sb.from('products').select('product_code,supplier_name').in('product_code',codes);
        (prods||[]).forEach(p=>{ supplierMap[p.product_code] = p.supplier_name; });
      }
      let merged = (data||[]).map(r=>({...r, supplier_name: supplierMap[r.product_code]||''}));
      if(supplierFilter!=='all'){
        merged = merged.filter(r=>r.supplier_name===supplierFilter);
      }

      // CSV 빌드
      const headers = ['발송일시','상품명','옵션','공급사','주문번호','고객명','휴대폰','채널','상태','트리거','발송자','에러메시지'];
      const lines = [headers.join(',')];
      merged.forEach(r=>{
        const line = [
          fmtIsoLocal(r.sent_at),
          csvEscape(r.product_name_snapshot),
          csvEscape(r.option_text_snapshot),
          csvEscape(r.supplier_name),
          csvEscape(r.order_id),
          csvEscape(r.customer_name),
          csvEscape(r.customer_phone),
          csvEscape(r.channel),
          csvEscape(r.status),
          csvEscape(r.trigger_type),
          csvEscape(r.triggered_by),
          csvEscape(r.error_message),
        ].join(',');
        lines.push(line);
      });
      const csv = '\uFEFF' + lines.join('\n');  // BOM for Excel

      const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `발송내역_${dateFrom}_${dateTo}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e){
      console.error('CSV 다운로드 실패:',e);
      alert('CSV 다운로드 실패: '+(e?.message||e));
    }
  };

  // ─── 헬퍼 ─────────────────────────────────────────────────────────────
  const fmtIsoLocal = (iso)=>{
    if(!iso) return '-';
    const d = new Date(iso);
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const csvEscape = (v)=>{
    if(v===null||v===undefined) return '';
    const s = String(v);
    if(s.includes(',')||s.includes('"')||s.includes('\n')){
      return '"'+s.replace(/"/g,'""')+'"';
    }
    return s;
  };
  const maskName = (name)=>{
    if(!name) return '-';
    if(name.length<=1) return name;
    if(name.length===2) return name[0]+'*';
    return name[0]+'*'.repeat(name.length-2)+name[name.length-1];
  };
  const maskPhone = (phone)=>{
    if(!phone) return '-';
    const p = String(phone);
    if(p.length<8) return p;
    return p.slice(0,3)+'****'+p.slice(-4);
  };
  const toggleUnmask = (id)=>{
    setUnmaskedIds(prev=>{
      const n = new Set(prev);
      if(n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };
  const toggleExpand = (id)=>{
    setExpandedId(prev=>prev===id?null:id);
  };

  const totalPages = Math.max(1, Math.ceil(total/PAGE));
  const startIdx = total ? page*PAGE+1 : 0;
  const endIdx = Math.min((page+1)*PAGE, total);

  // 채널/상태/트리거 뱃지 스타일
  const channelBadge = (ch)=>{
    if(ch==='alimtalk') return {bg:'rgba(254,229,0,.18)', color:'#9c7c00', label:'알림톡'};
    if(ch==='sms')      return {bg:'rgba(143,168,208,.18)', color:'var(--sub)', label:'SMS'};
    if(ch==='lms')      return {bg:'rgba(143,168,208,.18)', color:'var(--sub)', label:'LMS'};
    return {bg:'rgba(143,168,208,.1)', color:'var(--sub)', label:ch||'-'};
  };
  const statusBadge = (st)=>{
    if(st==='success')   return {bg:'rgba(34,211,160,.15)', color:'#22d3a0', label:'성공'};
    if(st==='failed')    return {bg:'rgba(248,113,113,.15)', color:'#f87171', label:'실패'};
    if(st==='scheduled') return {bg:'rgba(123,111,232,.15)', color:'#7B6FE8', label:'예약'};
    if(st==='queued')    return {bg:'rgba(246,173,9,.15)', color:'#F6AD09', label:'대기'};
    return {bg:'rgba(143,168,208,.1)', color:'var(--sub)', label:st||'-'};
  };
  const triggerBadge = (tt)=>{
    if(tt==='blast') return {bg:'rgba(246,173,9,.15)', color:'#F6AD09', label:'즉시발송'};
    if(tt==='poll')  return {bg:'rgba(143,168,208,.12)', color:'var(--sub)', label:'신규주문'};
    return {bg:'rgba(143,168,208,.1)', color:'var(--sub)', label:tt||'-'};
  };

  return (
    <div className="section" style={{contain:'inline-size'}}>
      {/* 검색 + CSV + 새로고침 */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
        <input type="text" placeholder="상품명 / 주문번호 / 고객명 검색" value={search} onChange={e=>setSearch(e.target.value)}
          style={{flex:'1 1 240px',minWidth:0,padding:'10px 14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}/>
        <button onClick={()=>{load(page); loadKpi();}}
          style={{padding:'10px 14px',background:'transparent',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
          ↻ 새로고침
        </button>
        <button onClick={handleCsvDownload}
          style={{padding:'10px 16px',background:'#2A478D',border:'1px solid #2A478D',borderRadius:8,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
          ⬇ CSV 다운로드
        </button>
      </div>

      {/* 필터 바 */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,padding:'10px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>필터</span>
        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
          style={{padding:'7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}/>
        <span style={{color:'var(--sub)',fontSize:12}}>~</span>
        <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
          style={{padding:'7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}/>
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
          style={{padding:'7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}>
          <option value="all">상태: 전체</option>
          <option value="success">성공</option>
          <option value="failed">실패</option>
          <option value="scheduled">예약</option>
          <option value="queued">대기</option>
        </select>
        <select value={channelFilter} onChange={e=>setChannelFilter(e.target.value)}
          style={{padding:'7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}>
          <option value="all">채널: 전체</option>
          <option value="alimtalk">알림톡</option>
          <option value="sms">SMS</option>
          <option value="lms">LMS</option>
        </select>
        <div style={{position:'relative'}}>
          <input
            list="delay-history-supplier-list"
            value={supplierFilter==='all'?'':supplierFilter}
            onChange={e=>{
              const v = e.target.value.trim();
              setSupplierFilter(v===''?'all':v);
            }}
            placeholder="공급사 검색..."
            style={{padding:'7px 28px 7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none',width:160}}
          />
          {supplierFilter!=='all' && (
            <button
              onClick={()=>setSupplierFilter('all')}
              style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--sub)',cursor:'pointer',fontSize:14,padding:0,lineHeight:1}}
              title="공급사 필터 초기화">
              ×
            </button>
          )}
          <datalist id="delay-history-supplier-list">
            {supplierList.map(s=><option key={s} value={s}/>)}
          </datalist>
        </div>
        <select value={triggerFilter} onChange={e=>setTriggerFilter(e.target.value)}
          style={{padding:'7px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}>
          <option value="all">트리거: 전체</option>
          <option value="blast">즉시발송</option>
          <option value="poll">신규주문</option>
        </select>
      </div>

      {/* KPI 카드 4개 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))',gap:12,marginBottom:14}}>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>총 발송</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--text)',marginTop:6}}>{kpi.total.toLocaleString()}<span style={{fontSize:13,fontWeight:400,color:'var(--sub)',marginLeft:4}}>건</span></div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>알림톡 성공</div>
          <div style={{fontSize:24,fontWeight:700,color:'#22d3a0',marginTop:6}}>{kpi.alimtalk_success.toLocaleString()}<span style={{fontSize:13,fontWeight:400,color:'var(--sub)',marginLeft:4}}>건</span></div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>SMS 폴백</div>
          <div style={{fontSize:24,fontWeight:700,color:'var(--text)',marginTop:6}}>{kpi.sms_fallback.toLocaleString()}<span style={{fontSize:13,fontWeight:400,color:'var(--sub)',marginLeft:4}}>건</span></div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>실패</div>
          <div style={{fontSize:24,fontWeight:700,color:kpi.failed>0?'#f87171':'var(--text)',marginTop:6}}>{kpi.failed.toLocaleString()}<span style={{fontSize:13,fontWeight:400,color:'var(--sub)',marginLeft:4}}>건</span></div>
        </div>
      </div>

      {/* 테이블 */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        {loading ? (
          <div style={{padding:'60px 20px',textAlign:'center',color:'var(--sub)',fontSize:13}}>⏳ 발송 내역 조회 중...</div>
        ) : rows.length===0 ? (
          <div style={{padding:'60px 20px',textAlign:'center',color:'var(--sub)',fontSize:13}}>현재 필터에 해당하는 발송 내역이 없습니다.</div>
        ) : (
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:'12%'}}/><col style={{width:'18%'}}/><col style={{width:'14%'}}/>
              <col style={{width:'10%'}}/><col style={{width:'12%'}}/><col style={{width:'8%'}}/>
              <col style={{width:'6%'}}/><col style={{width:'7%'}}/><col style={{width:'7%'}}/>
              <col style={{width:'6%'}}/>
            </colgroup>
            <thead>
              <tr style={{background:'var(--bg)',color:'var(--sub)'}}>
                <th style={{textAlign:'left',padding:'10px 14px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>발송일시</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>상품명</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>옵션</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>공급사</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>주문번호</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>고객</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>채널</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>상태</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>트리거</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>비고</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r=>{
                const isExpanded = expandedId===r.id;
                const isUnmasked = unmaskedIds.has(r.id);
                const ch = channelBadge(r.channel);
                const st = statusBadge(r.status);
                const tt = triggerBadge(r.trigger_type);
                return (
                  <React.Fragment key={r.id}>
                    <tr onClick={()=>toggleExpand(r.id)}
                      style={{borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .1s',background:isExpanded?'var(--hover)':'transparent'}}
                      onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background='var(--hover)';}}
                      onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.background='transparent';}}>
                      <td style={{padding:'12px 14px',color:'var(--text)',fontFamily:'monospace',fontSize:11}}>{fmtIsoLocal(r.sent_at)}</td>
                      <td style={{padding:'12px 8px',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.product_name_snapshot}>{r.product_name_snapshot||'-'}</td>
                      <td style={{padding:'12px 8px',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.option_text_snapshot}>{r.option_text_snapshot||<span style={{color:'var(--sub)',fontStyle:'italic'}}>단일 옵션</span>}</td>
                      <td style={{padding:'12px 8px',color:'var(--text)'}}>{r.supplier_name||'-'}</td>
                      <td style={{padding:'12px 8px',color:'var(--text)',fontFamily:'monospace',fontSize:11}}>{r.order_id||'-'}</td>
                      <td style={{padding:'12px 8px',color:'var(--text)'}} onClick={e=>{e.stopPropagation(); toggleUnmask(r.id);}}>
                        <div style={{cursor:'pointer'}} title={isUnmasked?'클릭하여 마스킹':'클릭하여 전체 표시'}>
                          {isUnmasked ? (r.customer_name||'-') : maskName(r.customer_name)}
                        </div>
                      </td>
                      <td style={{padding:'12px 8px',textAlign:'center'}}>
                        <span style={{display:'inline-block',background:ch.bg,color:ch.color,fontSize:10,padding:'2px 7px',borderRadius:3,fontWeight:700}}>{ch.label}</span>
                      </td>
                      <td style={{padding:'12px 8px',textAlign:'center'}}>
                        <span style={{display:'inline-block',background:st.bg,color:st.color,fontSize:10,padding:'2px 7px',borderRadius:3,fontWeight:700}}>{st.label}</span>
                      </td>
                      <td style={{padding:'12px 8px',textAlign:'center'}}>
                        <span style={{display:'inline-block',background:tt.bg,color:tt.color,fontSize:10,padding:'2px 7px',borderRadius:3,fontWeight:700}}>{tt.label}</span>
                      </td>
                      <td style={{padding:'12px 8px',textAlign:'center',color:'var(--sub)',fontSize:14}}>
                        {isExpanded ? '▲' : '▼'}
                      </td>
                    </tr>
                    {isExpanded && (
                      <tr style={{background:'var(--bg)'}}>
                        <td colSpan={10} style={{padding:'14px 24px',borderBottom:'1px solid var(--border)'}}>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,fontSize:12,color:'var(--text)'}}>
                            <div>
                              <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,marginBottom:6}}>발송 상세</div>
                              <div style={{lineHeight:1.7}}>
                                <div><span style={{color:'var(--sub)'}}>휴대폰: </span>
                                  <span style={{cursor:'pointer'}} onClick={()=>toggleUnmask(r.id)} title={isUnmasked?'클릭하여 마스킹':'클릭하여 전체 표시'}>
                                    {isUnmasked ? (r.customer_phone||'-') : maskPhone(r.customer_phone)}
                                  </span>
                                </div>
                                <div><span style={{color:'var(--sub)'}}>발송자: </span>{r.triggered_by||'-'}</div>
                                <div><span style={{color:'var(--sub)'}}>Solapi ID: </span><span style={{fontFamily:'monospace',fontSize:11}}>{r.solapi_message_id||'-'}</span></div>
                                <div><span style={{color:'var(--sub)'}}>Solapi 코드: </span>{r.solapi_status_code||'-'}</div>
                                {r.scheduled_at && <div><span style={{color:'var(--sub)'}}>예약 시각: </span>{fmtIsoLocal(r.scheduled_at)}</div>}
                                {r.error_message && (
                                  <div style={{marginTop:8,padding:'8px 10px',background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',borderRadius:5,color:'#f87171'}}>
                                    <strong>에러:</strong> {r.error_message}
                                  </div>
                                )}
                              </div>
                            </div>
                            <div>
                              <div style={{fontSize:11,color:'var(--sub)',fontWeight:700,marginBottom:6}}>발송 본문</div>
                              <div style={{padding:'10px 12px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:5,fontSize:11,color:'var(--text)',whiteSpace:'pre-wrap',maxHeight:240,overflowY:'auto',lineHeight:1.6}}>
                                {r.message_body||'-'}
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}
        {/* 페이지네이션 */}
        {total>0 && (
          <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'center',gap:12}}>
            <div style={{fontSize:11,color:'var(--sub)'}}>총 {total.toLocaleString()}건 중 {startIdx}-{endIdx}번째</div>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <button disabled={page===0} onClick={()=>setPage(0)} style={delayPageBtn(page===0)}>«</button>
              <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={delayPageBtn(page===0)}>‹</button>
              <span style={{padding:'0 10px',fontSize:12,color:'var(--text)'}}>{page+1} / {totalPages}</span>
              <button disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)} style={delayPageBtn(page>=totalPages-1)}>›</button>
              <button disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)} style={delayPageBtn(page>=totalPages-1)}>»</button>
            </div>
            <div/>
          </div>
        )}
      </div>
    </div>
  );
}

function DelayReportTab(){
  return <DelayPlaceholder
    title="REPORT"
    phase="PHASE 9 구현 예정"
    desc="현황 KPI 3개 (진행 중 / 이번 달 등록 / 이번 달 해제) · 일별 등록·해제 추이 라인차트 · 공급사별 지연 Top 10 바차트 + 드릴다운"
  />;
}

// ── APP ────────────────────────────────────────
function NoAccessPage(){
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'60vh',padding:'40px 20px',textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16,opacity:.5}}>🔒</div>
      <div style={{fontSize:18,fontWeight:600,color:'var(--text)',marginBottom:8}}>권한이 없습니다.</div>
      <div style={{fontSize:13,color:'var(--sub)'}}>이 메뉴에 접근하려면 추가 권한이 필요합니다.</div>

function App() {
  const [session,setSession]=useState(null); const [page,setPage]=useState('dashboard'); const [editDate,setEditDate]=useState(null); const [loading,setLoading]=useState(true);
  const role=session?.user?.user_metadata?.role||'master';
  const isMaster = role==='master';
  const isManager= role==='manager';
  const isCrew   = role==='crew';
  // 페이지 → 부모 그룹 매핑 (사이드바 펼침 상태 결정용)
  const pageToParent = {
    dashboard:'dashboard', entry:'dashboard', agentAnalysis:'dashboard',
    products:'productMgmt', delays:'productMgmt', suppliers:'productMgmt',
  };
  // 현재 펼친 부모들 (다중 펼침 가능: 사용자 수동 조작 존중)
  const [openGroups,setOpenGroups] = useState(()=>{
    const parent = pageToParent[page];
    return parent ? {[parent]:true} : {};
  });
  // 페이지 변경 시 그 페이지의 부모만 자동 펼침 (다른 부모는 그대로 유지)
  useEffect(()=>{
    const parent = pageToParent[page];
    if(parent) setOpenGroups(prev => prev[parent] ? prev : {...prev, [parent]:true});
  },[page]);
  // 부모 메뉴 클릭 — 그 부모만 토글 (다른 부모는 영향 없음)
  const toggleGroup = (groupId)=>{
    setOpenGroups(prev => ({...prev, [groupId]: !prev[groupId]}));
  };
  // 모바일 사이드바 열림/닫힘
  const [mobileOpen,setMobileOpen] = useState(false);
  // 페이지 이동 시 모바일 사이드바 자동 닫기
  const navigateTo = (pageId)=>{
    setPage(pageId);
    setEditDate(null);
    setMobileOpen(false);
  };
  useEffect(()=>{ sb.auth.getSession().then(({data})=>{setSession(data.session);setLoading(false);}); const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s)); return()=>subscription.unsubscribe(); },[]);
  if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--sub)'}}>로딩 중...</div>;
  if(!session)return<LoginPage/>;
  const afterSave=()=>{setEditDate(null);setPage('entry');};
  return (
    <div className="app-wrap">
      <button className="mobile-hamburger" onClick={()=>setMobileOpen(v=>!v)} aria-label="메뉴">
        {mobileOpen ? '✕' : '☰'}
      </button>
      <div className={`mobile-overlay ${mobileOpen?'show':''}`} onClick={()=>setMobileOpen(false)}/>

          <span style={{fontSize:11,fontWeight:700,color:'#6e9af0',letterSpacing:'.08em',textTransform:'uppercase'}}>원룸만들기 CS</span>
          <span>고객센터 운영</span>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">메뉴</div>

          {/* 부모: 대시보드 (자체 화면 있음 → 클릭 시 이동 + 그 부모로 펼침) */}
          {(()=>{
            // 자식이 있는지 체크 — 없으면 토글 화살표 숨기고 일반 메뉴처럼 동작
            const hasChildren = isMaster || isManager;  // 데이터 입력(master/manager) 또는 상담원 분석(master)
            return (
              <div className="nav-parent" onClick={()=>{
                if(!hasChildren){
                  // 자식 없으면 단순 이동
                  navigateTo('dashboard');
                } else if(page==='dashboard'){
                  toggleGroup('dashboard');
                } else {
                  navigateTo('dashboard');
                }
              }}>
                {Icon.dashboard}<span>대시보드</span>
                {hasChildren && (
                  <span className={`chevron ${openGroups.dashboard?'expanded':''}`}>{openGroups.dashboard?'▼':'▶'}</span>
                )}
              </div>
            );
          })()}
          {openGroups.dashboard && (
            <>
              {(isMaster||isManager) && (
                <div className={`nav-child ${page==='entry'?'active':''}`} onClick={()=>navigateTo('entry')}>
                  데이터 입력
                </div>
              )}
              {isMaster && (
                <div className={`nav-child ${page==='agentAnalysis'?'active':''}`} onClick={()=>navigateTo('agentAnalysis')}>
                  상담원 분석
                </div>
              )}
            </>
          )}

          {/* 부모: 상품 관리 (자체 화면 없음 → 클릭 시 토글만) */}
          <div className="nav-parent" onClick={()=>toggleGroup('productMgmt')}>
            {Icon.products}<span>상품 관리</span>
            <span className={`chevron ${openGroups.productMgmt?'expanded':''}`}>{openGroups.productMgmt?'▼':'▶'}</span>
          </div>
          {openGroups.productMgmt && (
            <>
              <div className={`nav-child ${page==='products'?'active':''}`} onClick={()=>navigateTo('products')}>
                상품 정보
              </div>
              {(isMaster||isManager) && (
                <div className={`nav-child ${page==='delays'?'active':''}`} onClick={()=>navigateTo('delays')}>
                  배송지연 관리
                </div>
              )}
              <div className={`nav-child ${page==='suppliers'?'active':''}`} onClick={()=>navigateTo('suppliers')}>
                공급사 관리
              </div>
            </>
          )}

          {/* 1뎁스: 디지털 상품 발송 (자식 없음 → 단순 이동) */}
          {(isMaster||isManager) && (
            <div
              className="nav-parent"
              onClick={()=>navigateTo('autoDelivery')}
              style={page==='autoDelivery' ? {background:'rgba(246,173,9,.08)',color:'#F6AD09'} : {}}
            >
              {Icon.autoDelivery}<span>디지털 상품 발송</span>
            </div>
          )}

          {/* 1뎁스: 환불 관리 (자식 없음 → 단순 이동) - master 전용 */}
          {isMaster && (
            <div
              className="nav-parent"
              onClick={()=>navigateTo('refunds')}
              style={page==='refunds' ? {background:'rgba(246,173,9,.08)',color:'#F6AD09'} : {}}
            >
              {Icon.refunds}<span>환불 관리</span>
            </div>
          )}
        </nav>
        <div className="sidebar-bottom">
          {isMaster && (
            <div className={`nav-item ${page==='agents'?'active':''}`} onClick={()=>navigateTo('agents')} style={{marginBottom:8}}>
              {Icon.agents}<span>인력 관리</span>
            </div>
          )}
          <div className="user-info">
            <div className="user-avatar">{session.user.email?.[0]?.toUpperCase()}</div>
            <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:3}}>
              <div className="user-email">{session.user.email}</div>
              {(()=>{
                const roleStyle={
                  master:  {label:'MASTER',  bg:'rgba(246,173,9,.18)',  color:'#F6AD09', border:'rgba(246,173,9,.5)'},
                  manager: {label:'MANAGER', bg:'rgba(168,222,246,.18)',color:'#A8DEF6', border:'rgba(168,222,246,.5)'},
                  crew:    {label:'CREW',    bg:'rgba(220,232,255,.15)',color:'#dce8ff', border:'rgba(220,232,255,.4)'},
                };
                // 알 수 없는 role(예: stale 토큰의 옛 권한값)은 'UNKNOWN' 회색 뱃지로 표시 (crew로 fallback X)
                const rs=roleStyle[role]||{label:'UNKNOWN',bg:'rgba(150,150,150,.15)',color:'#888888',border:'rgba(150,150,150,.4)'};
                return <span title={role?('현재 권한값: '+role):'권한 정보 없음'} style={{display:'inline-block',alignSelf:'flex-start',padding:'1px 7px',background:rs.bg,color:rs.color,border:'1px solid '+rs.border,borderRadius:3,fontSize:9,fontWeight:700,letterSpacing:'.06em',fontFamily:'monospace'}}>{rs.label}</span>;
              })()}
            </div>
          </div>
          <button className="btn-logout" onClick={()=>sb.auth.signOut()}>로그아웃</button>
        </div>
      </div>
      <div className="main">
        {page==='dashboard'&&<DashboardPage/>}
        {page==='entry'&&(isMaster||isManager)&&<EntryPage editDate={editDate} onSaved={afterSave}/>}
        {page==='products'&&<ProductsPage isCrew={isCrew} isMaster={isMaster} isManager={isManager}/>}
        {page==='suppliers'&&<SuppliersPage isCrew={isCrew} isMaster={isMaster} isManager={isManager}/>}
        {page==='delays'&&(isMaster||isManager)&&<DelayedProductsPage isMaster={isMaster} isManager={isManager}/>}
        {page==='autoDelivery'&&(isMaster||isManager)&&<AutoDeliveryPage isMaster={isMaster} isManager={isManager} currentUserEmail={session.user.email}/>}
        {page==='refunds'&&(isMaster?<RefundManagementPage currentUserEmail={session.user.email}/>:<NoAccessPage/>)}
        {page==='agentAnalysis'&&isMaster&&<AgentAnalysisPage/>}
        {page==='agents'&&(isMaster?<AgentMgmtPage/>:<NoAccessPage/>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
