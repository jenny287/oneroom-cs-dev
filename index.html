  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:#0d1628; --surface:#111e38; --card:#162244; --border:#1e3060;
      --primary:#2A478D; --primary2:#1e3570; --green:#22d3a0;
      --red:#f87171; --yellow:#F6AD09; --accent:#D2E5FF; --gray:#545454;
      --text:#e8edf8; --sub:#8fa8d0; --hover:#1a2e55;
    }
    body { font-family:'Pretendard','Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:auto; }
    ::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* 캘린더 아이콘 흰색 */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(2);
      cursor: pointer;
      opacity: .8;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 30%,#1a2e5a 0%,var(--bg) 65%)}
    .login-box{width:380px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 40px}
    .login-logo{font-size:13px;font-weight:600;color:var(--primary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .login-title{font-size:24px;font-weight:700;margin-bottom:32px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
    .form-group input{width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:var(--primary)}
    .btn-primary{width:100%;padding:12px;background:var(--primary);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s;font-family:inherit}
    .btn-primary:hover{background:var(--primary2)} .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .error-msg{color:var(--red);font-size:12px;margin-top:10px;text-align:center}

    .app-wrap{display:flex;min-height:100vh;padding-left:220px}
    .sidebar{width:220px;min-width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;overflow-y:auto;z-index:1000}
    .sidebar-logo{padding:24px 20px 20px;font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border)}
    .sidebar-logo span{display:block;font-size:16px;color:var(--text);margin-top:2px;letter-spacing:0}
    .sidebar-nav{padding:16px 12px;flex:1}
    .nav-section{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin:16px 0 6px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .15s;margin-bottom:2px}
    .nav-item:hover{background:var(--hover);color:var(--text)} .nav-item.active{background:rgba(246,173,9,.08);color:#F6AD09;border-left-color:#F6AD09;font-weight:600}
    /* 2단계 메뉴: 부모(그룹 헤더) — 안 B 스타일 (작은 대문자 라벨) */
    .nav-parent{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text);cursor:pointer;transition:all .15s;margin-top:8px;margin-bottom:2px}
    .nav-parent:hover{background:var(--hover)}
    .nav-parent .chevron{margin-left:auto;font-size:11px;color:var(--sub);transition:transform .2s}
    .nav-parent .chevron.expanded{transform:rotate(0deg)}
    /* 2단계 메뉴: 자식 — 안 A 스타일 (들여쓰기 + 좌측 라인) */
    .nav-child{display:flex;align-items:center;padding:8px 12px 8px 32px;border-radius:6px;font-size:12px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .12s;margin-bottom:1px;border-left:3px solid transparent}
    .nav-child:hover{background:var(--hover);color:var(--text)}
    .nav-child.active{background:rgba(246,173,9,.08);color:#F6AD09;border-left-color:#F6AD09;font-weight:600}
    /* 모바일 햄버거 버튼 */
    .mobile-hamburger{display:none;position:fixed;top:12px;left:12px;z-index:1100;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .mobile-hamburger:hover{background:var(--hover)}
    .mobile-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}
    @media (max-width: 768px){
      .app-wrap{padding-left:0}
      .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:280px;max-width:80%;min-width:0}
      .sidebar.mobile-open{transform:translateX(0)}
      .mobile-hamburger{display:flex}
      .mobile-overlay.show{display:block}
      /* 본문 좌측에 햄버거 버튼 영역만큼 여백 — 본문이 햄버거 뒤로 안 흐름 */
      .main{padding-left:64px}
    }
    .sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border)}
    .user-info{display:flex;align-items:center;gap:10px;padding:10px 12px}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .user-email{font-size:11px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-logout{width:100%;padding:9px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--sub);font-size:12px;cursor:pointer;margin-top:8px;font-family:inherit;transition:all .15s}

// ── DASHBOARD ──────────────────────────────────
const RANGE_OPTIONS = [
  {label:'직접 선택',days:null},{label:'최근 7일',days:7},{label:'최근 14일',days:14},
  {label:'최근 한달',days:30},{label:'3개월',days:90},{label:'6개월',days:180},{label:'1년',days:365},
];
const getMonthRange = (y,m) => {
  const pad = n=>String(n).padStart(2,'0');
  const last = new Date(y,m,0).getDate();
  return {from:`${y}-${pad(m)}-01`, to:`${y}-${pad(m)}-${pad(last)}`};
};

function DashboardPage() {
  const [ops,setOps]=useState([]); const [agentOps,setAgentOps]=useState([]);
  const [from,setFrom]=useState(dateOffset(30)); const [to,setTo]=useState(today());
  const [range,setRange]=useState('최근 한달'); const [loading,setLoading]=useState(true);
  const [dashTab,setDashTab]=useState('period');
  const [ymYear,setYmYear]=useState(String(new Date().getFullYear()));
  const [ymFrom,setYmFrom]=useState('1'); const [ymTo,setYmTo]=useState(String(new Date().getMonth()+1));

  const PERIOD_OPTIONS=[
    {label:'최근 한달',days:30},{label:'최근 3개월',days:90},
    {label:'최근 6개월',days:180},{label:'최근 1년',days:365},
  ];
  const QUICK=[
    {label:'전체 (1~12월)',f:1,t:12},{label:'상반기 (1~6월)',f:1,t:6},
    {label:'하반기 (7~12월)',f:7,t:12},{label:'1분기 (1~3월)',f:1,t:3},
    {label:'2분기 (4~6월)',f:4,t:6},{label:'3분기 (7~9월)',f:7,t:9},
    {label:'4분기 (10~12월)',f:10,t:12},
  ];

  const pad=n=>String(n).padStart(2,'0');

  const loadPeriod=async(f,t)=>{
    setLoading(true);
    let q1=sb.from('daily_ops').select('*').order('date',{ascending:true});
    let q2=sb.from('agent_daily_ops').select('*').order('date',{ascending:true});
    // agents 테이블에서 현재 존재하는 인원 목록도 함께 조회
    // → row가 삭제된 인원은 자동으로 그래프/합계에서 제외 (퇴사자는 그대로 포함)
    const q3=sb.from('agents').select('name');
    if(f){q1=q1.gte('date',f);q2=q2.gte('date',f);}
    if(t){q1=q1.lte('date',t);q2=q2.lte('date',t);}
    const[r1,r2,r3]=await Promise.all([q1,q2,q3]);
    setOps(r1.data||[]);
    const validNames = new Set((r3.data||[]).map(a=>a.name));
    setAgentOps((r2.data||[]).filter(r=>validNames.has(r.agent_name)));
    setLoading(false);
  };

  useEffect(()=>{loadPeriod(from,to);},[]);

  const onRangeChange=e=>{
    const sel=e.target.value; setRange(sel);
    const opt=PERIOD_OPTIONS.find(o=>o.label===sel);
    if(opt){const f=dateOffset(opt.days),t=today();setFrom(f);setTo(t);}
  };

  const load=()=>{
    if(dashTab==='period'){
      loadPeriod(from,to);
    } else {
      if(!ymYear) return;
      const f=`${ymYear}-${pad(ymFrom)}-01`;
      const lastDay=new Date(Number(ymYear),Number(ymTo),0).getDate();
      const t=`${ymYear}-${pad(ymTo)}-${pad(lastDay)}`;
      loadPeriod(f,t);
    }
  };

  const applyQuick=(f,t)=>{setYmFrom(String(f));setYmTo(String(t));};

  // 월별 집계용
  const months=Array.from({length:12},(_,i)=>i+1);
  const selectedMonths=months.filter(m=>m>=Number(ymFrom)&&m<=Number(ymTo));
  const isYearMonth=dashTab==='yearmonth';

  const dates=[...new Set([...ops.map(r=>r.date),...agentOps.map(r=>r.date)])].sort();
  // 그래프 상담원 목록은 "조회 기간에 데이터가 있는 사람" 기준.
  // 재직/퇴사 무관 — agentOps는 이미 조회 기간으로 필터링된 데이터이므로,
  // 퇴사자라도 해당 기간에 데이터가 있으면 자동 포함되고, 없으면 자연히 제외됨.
  const agents=[...new Set(agentOps.map(r=>r.agent_name))].sort();

  const byDate=(arr,key)=>dates.map(d=>arr.filter(r=>r.date===d).reduce((s,r)=>s+(Number(r[key])||0),0));
  const byMonthData=(arr,key)=>selectedMonths.map(m=>{
    const ms=pad(m);
    return arr.filter(r=>r.date?.slice(5,7)===ms).reduce((s,r)=>s+(Number(r[key])||0),0);
  });
  const byMonthAvg=(arr,key)=>selectedMonths.map(m=>{
    const ms=pad(m);const rows=arr.filter(r=>r.date?.slice(5,7)===ms);
    return rows.length?rows.reduce((s,r)=>s+(Number(r[key])||0),0)/rows.length:0;
  });

  const chartLabels   = isYearMonth?selectedMonths.map(m=>m+'월'):ops.map(r=>r.date?.slice(5));
  const opsInbound    = isYearMonth?byMonthData(ops,'inbound_calls') :ops.map(r=>r.inbound_calls);
  const opsRequest    = isYearMonth?byMonthData(ops,'request_calls') :ops.map(r=>r.request_calls);
  const opsAnswered   = isYearMonth?byMonthData(ops,'answered_calls'):ops.map(r=>r.answered_calls);
  const opsOb         = isYearMonth?byMonthData(ops,'ob_contacts')   :ops.map(r=>r.ob_contacts);
  const opsRR         = isYearMonth?byMonthAvg(ops,'response_rate')  :ops.map(r=>r.response_rate);
  const totalAnswered = isYearMonth?byMonthData(agentOps,'answered_calls'):byDate(agentOps,'answered_calls');
  const totalBoard    = isYearMonth?byMonthData(agentOps,'board_count')   :byDate(agentOps,'board_count');
  const totalChat     = isYearMonth?byMonthData(agentOps,'chat_count')    :byDate(agentOps,'chat_count');
  const totalOb       = isYearMonth?byMonthData(agentOps,'ob_count')      :byDate(agentOps,'ob_count');
  const totalEtc      = isYearMonth?byMonthData(agentOps,'etc_count')     :byDate(agentOps,'etc_count');
  const avgUph        = isYearMonth
    ?selectedMonths.map(m=>{const ms=pad(m);const rows=agentOps.filter(r=>r.date?.slice(5,7)===ms);return rows.length?rows.reduce((s,r)=>s+(Number(r.uph)||0),0)/rows.length:0;})
    :dates.map(d=>{const rows=agentOps.filter(r=>r.date===d);return rows.length?rows.reduce((s,r)=>s+(Number(r.uph)||0),0)/rows.length:0;});

  // 통화시간 'HH:MM:SS' / 'HH:MM' / '90분' / '1.5시간' 등 다양한 입력 → 분(min) 단위 숫자
  const parseCallMin=(v)=>{
    if(v==null||v==='') return 0;
    const s=String(v).trim();
    // HH:MM:SS or HH:MM
    if(/^\d+:\d{1,2}(:\d{1,2})?$/.test(s)){
      const parts=s.split(':').map(Number);
      const h=parts[0]||0, m=parts[1]||0, sec=parts[2]||0;
      return h*60+m+sec/60;
    }
    // 숫자만 있으면 분으로 간주
    const n=Number(s.replace(/[^\d.]/g,''));
    return isFinite(n)?n:0;
  };
  // 분 → 'Xh Ymin' 또는 'Ymin' 형식 (차트 축/툴팁 표시용)
  const fmtMin=(min)=>{
    if(!min||!isFinite(min)) return '0min';
    const totalMin=Math.round(min);
    const h=Math.floor(totalMin/60), m=totalMin%60;
    return h>0?(h+'h '+(m?m+'min':'')).trim():m+'min';
  };
  // 일별/월별 통화시간 합계 (분)
  const sumCallMin=(arr,key,bucketDates)=>bucketDates.map(d=>arr.filter(r=>r.date===d).reduce((s,r)=>s+parseCallMin(r[key]),0));
  const sumCallMinByMonth=(arr,key)=>selectedMonths.map(m=>{
    const ms=pad(m);
    return arr.filter(r=>r.date?.slice(5,7)===ms).reduce((s,r)=>s+parseCallMin(r[key]),0);
  });
  const opsInTime  = isYearMonth?sumCallMinByMonth(ops,'in_call_time') :ops.map(r=>parseCallMin(r.in_call_time));
  const opsOutTime = isYearMonth?sumCallMinByMonth(ops,'out_call_time'):ops.map(r=>parseCallMin(r.out_call_time));

  const mean=arr=>arr.filter(v=>v!=null&&v!=='').length?arr.filter(v=>v!=null&&v!=='').reduce((a,b)=>a+(Number(b)||0),0)/arr.filter(v=>v!=null&&v!=='').length:0;
  const avgRR=ops.length?ops.reduce((s,r)=>s+(Number(r.response_rate)||0),0)/ops.length:0;

  const tabStyle=(active)=>({padding:'10px 24px',fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:'none',
    fontFamily:'inherit',color:active?'var(--accent)':'var(--sub)',borderBottom:active?'2px solid var(--primary)':'2px solid transparent'});
  const selStyle={padding:'8px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'8px',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none'};

  return (
    <div>
      <div className="page-header"><div><div className="page-title">대시보드</div><div className="page-sub">고객센터 운영 현황</div></div></div>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',paddingLeft:24}}>
        <button style={tabStyle(dashTab==='period')} onClick={()=>setDashTab('period')}>일 별</button>
        <button style={tabStyle(dashTab==='yearmonth')} onClick={()=>setDashTab('yearmonth')}>연/월 별</button>
      </div>
      <div className="section">
        <div className="filter-bar">
          {dashTab==='period'&&<>
            <label>기간</label>
            <input type="date" value={from} onChange={e=>{setFrom(e.target.value);setRange('직접 선택');}}/>
            <span style={{color:'var(--sub)'}}>~</span>
            <input type="date" value={to} onChange={e=>{setTo(e.target.value);setRange('직접 선택');}}/>
            <select value={range} onChange={onRangeChange} style={selStyle}>
              <option value="직접 선택">직접 선택</option>
              {PERIOD_OPTIONS.map(o=><option key={o.label}>{o.label}</option>)}
            </select>
          </>}
          {dashTab==='yearmonth'&&<>
            <label style={{fontSize:'12px',color:'var(--sub)'}}>연도</label>
            <select value={ymYear} onChange={e=>setYmYear(e.target.value)} style={selStyle}>
              {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}년</option>)}
            </select>
            <label style={{fontSize:'12px',color:'var(--sub)'}}>월 범위</label>
            <select value={ymFrom} onChange={e=>setYmFrom(e.target.value)} style={{...selStyle,width:75}}>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}
            </select>
            <span style={{color:'var(--sub)'}}>~</span>
            <select value={ymTo} onChange={e=>setYmTo(e.target.value)} style={{...selStyle,width:75}}>
              {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}
            </select>
          </>}
          <button className="btn-filter" onClick={load}>조회</button>
          <button className="btn-sm" onClick={()=>{setFrom('');setTo('');setRange('직접 선택');setYmFrom('1');setYmTo(String(new Date().getMonth()+1));}}>초기화</button>
        </div>
        {dashTab==='yearmonth'&&(
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}}>
            {QUICK.map(q=>(
              <button key={q.label} onClick={()=>applyQuick(q.f,q.t)}
                style={{padding:'4px 12px',borderRadius:6,border:'1px solid var(--border)',background:Number(ymFrom)===q.f&&Number(ymTo)===q.t?'rgba(42,71,141,.3)':'transparent',
                  color:Number(ymFrom)===q.f&&Number(ymTo)===q.t?'var(--accent)':'var(--sub)',fontSize:11,cursor:'pointer',fontFamily:'inherit',
                  borderColor:Number(ymFrom)===q.f&&Number(ymTo)===q.t?'var(--primary)':'var(--border)'}}>
                {q.label}
              </button>
            ))}
          </div>
        )}
      </div>
      <div className="divider"/>
      {loading?<div className="loading">불러오는 중...</div>:<>
      <div className="section">
        <div className="kpi-grid">
          {[
            {label:'평균 응대율',value:fmtPct(avgRR),cls:avgRR>=90?'green':'red'},
            {label:isYearMonth?'월평균 응대호':'일평균 응대호',value:fmt(mean(totalAnswered),0),cls:'blue'},
            {label:isYearMonth?'월평균 게시판':'일평균 게시판',value:fmt(mean(totalBoard),0),cls:''},
            {label:isYearMonth?'월평균 채팅':'일평균 채팅',value:fmt(mean(totalChat),0),cls:''},
            {label:'평균 UPH',value:fmt(mean(avgUph),1),cls:''},
            {label:'상담원 수',value:agents.length+'명',cls:''},
          ].map(k=>(
            <div className="kpi-card" key={k.label}><div className="kpi-label">{k.label}</div><div className={`kpi-value ${k.cls}`}>{k.value}</div></div>
          ))}
        </div>
      </div>
      <div className="section" style={{paddingTop:0}}>
        <div className="charts-grid">
          <div className="chart-card"><div className="chart-title">{isYearMonth?'유선 현황 (월별)':'유선 현황 (일별)'}</div><div className="chart-wrap">
            <ChartComp type="line" options={BASE_OPTS} data={{labels:chartLabels,datasets:[
              {label:'인입호',data:opsInbound,borderColor:COLORS[0],backgroundColor:'transparent',tension:.3,pointRadius:2},
              {label:'요청호',data:opsRequest,borderColor:COLORS[1],backgroundColor:'transparent',tension:.3,pointRadius:2},
              {label:'응대호',data:opsAnswered,borderColor:COLORS[2],backgroundColor:'transparent',tension:.3,pointRadius:2},
              {label:'OB컨택',data:opsOb,borderColor:COLORS[3],backgroundColor:'transparent',tension:.3,pointRadius:2},
            ]}}/>
          </div></div>
          <div className="chart-card"><div className="chart-title">{isYearMonth?'응대율 추이 (월별 %)':'응대율 추이 (%)'}</div><div className="chart-wrap">
            <ChartComp type="line" options={{...BASE_OPTS,scales:{...BASE_OPTS.scales,y:{...BASE_OPTS.scales.y,ticks:{...BASE_OPTS.scales.y.ticks,callback:v=>(+v.toFixed(2))+'%'}}}}} data={{labels:chartLabels,datasets:[
              {label:'응대율',data:opsRR,borderColor:COLORS[0],backgroundColor:'transparent',tension:.3,pointRadius:2},
            ]}}/>
          </div></div>
          <div className="chart-card"><div className="chart-title">{isYearMonth?'통화시간 추이 (월별 합계)':'통화시간 추이 (일별)'}</div><div className="chart-wrap">
            <ChartComp type="line" options={{...BASE_OPTS,plugins:{...BASE_OPTS.plugins,tooltip:{callbacks:{label:(ctx)=>ctx.dataset.label+': '+fmtMin(ctx.parsed.y)}}},scales:{...BASE_OPTS.scales,y:{...BASE_OPTS.scales.y,ticks:{...BASE_OPTS.scales.y.ticks,callback:v=>fmtMin(v)}}}}} data={{labels:chartLabels,datasets:[
              {label:'IN 통화시간',  data:opsInTime, borderColor:COLORS[1],backgroundColor:'transparent',tension:.3,pointRadius:2},
              {label:'OUT 통화시간', data:opsOutTime,borderColor:COLORS[3],backgroundColor:'transparent',tension:.3,pointRadius:2},
            ]}}/>
          </div></div>
          <div className="chart-card"><div className="chart-title">{isYearMonth?'채널별 처리 현황 (월별 합계)':'채널별 처리 현황 (일별 합계)'}</div><div className="chart-wrap">
            <ChartComp type="bar" options={STACK_OPTS} data={{labels:chartLabels,datasets:[
              {label:'응대호',data:totalAnswered,backgroundColor:COLORS[0]},
              {label:'OB',    data:totalOb,backgroundColor:COLORS[3]},
              {label:'게시판',data:totalBoard,backgroundColor:COLORS[1]},
              {label:'채팅',  data:totalChat,backgroundColor:COLORS[2]},
              {label:'기타',  data:totalEtc,backgroundColor:COLORS[4]},
            ]}}/>
          </div></div>
          {agents.length>0&&<div className="chart-card"><div className="chart-title">상담원별 처리 합계</div><div className="chart-wrap">
            <ChartComp type="bar" options={STACK_OPTS} data={{labels:agents,datasets:[
              {label:'응대호',data:agents.map(a=>agentOps.filter(r=>r.agent_name===a).reduce((s,r)=>s+(Number(r.answered_calls)||0),0)),backgroundColor:COLORS[0]},
              {label:'게시판',data:agents.map(a=>agentOps.filter(r=>r.agent_name===a).reduce((s,r)=>s+(Number(r.board_count)||0),0)),backgroundColor:COLORS[1]},
              {label:'채팅',  data:agents.map(a=>agentOps.filter(r=>r.agent_name===a).reduce((s,r)=>s+(Number(r.chat_count)||0),0)),backgroundColor:COLORS[2]},
              {label:'OB',   data:agents.map(a=>agentOps.filter(r=>r.agent_name===a).reduce((s,r)=>s+(Number(r.ob_count)||0),0)),backgroundColor:COLORS[3]},
              {label:'기타', data:agents.map(a=>agentOps.filter(r=>r.agent_name===a).reduce((s,r)=>s+(Number(r.etc_count)||0),0)),backgroundColor:COLORS[4]},
            ]}}/>
          </div></div>}
          {agents.length>0&&<div className="chart-card full"><div className="chart-title">{isYearMonth?'상담원별 월별 응대호 추이':'상담원별 일별 응대호 추이'}</div><div className="chart-wrap">
            <ChartComp type="line" options={BASE_OPTS} data={{labels:chartLabels,datasets:agents.map((a,i)=>({
              label:a,
              data:isYearMonth
                ?selectedMonths.map(m=>{const ms=pad(m);return agentOps.filter(r=>r.agent_name===a&&r.date?.slice(5,7)===ms).reduce((s,r)=>s+(Number(r.answered_calls)||0),0);})
                :dates.map(d=>agentOps.filter(r=>r.agent_name===a&&r.date===d).reduce((s,r)=>s+(Number(r.answered_calls)||0),0)),
              borderColor:COLORS[i%COLORS.length],backgroundColor:'transparent',tension:.3,pointRadius:2,
            }))}}/>
          </div></div>}
        </div>
      </div>
      </>}
    </div>
  );
}

// ── ATTENDANCE PAGE ────────────────────────────
const STATUS_LIST = ['근무','연차','오전반차','오후반차','기타','휴일'];
const STATUS_COLORS = {'근무':'var(--green)','연차':'var(--red)','오전반차':'var(--yellow)','오후반차':'var(--yellow)','기타':'var(--sub)','휴일':'var(--sub)'};

function AttendancePage() {
  const todayD = new Date();
  const [year,  setYear]  = useState(todayD.getFullYear());
  const [month, setMonth] = useState(todayD.getMonth()+1);
  const [agents,  setAgents]  = useState([]);
  const [records, setRecords] = useState([]);
  const [holidays, setHolidays] = useState([]); // {date, name}
  const [edits,   setEdits]   = useState({});
  const [saving,  setSaving]  = useState(false);
  const [msg,     setMsg]     = useState('');
  const [tab,     setTab]     = useState('input');
  const [newHDay, setNewHDay] = useState('');
  const [newHName,setNewHName]= useState('');

  const daysInMonth = new Date(year, month, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const pad = n => String(n).padStart(2,'0');
  const dateStr = d => year+'-'+pad(month)+'-'+pad(d);

  const loadHolidays = async () => {
    const {data} = await sb.from('holidays').select('*').order('date');
    setHolidays(data||[]);
  };

  const load = async () => {
    const [r1,r2] = await Promise.all([
      sb.from('agents').select('*').order('sort_order').order('created_at'),
      sb.from('attendance').select('*').gte('date',dateStr(1)).lte('date',dateStr(daysInMonth)),
    ]);
    setAgents(r1.data||[]);
    setRecords(r2.data||[]);
    setEdits({});
  };
  useEffect(()=>{ load(); loadHolidays(); },[year,month]);

  const holidaySet = new Set(holidays.map(h=>h.date));
  const isHoliday = d => holidaySet.has(dateStr(d));
  const isWeekend = d => { const dow=new Date(year,month-1,d).getDay(); return dow===0||dow===6; };
  const isOff = d => isWeekend(d)||isHoliday(d);

  const recMap = {};
  records.forEach(r=>{ recMap[r.date+'_'+r.agent_name]=r; });

  const getVal = (d,name,field) => {
    if(isOff(d) && field==='status') return '휴일';
    const k=dateStr(d)+'_'+name;
    if(edits[k]&&edits[k][field]!==undefined) return edits[k][field];
    const rec=recMap[k];
    if(rec){
      if(field==='status') return rec.status;
      if(field==='ot_hours') return rec.ot_hours||'';
      if(field==='note') return rec.note||'';
    }
    return field==='status'?'근무':'';
  };
  const setVal = (d,name,field,val) => {
    if(isOff(d)) return;
    const k=dateStr(d)+'_'+name;
    setEdits(p=>({...p,[k]:{...(p[k]||{}),[field]:val}}));
  };

  const save = async () => {
    setSaving(true); setMsg('');
    const rows=[];
    agents.forEach(a=>{ days.forEach(d=>{
      const k=dateStr(d)+'_'+a.name;
      const isOffDay=isOff(d);
      if(isOffDay){
        // 휴일은 DB에도 저장
        rows.push({date:dateStr(d),agent_name:a.name,status:'휴일',ot_hours:0,note:''});
        return;
      }
      if(!edits[k]) return;
      rows.push({date:dateStr(d),agent_name:a.name,
        status:edits[k].status||(recMap[k]?.status||'근무'),
        ot_hours:Number(edits[k].ot_hours??recMap[k]?.ot_hours??0)||0,
        note:edits[k].note??recMap[k]?.note??''});
    });});
    if(!rows.length){setMsg('변경된 내용이 없습니다.');setSaving(false);return;}
    const{error}=await sb.from('attendance').upsert(rows,{onConflict:'date,agent_name'});
    if(error){setMsg('저장 실패: '+error.message);}
    else{setMsg('저장되었습니다!');load();}
    setSaving(false);
  };

  const addHoliday = async () => {
    if(!newHDay||!newHName.trim()){setMsg('날짜와 공휴일 이름을 입력해주세요.');return;}
    const{error}=await sb.from('holidays').insert({date:newHDay,name:newHName.trim()});
    if(error){setMsg('등록 실패: '+error.message);return;}
    setNewHDay(''); setNewHName(''); loadHolidays();
  };
  const delHoliday = async (id) => {
    await sb.from('holidays').delete().eq('id',id);
    loadHolidays();
  };

  const summary = agents.map(a=>{
    if(a.resigned_at){
      const resignYM=a.resigned_at.slice(0,7);
      const curYM=year+'-'+pad(month);
      if(curYM>resignYM) return null;
    }
    const recs=records.filter(r=>r.agent_name===a.name);
    const recStatusMap={};
    recs.forEach(r=>{recStatusMap[r.date]=r.status;});
    // 저장 안된 평일은 기본 '근무'로 간주
    const totalWorkDays=days.filter(d=>!isOff(d)).length;
    const annual  =recs.filter(r=>r.status==='연차').length;
    const halfAMc =recs.filter(r=>r.status==='오전반차').length;
    const halfPMc =recs.filter(r=>r.status==='오후반차').length;
    const workDays=totalWorkDays - annual - (halfAMc*0.5) - (halfPMc*0.5);
    return {
      name:a.name, role:a.role||'상담원',
      workDays,
      annual:   annual,
      halfAM:   halfAMc,
      halfPM:   halfPMc,
      other:    recs.filter(r=>r.status==='기타').length,
      holiday:  recs.filter(r=>r.status==='휴일').length,
      totalOT:  recs.reduce((s,r)=>s+(Number(r.ot_hours)||0),0),
    };
  });

  const prevMonth=()=>{if(month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1);};
  const inpS={padding:'6px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'};

  return (
    <div className="section" style={{paddingTop:0}}>
      <div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button className="btn-sm" onClick={prevMonth}>◀</button>
            <span style={{fontSize:18,fontWeight:700,minWidth:100,textAlign:'center'}}>{year}년 {month}월</span>
            <button className="btn-sm" onClick={nextMonth}>▶</button>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setTab('input')} style={{padding:'8px 18px',borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:13,cursor:'pointer',background:tab==='input'?'var(--primary)':'var(--card)',color:tab==='input'?'#fff':'var(--sub)'}}>입력</button>
            <button onClick={()=>setTab('summary')} style={{padding:'8px 18px',borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:13,cursor:'pointer',background:tab==='summary'?'var(--primary)':'var(--card)',color:tab==='summary'?'#fff':'var(--sub)'}}>월별 집계</button>
          </div>
        </div>

        {tab==='input'&&(
          agents.length===0
            ?<div className="empty-state">인력 관리에서 먼저 인원을 등록해주세요.</div>
            :<div className="entry-card" style={{maxWidth:'100%'}}>
              <div style={{display:'flex',gap:16,marginBottom:14,flexWrap:'wrap'}}>
                {STATUS_LIST.map(s=><span key={s} style={{fontSize:12,color:STATUS_COLORS[s],fontWeight:600}}>● {s}</span>)}
                <span style={{fontSize:12,color:'var(--sub)'}}>| OT: 시간 입력 (예: 1.5)</span>
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',fontSize:12,width:'100%',tableLayout:'fixed'}}>
                  <colgroup>
                    <col style={{width:120}}/>
                    {days.map(d=><col key={d} style={{width:`calc((100% - 120px) / ${days.length})`}}/>)}
                  </colgroup>
                  <thead><tr style={{background:'var(--bg)'}}>
                    <th style={{padding:'8px 14px',textAlign:'left',color:'var(--sub)',fontWeight:700,borderBottom:'1px solid var(--border)',position:'sticky',left:0,background:'var(--bg)',zIndex:2}}>인원</th>
                    {days.map(d=>{
                      const dow=new Date(year,month-1,d).getDay();
                      const isW=dow===0||dow===6;
                      const isH=isHoliday(d);
                      const isOff2=isW||isH;
                      return(
                        <th key={d} style={{padding:'6px 2px',textAlign:'center',color:isOff2?'var(--red)':'var(--sub)',fontWeight:700,borderBottom:'1px solid var(--border)',background:isOff2?'rgba(248,113,113,.06)':'var(--bg)'}}>
                          {d}<br/>
                          <span style={{fontSize:10,fontWeight:400}}>
                            {'일월화수목금토'[dow]}{isH?'🔴':''}
                          </span>
                        </th>);
                    })}
                  </tr></thead>
                  <tbody>{agents.filter(a=>{
                    if(!a.resigned_at) return true;
                    const resignYM=a.resigned_at.slice(0,7);
                    const curYM=year+'-'+pad(month);
                    return curYM<=resignYM;
                  }).map(a=>(
                    <tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>
                      <td style={{padding:'6px 14px',fontWeight:600,whiteSpace:'nowrap',position:'sticky',left:0,background:'var(--card)',zIndex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          {a.name}
                          <span style={a.role==='파트장'?{background:'rgba(246,173,9,.15)',color:'#F6AD09',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}:{background:'rgba(42,71,141,.25)',color:'var(--accent)',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}}>{a.role||'상담원'}</span>
                        </div>
                      </td>
                      {days.map(d=>{
                        const dow=new Date(year,month-1,d).getDay();
                        const isW=dow===0||dow===6;
                        const isH=isHoliday(d);
                        const isOffDay=isW||isH;
                        const status=getVal(d,a.name,'status');
                        const ot=getVal(d,a.name,'ot_hours');
                        return(<td key={d} style={{padding:'2px',verticalAlign:'top',background:isOffDay?'rgba(248,113,113,.05)':'',overflow:'hidden'}}>
                          {isOffDay
                            ? <div style={{textAlign:'center',padding:'4px 2px',color:'var(--sub)',fontSize:10}}>휴일</div>
                            : <>
                              <select value={status} onChange={e=>setVal(d,a.name,'status',e.target.value)}
                                style={{width:'100%',padding:'3px 1px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,color:STATUS_COLORS[status]||'var(--text)',fontSize:10,fontFamily:'inherit',outline:'none',minWidth:0,boxSizing:'border-box'}}>
                                {STATUS_LIST.filter(s=>s!=='휴일').map(s=><option key={s} value={s}>{s}</option>)}
                              </select>
                              <input type="text" inputMode="decimal" value={ot} onChange={e=>setVal(d,a.name,'ot_hours',e.target.value)}
                                placeholder="OT" style={{width:'100%',marginTop:2,padding:'2px 3px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,fontSize:10,color:'var(--text)',fontFamily:'inherit',outline:'none',minWidth:0,boxSizing:'border-box'}}/>
                              {status==='기타'&&<input type="text" value={getVal(d,a.name,'note')} onChange={e=>setVal(d,a.name,'note',e.target.value)}
                                placeholder="메모" style={{width:'100%',marginTop:2,padding:'2px 3px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:3,fontSize:10,color:'var(--text)',fontFamily:'inherit',outline:'none',minWidth:0,boxSizing:'border-box'}}/>}
                            </>
                          }
                        </td>);
                      })}
                    </tr>

                ))}</tbody>
                </table>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginTop:16}}>
                <button className="btn-save" onClick={save} disabled={saving}>{saving?'저장 중...':'저장'}</button>
                {msg&&<span className={msg.includes('실패')?'error-msg':'success-msg'}>{msg}</span>}
              </div>

              {/* 공휴일 관리 */}
              <div style={{marginTop:28,borderTop:'1px solid var(--border)',paddingTop:20}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--accent)',marginBottom:14}}>공휴일 관리</div>
                {holidays.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
                    {holidays.map(h=>(
                      <div key={h.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.15)',borderRadius:8}}>
                        <span style={{color:'var(--red)',fontWeight:600,width:100,fontSize:12}}>{h.date}</span>
                        <span style={{flex:1,fontSize:12}}>{h.name}</span>
                        <button onClick={()=>delHoliday(h.id)} style={{padding:'2px 8px',background:'transparent',border:'1px solid rgba(248,113,113,.3)',color:'var(--red)',borderRadius:4,fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <input type="date" value={newHDay} onChange={e=>setNewHDay(e.target.value)} style={{...inpS,width:140}}/>
                  <input type="text" value={newHName} onChange={e=>setNewHName(e.target.value)} placeholder="공휴일 이름 (예: 어린이날)" style={{...inpS,width:180}}/>
                  <button onClick={addHoliday} style={{padding:'7px 16px',background:'var(--primary)',border:'none',borderRadius:8,color:' var(--accent)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>+ 등록</button>
                </div>
                <div style={{fontSize:11,color:'var(--sub)',marginTop:8}}>등록된 공휴일은 근태 표에서 빨간색으로 표시되고 자동으로 휴일 처리됩니다.</div>
              </div>
            </div>
        )}

        {tab==='summary'&&(
          <div className="chart-card" style={{maxWidth:860}}>
            <div className="chart-title">{year}년 {month}월 근태 집계</div>
            {summary.length===0
              ?<div className="empty-state">입력된 데이터가 없습니다.</div>
              :<div className="table-wrap">
                <table className="hist">
                  <thead><tr><th>인원</th><th>근무일수</th><th>연차</th><th>오전반차</th><th>오후반차</th><th>기타</th><th>OT 합계</th></tr></thead>
                  <tbody>{summary.filter(s=>s!==null).map(s=>(
                    <tr key={s.name}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <b>{s.name}</b>
                          <span style={s.role==='파트장'?{background:'rgba(246,173,9,.15)',color:'#F6AD09',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}:{background:'rgba(42,71,141,.25)',color:'var(--accent)',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}}>{s.role||'상담원'}</span>
                        </div>
                      </td>
                      <td><span style={{color:'var(--green)',fontWeight:600}}>{Number.isInteger(s.workDays)?s.workDays:s.workDays.toFixed(1)}일</span></td>
                      <td>{s.annual>0?<span style={{color:'var(--red)',fontWeight:600}}>{s.annual}일</span>:'-'}</td>
                      <td>{s.halfAM>0?<span style={{color:'var(--yellow)',fontWeight:600}}>{(s.halfAM*0.5).toFixed(1)}일</span>:'-'}</td>
                      <td>{s.halfPM>0?<span style={{color:'var(--yellow)',fontWeight:600}}>{(s.halfPM*0.5).toFixed(1)}일</span>:'-'}</td>
                      <td>{s.other>0?<span style={{color:'var(--sub)',fontWeight:600}}>{s.other}일</span>:'-'}</td>
                      <td>{s.totalOT>0?<span style={{color:'var(--yellow)',fontWeight:600}}>{s.totalOT.toFixed(1)}h</span>:'-'}</td>
                    </tr>



































                ))}</tbody>
                </table>
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
}

function AgentListTab() {
  const [agents,setAgents]=useState([]); const [loading,setLoading]=useState(true);

  const calcDays=(hire,resign)=>{
    if(!hire) return null;
    const s=new Date(hire), e=resign?new Date(resign):new Date();
    return Math.max(0,Math.floor((e-s)/(1000*60*60*24))+1);
  };

  const load=async()=>{ setLoading(true); const{data}=await sb.from('agents').select('*').order('sort_order').order('created_at'); setAgents(data||[]); setLoading(false); };
  useEffect(()=>{load();},[]);

  const add=async()=>{
    if(!newName.trim()){setMsg('이름을 입력해주세요.');return;}
    const{error}=await sb.from('agents').insert({name:newName.trim(),sort_order:agents.length,role:newRole,hire_date:newHireDate||null});
    if(error){setMsg('이미 등록된 이름이거나 오류가 발생했습니다.');return;}
    setNewName(''); setNewRole('상담원'); setNewHireDate(''); setMsg(''); load();
  };
  const startEdit=(a)=>{setEditId(a.id);setEditName(a.name);setEditRole(a.role||'상담원');setEditHireDate(a.hire_date||'');};
  const saveEdit=async(id)=>{
    if(!editName.trim())return;
    await sb.from('agents').update({name:editName.trim(),role:editRole,hire_date:editHireDate||null}).eq('id',id);
    setEditId(null); load();
  };
  const doResign=async()=>{
    if(!resignTarget||!resignDate)return;
    await sb.from('agents').update({resigned_at:resignDate}).eq('id',resignTarget.id);
    setResignTarget(null); load();
  };
  const doRestore=async(a)=>{
    if(!confirm(`'${a.name}' 님을 복직 처리하시겠습니까?`))return;
    await sb.from('agents').update({resigned_at:null}).eq('id',a.id); load();
  };
  const del=async(a)=>{
    if(!confirm(`'${a.name}' 을 삭제하시겠습니까?\n기존 데이터는 유지됩니다.`))return;
    await sb.from('agents').delete().eq('id',a.id); load();

  const active=agents.filter(a=>!a.resigned_at);
  const resigned=agents.filter(a=>a.resigned_at);

  return (
    <div className="section" style={{paddingTop:0}}>
      {/* 퇴사 날짜 입력 팝업 */}

        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={e=>{if(e.target===e.currentTarget)setResignTarget(null);}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:28,width:'90%',maxWidth:360}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>퇴사 처리</div>
            <div style={{fontSize:12,color:'var(--sub)',marginBottom:20,lineHeight:1.7}}>
              <span style={{background:'rgba(42,71,141,.25)',color:'var(--accent)',padding:'2px 10px',borderRadius:6,fontWeight:600}}>{resignTarget.name}</span> 님의 퇴사 날짜를 입력해주세요.<br/>
              입력한 날짜 이후 근태 관리에서 제외됩니다.
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:11,color:'var(--sub)',fontWeight:600,display:'block',marginBottom:5}}>퇴사 날짜</label>
              <input type="date" value={resignDate} onChange={e=>setResignDate(e.target.value)}
                style={{...inpStyle,width:'100%',padding:'10px 12px'}}/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={doResign} style={{flex:1,padding:11,background:'#a01a1a',border:'1px solid #c82020',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>퇴사 처리</button>
              <button onClick={()=>setResignTarget(null)} style={{flex:1,padding:11,background:'transparent',border:'1px solid var(--border)',borderRadius:8,color:'var(--sub)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>취소</button>
            </div>
          </div>
        </div>
      )}

      <div className="entry-card" style={{maxWidth:600}}>
        {loading?<div className="loading">불러오는 중...</div>:<>

        {/* 재직 인원 */}
        <div className="entry-section-title">재직 인원 ({active.length}명)</div>
        {active.length===0?<div className="empty-state" style={{padding:'12px'}}>등록된 인원이 없습니다</div>:
        <div className="agent-mgmt-list">
          {active.map((a,i)=>(
            <div key={a.id} style={{padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,marginBottom:6}}>
              {editId===a.id?(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <input style={{...inpStyle,flex:1,minWidth:80}} value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveEdit(a.id)} autoFocus/>
                    <select value={editRole} onChange={e=>setEditRole(e.target.value)} style={selStyle}>
                      {ROLES.map(r=><option key={r}>{r}</option>)}
                    </select>
                    <input type="date" value={editHireDate} onChange={e=>setEditHireDate(e.target.value)} style={{...selStyle,minWidth:160}}/>
                    <button className="btn-icon save" onClick={()=>saveEdit(a.id)}>저장</button>
                    <button className="btn-icon cancel" onClick={()=>setEditId(null)}>취소</button>
                  </div>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <span style={{fontSize:14,fontWeight:600}}>{a.name}</span>
                      <span style={roleStyle(a.role||'상담원')}>{a.role||'상담원'}</span>
                    </div>
                    <div style={{display:'flex',gap:12,fontSize:11,color:'var(--sub)'}}>
                      {a.hire_date&&<span>입사일 <span style={{color:'var(--accent)',fontWeight:500}}>{a.hire_date}</span></span>}
                      {a.hire_date&&<span>근무 <span style={{background:'rgba(34,211,160,.1)',color:'#22d3a0',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}}>{calcDays(a.hire_date,null)}일</span></span>}
                    </div>
                  </div>
                  <button onClick={()=>startEdit(a)} style={{padding:'4px 10px',background:'rgba(42,71,141,.15)',border:'1px solid #2A478D',color:'#D2E5FF',borderRadius:5,fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>수정</button>
                  <button onClick={()=>{setResignTarget(a);setResignDate(today());}} style={{padding:'4px 10px',background:'rgba(100,130,200,.15)',border:'1px solid #5a7abf',color:'#a8c4ff',borderRadius:5,fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>퇴사</button>
                  <button onClick={()=>del(a)} style={{padding:'4px 10px',background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',color:'#f87171',borderRadius:5,fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
                </div>
              )}
            </div>
          ))}
        </div>}

        {/* 퇴사 인원 */}
        {resigned.length>0&&<>
        <div className="entry-section-title" style={{marginTop:20}}>퇴사 인원 ({resigned.length}명)</div>
        <div className="agent-mgmt-list">
          {resigned.map(a=>(
            <div key={a.id} style={{padding:'10px 14px',background:'rgba(248,113,113,.03)',border:'1px solid rgba(248,113,113,.15)',borderRadius:8,marginBottom:6,opacity:.7}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>

                    <span style={{background:'rgba(248,113,113,.15)',color:'var(--red)',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:600}}>퇴사</span>

                  <div style={{display:'flex',gap:12,fontSize:11,color:'var(--sub)'}}>
                    {a.hire_date&&<span>입사일 <span style={{color:'var(--sub)',fontWeight:500}}>{a.hire_date}</span></span>}
                    <span>퇴사일 <span style={{color:'var(--red)',fontWeight:500}}>{a.resigned_at}</span></span>
                    {a.hire_date&&<span>재직 <span style={{background:'rgba(248,113,113,.1)',color:'var(--red)',padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600}}>{calcDays(a.hire_date,a.resigned_at)}일</span></span>}
                  </div>
                </div>
                <button onClick={()=>doRestore(a)} style={{padding:'3px 8px',background:'rgba(34,211,160,.08)',border:'1px solid rgba(34,211,160,.3)',color:'#22d3a0',borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>복직</button>
                <button onClick={()=>del(a)} style={{padding:'4px 10px',background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',color:'#f87171',borderRadius:5,fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
              </div>
            </div>
          ))}
        </div>
        </>}

        {/* 인원 추가 */}
        <div className="entry-section-title" style={{marginTop:24}}>인원 추가</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,color:'var(--sub)',fontWeight:500}}>이름</span>
            <input style={{...inpStyle,width:120,height:34}} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="이름" onKeyDown={e=>e.key==='Enter'&&add()}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,color:'var(--sub)',fontWeight:500}}>역할</span>
            <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={selStyle}>
              {ROLES.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,color:'var(--sub)',fontWeight:500}}>입사일</span>
            <input type="date" value={newHireDate} onChange={e=>setNewHireDate(e.target.value)} style={{...selStyle,minWidth:160}}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <span style={{fontSize:10,color:'transparent'}}>.</span>
            <button className="btn-add" onClick={add}>추가</button>
          </div>
        </div>
        {msg&&<div className="error-msg" style={{marginTop:8,textAlign:'left'}}>{msg}</div>}
        </>}
      </div>
    </div>
  );
}

const EMPTY_OPS = {date:'',inbound_calls:'',request_calls:'',answered_calls:'',ob_contacts:'',in_call_time:'',out_call_time:''};

function EntryPage({ editDate: propEditDate, onSaved }) {
  const [entryTab, setEntryTab] = useState('form');
  const [localEditDate, setLocalEditDate] = useState(null);
  const editDate = localEditDate || propEditDate;
  const [ops,setOps]=useState({...EMPTY_OPS});
  const [registeredAgents,setRegisteredAgents]=useState([]);
  const [agentData,setAgentData]=useState({});
  const [saving,setSaving]=useState(false); const [msg,setMsg]=useState('');
  const [uploadMsg,setUploadMsg]=useState(''); const [uploading,setUploading]=useState(false);
  const fileRef=useRef(null);

  const loadAgents=async(forEditDate, forEntryDate)=>{
    let list;

    if(forEditDate){
      // 수정 모드: 재직자 + 해당 날짜에 데이터 있는 퇴사자 (과거 데이터 보존)
      const{data:activeData}=await sb.from('agents').select('*').is('resigned_at',null).order('sort_order').order('created_at');
      list=activeData||[];
      const{data:dayOps}=await sb.from('agent_daily_ops').select('agent_name').eq('date',forEditDate);
      const dayNames=new Set((dayOps||[]).map(r=>r.agent_name));
      const activeNames=new Set(list.map(a=>a.name));
      // 그 날짜에 데이터가 있으나 현재 재직자 목록엔 없는(=퇴사한) 상담원 조회
      const missing=[...dayNames].filter(n=>!activeNames.has(n));
      if(missing.length>0){
        const{data:resigned}=await sb.from('agents').select('*').in('name',missing);
        if(resigned&&resigned.length>0){
          // 재직자 뒤에 퇴사자를 붙임 (퇴사자는 _resigned 플래그 표시)
          list=[...list,...resigned.map(a=>({...a,_resigned:true}))];
        }
      }
    } else if(forEntryDate){
      // 신규 입력 모드 + 날짜 선택됨: 전체 상담원을 불러온 뒤 날짜 기준으로 필터
      // (퇴사자도 일단 불러와야 "그 날짜엔 재직 중이었던" 판단이 가능함)
      const{data:allData}=await sb.from('agents').select('*').order('sort_order').order('created_at');
      // 조건: 입사일 <= 입력날짜  AND  (퇴사일 없음 OR 입력날짜 <= 퇴사일)
      //  - 퇴사일 당일까지는 입력 가능 (결정 A: 입력날짜 <= 퇴사일)
      //  - hire_date가 NULL이면 입사일 제약 없음 (항상 통과)
      //  - resigned_at에 시간(T..)이 붙어 있어도 앞 10자리(YYYY-MM-DD)만 비교
      list=(allData||[]).filter(a=>{
        const resignDay=a.resigned_at?String(a.resigned_at).slice(0,10):null;
        const hireDay=a.hire_date?String(a.hire_date).slice(0,10):null;
        const hireOk=!hireDay || hireDay<=forEntryDate;
        const resignOk=!resignDay || forEntryDate<=resignDay;
        return hireOk && resignOk;
      });
    } else {
      // 날짜 미선택: 전체 재직자 표시 (기존 동작)
      const{data:activeData}=await sb.from('agents').select('*').is('resigned_at',null).order('sort_order').order('created_at');
      list=activeData||[];
    }

    setRegisteredAgents(list);
    const init={};
    list.forEach(a=>{init[a.id]={answered:'',ob:'',board:'',chat:'',etc:''};});
    setAgentData(p=>{ const merged={...init}; Object.keys(p).forEach(k=>{if(merged[k])merged[k]=p[k];}); return merged; });
    return list;
  };

  // 수정 모드: editDate 기준으로 데이터 로드 (퇴사자 포함)
  useEffect(()=>{
    if(!editDate)return;
    (async()=>{
      const list=await loadAgents(editDate, undefined);
      const[r1,r2]=await Promise.all([
        sb.from('daily_ops').select('*').eq('date',editDate).single(),
        sb.from('agent_daily_ops').select('*').eq('date',editDate),
      ]);
      if(r1.data)setOps(r1.data);
      if(r2.data){
        const d={};
        r2.data.forEach(a=>{ d[a.agent_name]={answered:a.answered_calls,ob:a.ob_count,board:a.board_count,chat:a.chat_count,etc:a.etc_count}; });
        // loadAgents가 반환한 list로 직접 매칭 (state 타이밍 이슈 방지)
        setAgentData(p=>{
          const merged={...p};
          list.forEach(agent=>{
            if(d[agent.name])merged[agent.id]=d[agent.name];
          });
          return merged;
        });
      }
    })();
  },[editDate]);

  // 신규 입력 모드: 선택한 날짜 기준으로 그 날짜에 재직 중인 상담원만 표시
  // (날짜를 바꾸면 목록 + 입력값 초기화 / 날짜 미선택 시 전체 재직자)
  useEffect(()=>{
    if(editDate)return; // 수정 모드는 위 useEffect가 처리
    (async()=>{
      // 날짜가 바뀌면 이전 날짜의 입력 잔상을 먼저 비움 (옵션1: 날짜 변경 시 초기화)
      setAgentData({});
      await loadAgents(undefined, ops.date||undefined);
    })();
  },[editDate, ops.date]);

  const setOpsF=(k,v)=>setOps(p=>({...p,[k]:v}));
  const setAD=(id,k,v)=>setAgentData(p=>({...p,[id]:{...p[id],[k]:v}}));
  const inputStyle={padding:'8px 12px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,width:'100%',fontFamily:'inherit'};
  const getAD=(id,k)=>agentData[id]?agentData[id][k]||'':'';

  const autoRR=calcRR(ops);

  const save=async()=>{
    if(!ops.date){setMsg('날짜를 선택해주세요.');return;}
    setSaving(true); setMsg('');
    const opsPayload={date:ops.date,response_rate:Number(autoRR)||0,inbound_calls:Number(ops.inbound_calls)||0,request_calls:Number(ops.request_calls)||0,answered_calls:Number(ops.answered_calls)||0,ob_contacts:Number(ops.ob_contacts)||0,in_call_time:ops.in_call_time||'',out_call_time:ops.out_call_time||''};
    const agentPayloads=registeredAgents.map(a=>({
      date:ops.date,
      agent_name:a.name,
      answered_calls:Number(getAD(a.id,'answered'))||0,
      ob_count:Number(getAD(a.id,'ob'))||0,
      board_count:Number(getAD(a.id,'board'))||0,
      chat_count:Number(getAD(a.id,'chat'))||0,
      etc_count:Number(getAD(a.id,'etc'))||0,
      // UPH는 입력 날짜 기준으로 계산식 분기 (5/7부터 새 식)
      uph:Number(calcUph({
        answered:getAD(a.id,'answered'),
        ob:getAD(a.id,'ob'),
        board:getAD(a.id,'board'),
        chat:getAD(a.id,'chat'),
        etc:getAD(a.id,'etc'),
      }, ops.date))||0,
    }));
    const[r1,r2]=await Promise.all([
      sb.from('daily_ops').upsert(opsPayload,{onConflict:'date'}),
      sb.from('agent_daily_ops').upsert(agentPayloads,{onConflict:'date,agent_name'}),
    ]);
    setSaving(false);
    if(r1.error||r2.error){setMsg('저장 실패: '+(r1.error||r2.error).message);return;}
    setMsg('저장되었습니다!');
    // 저장 성공 → 입력 폼 초기화 + 데이터 내역 탭으로 이동
    setTimeout(()=>{
      // 폼 초기화
      setOps({...EMPTY_OPS});
      const cleared={};
      registeredAgents.forEach(a=>{cleared[a.id]={answered:'',ob:'',board:'',chat:'',etc:''};});
      setAgentData(cleared);
      setMsg('');
      // 편집 모드였으면 해제
      if(editDate){ setLocalEditDate(null); if(onSaved)onSaved(); }
      // 데이터 내역 탭으로 이동
      setEntryTab('history');
    },800);
  };

  // 엑셀 양식 다운로드
  const downloadTemplate=()=>{
    const wb=XLSX.utils.book_new();
    // Sheet1: 유선현황
    const s1=[['날짜','인입호','요청호','응대호','OB컨택호','총IN통화시간','총OUT통화시간'],['2025-04-01','100','90','88','5','02:30:00','01:00:00']];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'유선현황');
    // Sheet2: 상담원별
    const s2=[['날짜','상담원명','응대호','OB','게시판','채팅','기타'],['2025-04-01','홍길동','22','1','8','5','0'],['2025-04-01','김철수','20','2','7','4','0']];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'상담원별');
    XLSX.writeFile(wb,'운영데이터_양식.xlsx');
  };

  // 엑셀 업로드
  const handleUpload=async(e)=>{
    const file=e.target.files?.[0]; if(!file)return;
    setUploading(true); setUploadMsg('');
    try {
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});

      // Sheet1: 유선현황
      const s1=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const s2=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{defval:''});

      // 날짜: 시리얼 번호 → UTC 기준 변환 (timezone 무관)
      const parseDate=v=>{ 
        if(!v) return '';
        if(typeof v==='number'){
          const ms=Math.round(v-25569)*86400*1000;
          const d=new Date(ms);
          return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
        }
        if(v instanceof Date){
          return v.getUTCFullYear()+'-'+String(v.getUTCMonth()+1).padStart(2,'0')+'-'+String(v.getUTCDate()).padStart(2,'0');
        }
        const s=String(v).trim();
        if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
        return s;
      };
      // 시간: 소수 → HH:MM:SS
      const parseTime=v=>{
        if(!v) return '';
        if(typeof v==='number'){
          const totalSec=Math.round(v*86400);
          const h=String(Math.floor(totalSec/3600)).padStart(2,'0');
          const m=String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
          const s=String(totalSec%60).padStart(2,'0');
          return h+':'+m+':'+s;
        }
        if(v instanceof Date){
          return String(v.getUTCHours()).padStart(2,'0')+':'+String(v.getUTCMinutes()).padStart(2,'0')+':'+String(v.getUTCSeconds()).padStart(2,'0');
        }
        return String(v).trim();
      };
      const opsRows=s1.map(r=>({
        date:parseDate(r['날짜']),
        inbound_calls:Number(r['인입호'])||0, request_calls:Number(r['요청호'])||0,
        answered_calls:Number(r['응대호'])||0, ob_contacts:Number(r['OB컨택호'])||0,
        in_call_time:parseTime(r['총IN통화시간']), out_call_time:parseTime(r['총OUT통화시간']),
        response_rate: r['요청호']?+((Number(r['응대호'])/Number(r['요청호']))*100).toFixed(1):0,
      })).filter(r=>r.date&&r.date!=='undefined');

      const agentRows=s2.map(r=>{
        const rDate=parseDate(r['날짜']);
        const answered=Number(r['응대호'])||0, ob=Number(r['OB'])||0;
        const board=Number(r['게시판'])||0, chat=Number(r['채팅'])||0, etc=Number(r['기타'])||0;
        return {
          date:rDate, agent_name:String(r['상담원명']).trim(),
          answered_calls:answered, ob_count:ob,
          board_count:board, chat_count:chat, etc_count:etc,
          // UPH 날짜 분기: 5/7부터 (응대호+OB+게시판+채팅+기타)/8, 그 전은 (응대호+게시판+채팅)/8
          uph:Number(calcUph({answered,ob,board,chat,etc}, rDate))||0,
        };
      }).filter(r=>r.date&&r.agent_name);

      // 결정5(옵션b): 입사일 이전 / 퇴사일 이후 데이터 행은 제외 + 경고
      // 조건: 입사일 <= 날짜 AND (퇴사일 없음 OR 날짜 <= 퇴사일)
      const{data:agentMeta}=await sb.from('agents').select('name,hire_date,resigned_at');
      const metaMap={};
      (agentMeta||[]).forEach(a=>{metaMap[a.name]=a;});
      const skipped=[];
      const validAgentRows=agentRows.filter(r=>{
        const m=metaMap[r.agent_name];
        if(!m) return true; // 명단에 없는 이름은 일단 통과(기존 동작 유지)
        const hireOk=!m.hire_date || m.hire_date<=r.date;
        const resignOk=!m.resigned_at || r.date<=m.resigned_at;
        if(!hireOk || !resignOk){
          skipped.push(r.date+' '+r.agent_name+(!hireOk?' (입사 전)':' (퇴사 후)'));
          return false;
        }
        return true;
      });
      if(skipped.length>0){
        if(!confirm('다음 '+skipped.length+'건은 입사 전 또는 퇴사 후 데이터라 제외됩니다:\n\n'+skipped.join('\n')+'\n\n나머지만 업로드를 진행할까요?')){
          setUploading(false); e.target.value=''; return;
        }
      }

      // 업로드 전 날짜 미리보기 확인
      const previewDates=opsRows.map(r=>r.date).join('\n');
      if(!confirm('아래 날짜로 업로드됩니다. 확인해주세요.\n\n'+previewDates+'\n\n총 '+opsRows.length+'일치 데이터')){
        setUploading(false); return;
      }
      const[r1,r2]=await Promise.all([
        sb.from('daily_ops').upsert(opsRows,{onConflict:'date'}),
        sb.from('agent_daily_ops').upsert(validAgentRows,{onConflict:'date,agent_name'}),
      ]);
      const errs=[r1.error&&'유선현황: '+r1.error.message, r2.error&&'상담원별: '+r2.error.message].filter(Boolean);
      if(errs.length)throw new Error(errs.join(' / '));
      setUploadMsg('✅ 업로드 완료: 유선현황 '+opsRows.length+'건, 상담원 데이터 '+validAgentRows.length+'건'+(skipped.length>0?' (제외 '+skipped.length+'건)':''));
    } catch(err){ setUploadMsg('❌ 오류: '+err.message); }
    setUploading(false); e.target.value='';
  };

  const sumAgents=key=>registeredAgents.reduce((s,a)=>s+(Number(getAD(a.id,key))||0),0);

  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">데이터 입력</div><div className="page-sub">일별 운영 현황 데이터 입력 및 내역 관리</div></div>
      </div>
      <div className="section" style={{paddingBottom:0}}>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['form','history'].map(t=>(
            <button key={t} onClick={()=>setEntryTab(t)} style={{padding:'8px 18px',borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:13,cursor:'pointer',
              background:entryTab===t?'var(--primary)':'var(--card)',color:entryTab===t?'#fff':'var(--sub)'}}>
              {t==='form'?(editDate?'데이터 수정':'데이터 입력'):'데이터 내역'}
            </button>
          ))}
        </div>
      </div>
      {entryTab==='history'&&<EntryHistorySection onEdit={d=>{setLocalEditDate(d);setEntryTab('form');}}/>}
      {entryTab==='form'&&<div className="section">
        {/* 엑셀 업로드 */}
        <div className="upload-area" style={{marginBottom:16}}>
          <div>
            <button className="btn-upload" onClick={()=>fileRef.current?.click()} disabled={uploading} style={{color:'#fff'}}>{uploading?'업로드 중...':'📂 파일 업로드'}</button>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleUpload}/>
          </div>
          <button className="btn-template" onClick={downloadTemplate}>⬇ 양식 다운로드</button>
          <div className="upload-desc">
            시트1 <b>유선현황</b>: 날짜/인입호/요청호/응대호/OB컨택호/총IN통화시간/총OUT통화시간{" | "}
            시트2 <b>상담원별</b>: 날짜/상담원명/응대호/OB/게시판/채팅
          </div>
        </div>
        {uploadMsg&&<div className={`upload-result ${uploadMsg.startsWith('✅')?'ok':'err'}`} style={{marginBottom:12}}>{uploadMsg}</div>}

        <div style={{display:'flex',gap:20,alignItems:'flex-start'}}>

          {/* 좌측: 날짜 + 유선현황 */}
          <div style={{width:'420px',flexShrink:0,display:'flex',flexDirection:'column',gap:14}}>
            <div className="entry-card" style={{padding:16}}>
              <div className="entry-section-title">날짜 정보</div>
              <div className="entry-field"><label>날짜</label><input type="date" value={ops.date||''} onChange={e=>setOps(p=>({...p,date:e.target.value}))} style={inputStyle}/></div>
            </div>
            <div className="entry-card" style={{padding:16}}>
              <div className="entry-section-title">유선 현황</div>
              <div className="entry-grid">
                {[{label:'인입호',k:'inbound_calls'},{label:'요청호',k:'request_calls'},{label:'응대호',k:'answered_calls'},{label:'OB 컨택호',k:'ob_contacts'}].map(f=>(
                  <div className="entry-field" key={f.k}><label>{f.label}</label><input type="text" inputMode="numeric" value={ops[f.k]||''} onChange={e=>setOps(p=>({...p,[f.k]:e.target.value}))} style={inputStyle} placeholder="0"/></div>
                ))}
              </div>
              <div className="entry-grid" style={{marginTop:8}}>
                <div className="entry-field"><label>총IN 통화시간</label><input type="text" value={ops.in_call_time||''} onChange={e=>setOps(p=>({...p,in_call_time:e.target.value}))} style={inputStyle} placeholder="00:00:00"/></div>
                <div className="entry-field"><label>총OUT 통화시간</label><input type="text" value={ops.out_call_time||''} onChange={e=>setOps(p=>({...p,out_call_time:e.target.value}))} style={inputStyle} placeholder="00:00:00"/></div>
                <div className="entry-field"><label>응대율 (자동계산)</label><input type="text" value={autoRR?autoRR+'%':''} readOnly style={{...inputStyle,background:'var(--surface)',color:'var(--accent)'}}/></div>
              </div>
            </div>
          </div>

          {/* 우측: 상담원별 처리 현황 + 저장 */}
          <div style={{width:'660px',flexShrink:0,display:'flex',flexDirection:'column',gap:14}}>
            <div className="entry-card" style={{padding:16}}>
              <div className="entry-section-title">상담원별 처리 현황</div>
              {registeredAgents.length===0
                ? <div style={{color:'var(--sub)',fontSize:13,padding:'12px 0'}}>등록된 상담원이 없습니다. 사이드바의 <b>상담원 관리</b>에서 먼저 등록해주세요.</div>
                : <div style={{overflowX:'auto'}}>
                    <table className="agent-table">
                      <thead><tr>
                        <th style={{minWidth:100}}>상담원명</th>
                        <th style={{minWidth:75}}>응대호</th>
                        <th style={{minWidth:75}}>OB</th>
                        <th style={{minWidth:75}}>게시판</th>
                        <th style={{minWidth:75}}>채팅</th>
                        <th style={{minWidth:75}}>기타</th>
                        <th style={{minWidth:90}}>UPH (자동)</th>
                      </tr></thead>
                      <tbody>
                        {registeredAgents.map(a=>(
                          <tr key={a.id} style={a._resigned?{opacity:.6}:undefined}>
                            <td className="agent-name-cell">
                              {a.name}
                              {a._resigned&&<span style={{marginLeft:6,fontSize:10,fontWeight:600,color:'#f87171',background:'rgba(248,113,113,.12)',border:'1px solid rgba(248,113,113,.35)',borderRadius:4,padding:'1px 5px'}}>퇴사</span>}
                            </td>
                            <td><input type="text" inputMode="numeric" value={getAD(a.id,'answered')} onChange={e=>setAD(a.id,'answered',e.target.value)} style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13}}/></td>
                            <td><input type="text" inputMode="numeric" value={getAD(a.id,'ob')} onChange={e=>setAD(a.id,'ob',e.target.value)} style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13}}/></td>
                            <td><input type="text" inputMode="numeric" value={getAD(a.id,'board')} onChange={e=>setAD(a.id,'board',e.target.value)} style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13}}/></td>
                            <td><input type="text" inputMode="numeric" value={getAD(a.id,'chat')} onChange={e=>setAD(a.id,'chat',e.target.value)} style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13}}/></td>
                            <td><input type="text" inputMode="numeric" value={getAD(a.id,'etc')} onChange={e=>setAD(a.id,'etc',e.target.value)} style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13}}/></td>
                            <td><input type="text" value={calcUph({answered:getAD(a.id,'answered'),board:getAD(a.id,'board'),chat:getAD(a.id,'chat'),ob:getAD(a.id,'ob'),etc:getAD(a.id,'etc')}, ops.date)} readOnly style={{...inputStyle,width:70,padding:'6px 8px',fontSize:13,background:'var(--surface)',color:'var(--yellow)'}}/></td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot><tr>
                        <td style={{fontWeight:700,color:'var(--accent)',padding:'8px 10px',borderTop:'2px solid var(--primary)',background:'var(--bg)'}}>합계</td>
                        <td style={{fontWeight:700,color:'var(--yellow)',padding:'8px 10px',borderTop:'2px solid var(--primary)',background:'var(--bg)'}}>{sumAgents('answered')}</td>
                        <td style={{fontWeight:700,color:'var(--yellow)',padding:'8px 10px',borderTop:'2px solid var(--primary)',background:'var(--bg)'}}>{sumAgents('ob')}</td>

// ── 이미지 → base64 변환 (최대 800px 리사이즈) — 마이그레이션용으로 유지
function imgToBase64(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=800;
        let w=img.width, h=img.height;
        if(w>MAX||h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.82));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 이미지 → Supabase Storage 업로드 (최대 800px 리사이즈) → public URL 반환
//    DB 절약을 위해 base64 대신 URL만 cs_images jsonb에 저장
async function uploadImage(file, productCode){
  // 1. 리사이즈된 base64 dataURL 받기 (imgToBase64 재사용)
  const dataUrl = await imgToBase64(file);
  // 2. dataURL → Blob 변환
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  // 3. 경로 생성: {product_code or 'temp'}/{timestamp}_{random}.jpg
  const folder = productCode || 'temp';
  const filename = Date.now() + '_' + Math.random().toString(36).slice(2,8) + '.jpg';
  const path = folder + '/' + filename;
  // 4. Storage 업로드
  const { error: upErr } = await sb.storage.from('cs-images').upload(path, blob, {
    contentType: 'image/jpeg',
    upsert: false
  });
  if(upErr) throw upErr;
  // 5. public URL 반환
  const { data } = sb.storage.from('cs-images').getPublicUrl(path);
  return data.publicUrl;
}

// ── base64 dataURL → Storage 업로드 (마이그레이션 전용)
async function migrateBase64ToStorage(dataUrl, productCode){
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  const folder = productCode || 'migrated';
  const filename = Date.now() + '_' + Math.random().toString(36).slice(2,8) + '.jpg';
  const path = folder + '/' + filename;
  const { error: upErr } = await sb.storage.from('cs-images').upload(path, blob, {
    contentType: 'image/jpeg',
    upsert: false
  });
  if(upErr) throw upErr;
  const { data } = sb.storage.from('cs-images').getPublicUrl(path);
  return data.publicUrl;
}

function parseOptions(str){
  if(!str||str==='nan') return [];
  return str.split('//').map(part=>{
    const m=part.match(/^([^{]+)\{([^}]*)\}/);
    if(!m) return null;
    return {name:m[1].trim(), values:m[2].split('|').map(v=>v.trim()).filter(Boolean)};
  }).filter(Boolean);
}

      if(error) throw error;
      // base64가 포함된 row만 필터

        if(!p.cs_images) continue;
        let parsed;
        try{ parsed=JSON.parse(p.cs_images); }catch(e){ continue; }
        // base64 dataURL이 하나라도 있는지 확인
        let hasBase64=false;
        for(const cat of Object.keys(parsed||{})){
          for(const arr of (parsed[cat]||[])){
            for(const url of (arr||[])){
              if(typeof url==='string' && url.startsWith('data:')){ hasBase64=true; break; }
            }
            if(hasBase64) break;
          }
          if(hasBase64) break;
        }
        if(hasBase64) targets.push({...p,_parsed:parsed});
      }
      if(targets.length===0){
        setMigStatus('✅ 이전할 base64 이미지가 없습니다.');

        return;

      setMigProgress(p=>({...p,total:targets.length}));
      let migrated=0, failed=0;
      // 한 row씩 처리 (안정성 우선, 빠른 처리보다 안전 우선)

        for(const cat of Object.keys(prod._parsed||{})){

            const newArr=[];
            for(const url of (arr||[])){
              if(typeof url!=='string'||!url){ continue; }
              if(url.startsWith('data:')){
                // base64 → Storage 이전
                try{
                  const newUrl=await migrateBase64ToStorage(url, prod.product_code);

                  console.warn('업로드 실패, base64 유지:',prod.product_code,err);
                  newArr.push(url); // 실패 시 base64 그대로 유지
                  failed++;
                }
              }else{
                // 이미 URL인 경우 그대로 유지
                newArr.push(url);
              }
            }
            newCsImages[cat].push(newArr);
          }
        }
        // DB 갱신
        const {error:updErr}=await sb.from('products').update({cs_images:JSON.stringify(newCsImages)}).eq('id',prod.id);
        if(updErr){ console.warn('DB 갱신 실패:',prod.product_code,updErr); }
        setMigProgress({done:i+1,total:targets.length,migrated,failed});

      setMigStatus(`✅ 완료! 총 ${migrated}장 이전 (실패 ${failed}장). 페이지를 새로고침해주세요.`);

  const syncZendesk=async()=>{
    setZdStatus('Zendesk API 연결 중...');
    setZdProgress(0);
    const SECTION_ID=9335134001423; // 상품 정보(배송비,FAQ 등) 섹션
    let allArticles=[], page=1, totalPages=1;
    try{
      while(page<=totalPages){
        setZdStatus(`아티클 불러오는 중... (${page}/${totalPages}페이지)`);
        const res=await fetch(`https://oneroom.zendesk.com/api/v2/help_center/ko/articles.json?page=${page}&per_page=100`);
        if(!res.ok) throw new Error('API 오류: '+res.status);
        const data=await res.json();
        totalPages=data.page_count;
        // 상품 정보 섹션만 필터
        const filtered=data.articles.filter(a=>a.section_id===SECTION_ID);
        allArticles=[...allArticles,...filtered];
        setZdProgress(Math.round(page/totalPages*40));
        page++;
      }
      setZdStatus(`아티클 ${allArticles.length}개 파싱 중...`);

      // HTML 파싱 헬퍼
      const parseHtml=(html)=>{
        const div=document.createElement('div');
        div.innerHTML=html;
        return div.textContent||'';
      };
      const extractQA=(html)=>{
        // Q./A. 패턴 추출 → [상품] 형태로 포맷
        // 이미지 첨부 등으로 Zendesk HTML 구조가 변형된 경우도 대응:
        //   1순위: <li>Q.</li> 안에 중첩된 <ul><li>A.</li></ul> (이상적)
        //   2순위: li의 textContent에서 A. 위치를 찾아 flat split (이미지로 중첩 구조 깨진 경우)
        const div=document.createElement('div');
        div.innerHTML=html;
        const items=div.querySelectorAll('li');
        const qaList=[];
        items.forEach(li=>{
          // 상위 li 안에 중첩된 A용 li는 건너뜀 (Q의 자식으로 이미 처리됨)
          if(li.parentElement&&li.parentElement.closest('li')) return;
          const txt=li.textContent.trim();
          if(!(txt.startsWith('Q.')||txt.startsWith('Q. '))) return;
          let q='', a='';
          const aSub=li.querySelector('ul li');
          if(aSub){
            // 중첩 구조: Q는 첫 줄, A는 중첩 li에서
            const firstLine=txt.indexOf('\n')>-1?txt.substring(0,txt.indexOf('\n')):txt;
            q=firstLine.replace(/^Q\.\s*/,'').trim();
            a=aSub.textContent.replace(/^A\.\s*/,'').trim();
          } else {
            // Flat 구조: 같은 li 안에서 'A. ' 위치로 분리
            const aIdx=txt.indexOf('A. ',2); // 'Q.' 이후부터 검색
            if(aIdx>0){
              q=txt.substring(0,aIdx).replace(/^Q\.\s*/,'').trim();
              a=txt.substring(aIdx+3).trim();
            } else {
              // Q만 있는 경우
              q=txt.replace(/^Q\.\s*/,'').trim();
            }
          }
          if(q) qaList.push({q,a});
        });
        return qaList;
      };

      // 각 아티클 파싱
      const updates=[];
      allArticles.forEach(art=>{
        // 제목에서 상품코드 추출
        const codeMatch=art.title.match(/P[0-9A-Z]{7}/);
        if(!codeMatch) return;
        const product_code=codeMatch[0];

        const bodyText=parseHtml(art.body);

        // 반품배송비 추출
        const retMatch=bodyText.match(/반품[\s\S]{0,4}배송비[\s\S]{0,4}[:：][\s\S]{0,4}([^\n\r]{1,50})/);
        const returnFeeText=retMatch?retMatch[1].trim():'';

        // Q&A 추출
        const qaList=extractQA(art.body);

        // cs_info 포맷 구성 — parseCs가 인식하는 '상품' 카테고리로 저장
        let cs='';
        if(returnFeeText) cs+='[반품배송비]\n'+returnFeeText+'\n\n';
        if(qaList.length>0){
          cs+='[상품]\n';
          qaList.forEach(({q,a})=>{
            cs+='Q. '+q+'\n';
            if(a) cs+='A. '+a+'\n';
            cs+='\n';
          });
        }

        // 반품배송비 금액 숫자 추출 (예: "왕복 6,000원" → 6000)
        const retNumMatch=returnFeeText.match(/([0-9,]+)\s*원/);
        const returnFeeNum=retNumMatch?Number(retNumMatch[1].replace(/,/g,'')):0;
        updates.push({product_code, cs_info:cs.trim(), return_fee:returnFeeNum, return_fee_type:'A'});
      });

      setZdStatus(`${updates.length}개 상품 Supabase 업데이트 중...`);

      // 200개 배치로 upsert
      let done=0;
      const BATCH=50;
      for(let i=0;i<updates.length;i+=BATCH){
        const batch=updates.slice(i,i+BATCH);
        // 각 상품코드로 update
        await Promise.all(batch.map(u=>
          sb.from('products')
            .update({cs_info:u.cs_info, return_fee:u.return_fee, return_fee_type:u.return_fee_type, updated_at:new Date().toISOString()})
            .eq('product_code',u.product_code)
            .or('cs_info.is.null,cs_info.eq.')
        ));
        done+=batch.length;
        setZdProgress(40+Math.round(done/updates.length*60));
        setZdStatus(`업데이트 중... (${done}/${updates.length})`);
      }

      setZdProgress(100);
      setZdStatus(`✅ 완료! Zendesk ${updates.length}개 아티클 처리 (기존 CS 정보 없는 상품에만 적용)`);
      load(page,search,searchField);
    }catch(err){
      setZdStatus('❌ 오류: '+err.message);
    }
  };

  const parseC24=(rows)=>{
    // 배송방법 코드 매핑

    // 배송비 구분 코드 매핑
    const condMap={'T':'무료','R':'고정 배송비','M':'금액 조건부 무료','N':'수량 비례','C':'수량별 차등','D':'금액별 차등','W':'무게별 차등'};
    // 선결제 코드 매핑
    const payMap={'P':'선결제','C':'착불','B':'선결제/착불'};

    return rows.map(r=>{

      let shipFee=0, shipThreshold=0;

        // 금액 조건부: 30000|3000 형식
        const parts=bInput.split('|');
        shipThreshold=Number(parts[0])||0;
        shipFee=Number(parts[1])||0;
      } else {
        shipFee=Number(bInput)||0;
      }

      const pno=String(r['상품번호']||'').trim();
      return {
        supplier_name:  String(r['공급사명']||'').trim(),

  const parseCs=(text)=>{
    const map={};
    if(!text) return map;
    const cats=['불량','변심','상품','기타'];
    // 별칭 매핑: Zendesk 초기 동기화 시 [FAQ]로 저장된 기존 데이터를 상품 카테고리로 흡수
    const catAlias={'FAQ':'상품'};
    let cur=null;
    let curQ='';
    let curA=null; // 현재 누적 중인 A
    // Q가 있으면 무조건 푸시 (A가 없는 Q-only 항목도 보존 — Zendesk sync에서 이미지로 구조 깨진 경우 대응)
    const flush=()=>{ if(cur&&curQ){ map[cur].push({q:curQ.trim(),a:(curA||'').trim()}); curQ=''; curA=null; } };
    // CRLF/LF 모두 처리 (Excel은 편집 후 저장하면 \n을 \r\n으로 변환함)
    text.split(/\r?\n/).forEach(line=>{
      const catMatch=line.match(/^\[(.+)\]$/);
      if(catMatch){
        const raw=catMatch[1];
        const resolved=cats.includes(raw)?raw:(catAlias[raw]||null);
        if(resolved){ flush(); cur=resolved; if(!map[cur])map[cur]=[]; return; }
      }
      if(!cur) return;
      if(line.startsWith('Q. ')){
        flush();
        const qBody=line.slice(3);
        // 인라인 "Q. xxx A. yyy" 또는 "Q. xxx?A. yyy" 패턴 감지 (Zendesk 이미지로 A가 Q와 같은 줄에 합쳐진 경우)
        const aIdx=qBody.indexOf('A. ');
        if(aIdx>0){ curQ=qBody.substring(0,aIdx).trim(); curA=qBody.substring(aIdx+3).trim(); }
        else { curQ=qBody; }
      }
      else if(line.startsWith('A. ')){ curA=line.slice(3); }
      else if(curA!==null){ curA+=('\n'+line); } // A의 이어지는 줄
    });
    flush();
    return map;
  };
