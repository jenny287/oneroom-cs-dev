          product_name:  String(r['상품명']||'').trim(),
          // 상품번호가 있으면 URL 자동 생성, 없으면 상품URL 컬럼 값 사용
          product_url:   pno?'https://oneroommaking.com/product/detail.html?product_no='+pno:urlCol,
          shipping_method: String(r['배송방법']||'').includes('직배')?'직배송':'택배',
          shipping_cond: (()=>{const c=String(r['배송비 조건']||r['배송비 구분']||'B');
            if(c==='F') return '00원 이상 무료';
            if(c==='Q') return '수량 비례';
            if(c==='C') return '착불';
            if(c==='E') return '기타';
            return '기본';})(),
          shipping_threshold: (()=>{const c=String(r['배송비 조건']||r['배송비 구분']||'B');
            if(c==='F'){const p=String(r['배송비']||r['배송비입력']||'').split('|');return p.length>1?Number(p[0])||0:0;}
            return 0;})(),
          shipping_fee: (()=>{const v=String(r['배송비']||r['배송비입력']||'0');const p=v.split('|');return Number(p[p.length-1])||0;})(),
          return_fee_type: String(r['반품배송비 구분']||'A').trim(),
          return_fee:      String(r['반품배송비 구분']||'A').trim()==='A'?(Number(r['반품배송비']||0)||0):0,
          return_fee_text: String(r['반품배송비 구분']||'A').trim()==='B'?String(r['반품배송비']||'').trim():'',
          cs_info:         String(r['CS정보']||'').trim().replace(/\r\n/g,'\n'),
          memo:          String(r['메모']||'').trim().replace(/\r\n/g,'\n'),
          options:       parseOptions(String(r['옵션입력']||'')),
          updated_at:    new Date().toISOString(),
        };}).filter(r=>r.product_name);
      }
      const codes=records.map(r=>r.product_code).filter(Boolean);
      // 대량 코드 처리: 200개씩 배치로 기존 상품 조회 (전체 필드 — 병합에 cs_info/memo 필요)
      const BATCH=200;
      let existingList=[];
      for(let i=0;i<codes.length;i+=BATCH){
        const chunk=codes.slice(i,i+BATCH);
        const{data,error:qErr}=await sb.from('products').select('*').in('product_code',chunk);
        if(!qErr&&data) existingList=[...existingList,...data];
      }
      // 중복 상품은 병합: 상품/배송 정보는 덮어쓰기, CS 정보·메모는 기존에 추가
      const existingMap=Object.fromEntries(existingList.map(p=>[p.product_code,p]));
      const dupCodeSet=new Set(existingList.map(d=>d.product_code));
      const newRecords=records.filter(r=>!dupCodeSet.has(r.product_code));
      const mergedRecords=records.filter(r=>dupCodeSet.has(r.product_code)).map(r=>{
        const ex=existingMap[r.product_code]||{};
        return {
          ...r, // 기본 상품 정보·배송·반품 등 전부 덮어쓰기
          // CS 정보: 기존 + '\n\n' + 신규 (둘 중 하나 비었으면 비지 않은 쪽만)
          cs_info: [ex.cs_info,r.cs_info].map(v=>(v||'').trim()).filter(Boolean).join('\n\n'),
          // 메모: 기존 + '\n\n' + 신규
          memo:    [ex.memo,r.memo].map(v=>(v||'').trim()).filter(Boolean).join('\n\n'),
          // id 유지 (upsert onConflict=product_code는 기존 row를 UPDATE하므로 cs_images 등 다른 필드는 건드리지 않음)
        };
      });
      // 중복 있으면 확인 UI 노출
      if(existingList.length>0){setDupInfo({newRecords,mergedRecords,dupList:existingList,totalCount:records.length});setTab('list');setUploading(false);return;}
      // 중복 없음: 전체 신규 등록
      const UBATCH=200;
      let uErr=null;
      for(let i=0;i<records.length;i+=UBATCH){
        const chunk=records.slice(i,i+UBATCH);
        const{error}=await sb.from('products').insert(chunk);
        if(error){uErr=error;break;}
      }
      const error=uErr;
      if(error) throw new Error(error.message);
      // 신규 공급사 일괄 자동 등록
      const newSups=[...new Set(records.map(r=>r.supplier_name).filter(Boolean))];
      await Promise.all(newSups.map(n=>ensureSupplier(n)));
      setUploadMsg('✅ '+records.length+'개 상품 등록 완료'); load(1,search,searchField);
    }catch(err){setUploadMsg('❌ 오류: '+err.message);}
    setUploading(false); e.target.value='';
  };

                  <select value={supModalFilter} onChange={e=>setSupModalFilter(e.target.value)}
                    style={{padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit'}}>
                    <option value="all">전체 ({counts.all})</option>
                    <option value="kakao">카카오톡 ({counts.kakao})</option>
                    <option value="nateon">네이트온 ({counts.nateon})</option>
                    <option value="email">메일 ({counts.email})</option>
                    <option value="none">미설정 ({counts.none})</option>
                  </select>
                ):(
                  <select value={supModalFilter} onChange={e=>setSupModalFilter(e.target.value)}
                    style={{padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit'}}>
                    <option value="all">전체 ({counts.all})</option>
                    <option value="unset">미설정 ({unsetCount})</option>
                    {SUP_SHIP_CONDS.map(c=>(
                      <option key={c} value={c}>{c} ({shipCondCounts[c]})</option>
                    ))}
                  </select>
                )}
              </div>
              <div style={{padding:'14px 22px',overflow:'auto',flex:1}}>
                {filtered.length===0?<div style={{textAlign:'center',color:'var(--sub)',fontSize:12,padding:30}}>해당하는 공급사가 없습니다</div>:(
                  <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',minWidth:supModalTab==='shipping'?1080:560}}>
                    {/* 탭별 컬럼 헤더 */}
                    {supModalTab==='channels'?(
                      <div style={{display:'grid',gridTemplateColumns:'1fr 90px 320px',gap:12,padding:'10px 14px',background:'#162244',color:'var(--sub)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>
                        <span>공급사명</span><span>현재 채널</span><span>채널 변경</span>
                      </div>
                    ):(
                      <div style={{display:'grid',gridTemplateColumns:'180px 100px 100px 130px 100px 100px 200px 70px',gap:10,padding:'10px 14px',background:'#162244',color:'var(--sub)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>
                        <span>공급사명</span><span>배송방법</span><span>선결제</span><span>배송 조건</span><span>배송비(원)</span><span>구매금액조건</span><span>메모</span><span>저장</span>
                      </div>
                    )}
                    {/* 탭별 행 */}
                    {filtered.map(name=>{
                      if(supModalTab==='channels'){
                        const cur=supplierMap[name]||'none';
                        const curStyle=SUP_CHANNELS[cur];
                        return (
                          <div key={name} style={{display:'grid',gridTemplateColumns:'1fr 90px 320px',gap:12,padding:'10px 14px',borderBottom:'1px solid var(--border)',alignItems:'center',fontSize:12}}>
                            <span style={{color:'var(--text)',fontWeight:500}}>{name}</span>
                            <span><span style={{display:'inline-block',padding:'2px 8px',background:curStyle.bg,color:curStyle.color,border:'1px solid '+curStyle.border,borderRadius:4,fontSize:10,fontWeight:700}}>{curStyle.label}</span></span>
                            <span style={{display:'flex',gap:4}}>
                              {['kakao','nateon','email','none'].map(ck=>{
                                const cs=SUP_CHANNELS[ck];
                                const active=cur===ck;
                                return (
                                  <button key={ck} onClick={()=>setSupplierChannel(name,ck==='none'?null:ck)}
                                    title={cs.label}
                                    style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:4,padding:'5px 6px',borderRadius:4,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',
                                      background:active?cs.bg:'transparent',
                                      color:active?cs.color:'var(--text)',
                                      border:'1px solid '+(active?cs.border:'var(--border)'),
                                      opacity:active?1:.85,
                                      transition:'all .12s'}}
                                    onMouseEnter={(e)=>{if(!active){e.currentTarget.style.background='var(--hover)';e.currentTarget.style.opacity='1';}}}
                                    onMouseLeave={(e)=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.opacity='.85';}}}>
                                    <span style={{fontSize:12}}>{cs.icon}</span>
                                    <span>{cs.label}</span>
                                  </button>
                                );
                              })}
                            </span>
                          </div>
                        );
                      }
                      // ── 배송비 관리 탭 ──
                      const saved=supShipMap[name]||{};
                      const edit=supShipEdit[name];
                      const cur=edit||{
                        cond:saved.cond||'',
                        fee:saved.fee==null?'':saved.fee,
                        threshold:saved.threshold==null?'':saved.threshold,
                        memo:saved.memo||'',
                        method:saved.method||'',
                        payment:saved.payment||'',
                      };
                      const isDirty = !!edit;
                      const isSaving = supShipSaving===name;
                      // 메모 활성화: 단일 숫자로 표현 못하는 복잡한 조건들
                      const memoEnabled = cur.cond==='메모 확인' || cur.cond==='수량별 차등' || cur.cond==='금액별 차등' || cur.cond==='무게별 차등';
                      const feeDisabled = cur.cond==='메모 확인';
                      const thresholdEnabled = cur.cond==='금액 조건부 무료';
                      const updateEdit=(patch)=>setSupShipEdit(prev=>({...prev,[name]:{...cur,...patch}}));
                      // cond 변경 시 종속 필드 초기화 처리
                      const onCondChange=(newCond)=>{
                        const patch={cond:newCond};
                        if(newCond==='메모 확인') patch.fee='';
                        if(newCond!=='금액 조건부 무료') patch.threshold='';
                        // 메모 활성화 조건이 아니면 메모 비움
                        const newMemoEnabled = newCond==='메모 확인'||newCond==='수량별 차등'||newCond==='금액별 차등'||newCond==='무게별 차등';
                        if(!newMemoEnabled) patch.memo='';
                        updateEdit(patch);
                      };
                      return (
                        <div key={name} style={{display:'grid',gridTemplateColumns:'180px 100px 100px 130px 100px 100px 200px 70px',gap:10,padding:'8px 14px',borderBottom:'1px solid var(--border)',alignItems:'center',fontSize:12,background:isDirty?'rgba(246,173,9,.06)':'transparent'}}>
                          <span style={{color:'var(--text)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={name}>{name}</span>
                          {/* 배송방법 */}
                          <select value={cur.method} onChange={e=>updateEdit({method:e.target.value})}
                            style={{padding:'5px 6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit'}}>
                            <option value="">— 미설정 —</option>
                            {SHIP_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
                          </select>
                          {/* 선결제 */}
                          <select value={cur.payment} onChange={e=>updateEdit({payment:e.target.value})}
                            style={{padding:'5px 6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit'}}>
                            <option value="">— 미설정 —</option>
                            {PAYMENT_TYPES.map(p=><option key={p} value={p}>{p}</option>)}
                          </select>
                          {/* 배송 조건 */}
                          <select value={cur.cond} onChange={e=>onCondChange(e.target.value)}
                            style={{padding:'5px 6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit'}}>
                            <option value="">— 미설정 —</option>
                            {SUP_SHIP_CONDS.map(c=><option key={c} value={c}>{c}</option>)}
                          </select>
                          <input type="number" value={feeDisabled?'메모':cur.fee} disabled={feeDisabled}
                            onChange={e=>updateEdit({fee:e.target.value})}
                            placeholder="0" style={{padding:'5px 8px',background:feeDisabled?'#1a2240':'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                          <input type="number" value={thresholdEnabled?cur.threshold:''} disabled={!thresholdEnabled}
                            onChange={e=>updateEdit({threshold:e.target.value})}
                            placeholder={thresholdEnabled?'예: 50000':'-'}
                            style={{padding:'5px 8px',background:!thresholdEnabled?'#1a2240':'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                          <input type="text" value={memoEnabled?cur.memo:''} disabled={!memoEnabled}
                            onChange={e=>updateEdit({memo:e.target.value})}
                            placeholder={
                              cur.cond==='수량별 차등' ? '예: 1~3개 3000원, 4~6개 6000원' :
                              cur.cond==='금액별 차등' ? '예: 5만원 미만 3000원, 5~10만원 2000원' :
                              cur.cond==='무게별 차등' ? '예: 1kg 이하 3000원, 1~5kg 5000원' :
                              cur.cond==='메모 확인' ? '직접 메모 입력' :
                              '-'
                            }
                            style={{padding:'5px 8px',background:!memoEnabled?'#1a2240':'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                          <button disabled={!isDirty||isSaving}
                            onClick={()=>setSupplierShipping(name,cur)}
                            style={{padding:'5px 8px',background:isDirty?'#2A478D':'var(--bg)',border:'1px solid '+(isDirty?'#2A478D':'var(--border)'),borderRadius:4,color:isDirty?'#fff':'var(--sub)',fontSize:10,fontWeight:700,cursor:isDirty&&!isSaving?'pointer':'default',fontFamily:'inherit',opacity:isSaving?0.5:1}}>
                            {isSaving?'저장중':isDirty?'저장':'완료'}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* 이미지 팝업 */}
      {imgModal&&(
        <div onClick={()=>setImgModal(null)} style={{position:'fixed',top:0,left:0,width:'100vw',height:'100vh',background:'rgba(0,0,0,.8)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:24,width:640,maxWidth:'92vw'}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:16}}>🖼 첨부 이미지 — {imgModal.title}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
              {imgModal.images.map((url,i)=>(
                <div key={i}>
                  <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',aspectRatio:'1',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <img src={url} alt={`이미지 ${i+1}`} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/>
                  </div>
                  <a href={url} download target="_blank" rel="noreferrer"
                    style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,width:'100%',marginTop:6,padding:'6px',background:'rgba(42,71,141,.12)',border:'1px solid var(--border)',borderRadius:6,color:'var(--sub)',fontSize:11,textDecoration:'none',cursor:'pointer'}}>
                    ⬇ 다운로드
                  </a>
                </div>
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>setImgModal(null)} style={{padding:'8px 20px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'var(--sub)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
            </div>
          </div>
        </div>
      )}

      {/* Zendesk CS 동기화 모달 */}
      {zdModal&&(
        <div style={{position:'fixed',top:0,left:0,width:'100vw',height:'100vh',background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:28,width:480,maxWidth:'90vw'}}>
            <div style={{fontSize:16,fontWeight:700,color:'var(--accent)',marginBottom:6}}>📥 Zendesk CS 가져오기</div>
            <div style={{fontSize:12,color:'var(--sub)',marginBottom:20}}>
              Zendesk 헬프센터의 상품 정보 섹션에서 CS 정보를 가져와<br/>상품코드 기준으로 자동 매핑합니다.
            </div>
            {zdProgress>0&&(
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:12,color:'var(--sub)'}}>{zdStatus}</span>
                  <span style={{fontSize:12,color:'var(--accent)'}}>{zdProgress}%</span>
                </div>
                <div style={{height:6,background:'var(--bg)',borderRadius:3}}>
                  <div style={{height:6,background:'var(--primary)',borderRadius:3,width:zdProgress+'%',transition:'width .3s'}}/>
                </div>
              </div>
            )}
            {!zdProgress&&zdStatus&&(
              <div style={{fontSize:13,color:zdStatus.startsWith('❌')?'var(--red)':'var(--sub)',marginBottom:16}}>{zdStatus}</div>
            )}
            {zdProgress===100&&(
              <div style={{fontSize:13,color:'var(--green)',marginBottom:16}}>{zdStatus}</div>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              {zdProgress!==100&&zdProgress===0&&(
                <button onClick={syncZendesk}
                  style={{padding:'9px 22px',background:'var(--primary)',border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                  가져오기 시작
                </button>
              )}
              <button onClick={()=>setZdModal(false)}
                style={{padding:'9px 18px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--sub)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                {zdProgress===100?'닫기':'취소'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 이미지 마이그레이션 모달 (master 전용) */}
      {migModal&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:28,width:520,maxWidth:'90vw'}}>
            <div style={{fontSize:16,fontWeight:700,color:'#22d3a0',marginBottom:6}}>☁️ 이미지 Storage 이전</div>
            <div style={{fontSize:12,color:'var(--sub)',marginBottom:16,lineHeight:1.6}}>
              cs_images의 base64 이미지를 Supabase Storage로 옮겨 DB 용량을 절약합니다.<br/>
              <span style={{color:'#22d3a0'}}>일회성 작업</span> — 완료 후에는 새로 추가되는 이미지만 자동으로 Storage에 업로드됩니다.
            </div>
            <div style={{fontSize:11,color:'var(--sub)',marginBottom:16,padding:10,background:'rgba(246,173,9,.08)',border:'1px solid rgba(246,173,9,.25)',borderRadius:6,lineHeight:1.6}}>
              ⚠️ 사전 준비: Supabase 대시보드에서 <code style={{background:'rgba(0,0,0,.3)',padding:'1px 5px',borderRadius:3}}>cs-images</code> 버킷을 <b>Public</b>으로 생성해야 합니다.<br/>
              (Storage → New bucket → Name: cs-images, Public bucket: ON)
            </div>
            {migProgress.total>0&&(
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:12,color:'var(--sub)'}}>{migStatus}</span>
                  <span style={{fontSize:12,color:'#22d3a0'}}>{migProgress.done}/{migProgress.total}</span>
                </div>
                <div style={{height:6,background:'var(--bg)',borderRadius:3,marginBottom:8}}>
                  <div style={{height:6,background:'#22d3a0',borderRadius:3,width:(migProgress.total?(migProgress.done*100/migProgress.total):0)+'%',transition:'width .3s'}}/>
                </div>
                <div style={{display:'flex',gap:14,fontSize:11,color:'var(--sub)'}}>
                  <span>✅ 이전: <b style={{color:'#22d3a0'}}>{migProgress.migrated}</b>장</span>
                  {migProgress.failed>0&&<span>❌ 실패: <b style={{color:'var(--red)'}}>{migProgress.failed}</b>장</span>}
                </div>
              </div>
            )}
            {migProgress.total===0&&migStatus&&(
              <div style={{fontSize:13,color:migStatus.startsWith('❌')?'var(--red)':(migStatus.startsWith('✅')?'#22d3a0':'var(--sub)'),marginBottom:16}}>{migStatus}</div>
            )}
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              {!migRunning&&migProgress.total===0&&(
                <button onClick={runImageMigration}
                  style={{padding:'9px 22px',background:'#22d3a0',border:'none',borderRadius:8,color:'#0a1f1a',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                  이전 시작
                </button>
              )}
              <button onClick={()=>{ if(migRunning){ if(!confirm('진행 중입니다. 정말 닫으시겠습니까? 일부 데이터만 이전될 수 있습니다.')) return; } setMigModal(false); }}
                style={{padding:'9px 18px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--sub)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                {migRunning?'닫기':'취소'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 상품 상세 뷰 */}
      {detailProd&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={e=>{if(e.target===e.currentTarget)setDetailProd(null);}}>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:28,width:'95%',maxWidth:700,maxHeight:'85vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
              <div style={{fontSize:17,fontWeight:700}}>{detailProd.product_name}</div>
              <button onClick={()=>setDetailProd(null)} style={{background:'none',border:'none',color:'var(--sub)',fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button>
            </div>
            {(detailMode==='basic'?[
              ['공급사',   <span className="agent-badge">{detailProd.supplier_name||'-'}</span>],
              ['상품코드', detailProd.product_code||'-'],
              ['URL', detailProd.product_url?<a href={detailProd.product_url} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>링크 열기</a>:'-'],
            ]:[
              ['URL', detailProd.product_url?<a href={detailProd.product_url} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>링크 열기</a>:'-'],
            ]).map(([label,val])=>(
              <div key={label} style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>{label}</span>
                <span style={{fontSize:13,color:'var(--text)',flex:1}}>{val}</span>
              </div>
            ))}
            {detailMode==='basic'&&(
              <>
                <div style={{fontSize:11,fontWeight:700,color:'var(--sub)',letterSpacing:'.06em',textTransform:'uppercase',margin:'14px 0 10px',padding:'6px 10px',background:'rgba(42,71,141,.08)',borderRadius:6}}>배송 정보</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                  {[
                    ['① 배송방법', detailProd.shipping_method||'-'],
                    ['② 배송정보 설정', detailProd.shipping_info||'-'],
                    ['③ 선결제 설정', detailProd.payment_type||'-'],
                    ['④ 배송비 구분', (()=>{
                      const cond=detailProd.shipping_cond||'-';
                      const fee=detailProd.shipping_fee?Number(detailProd.shipping_fee).toLocaleString()+'원':null;
                      const threshold=detailProd.shipping_cond==='금액 조건부 무료'&&detailProd.shipping_threshold?Number(detailProd.shipping_threshold).toLocaleString()+'원 이상 무료':null;
                      return <span>{cond}{threshold?<span style={{color:'var(--sub)',fontSize:11,marginLeft:4}}>{threshold}</span>:null}{fee?<span style={{color:'var(--sub)',fontSize:11,marginLeft:4}}>/ {fee}</span>:null}</span>;
                    })()],
                  ].map(([lbl,val])=>(
                    <div key={lbl} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px'}}>
                      <div style={{fontSize:10,color:'var(--sub)',marginBottom:4}}>{lbl}</div>
                      <div style={{fontSize:12,color:'var(--text)',fontWeight:600}}>
                        {lbl==='③ 선결제 설정'&&val==='착불'
                          ?<span><span style={{background:'rgba(246,173,9,.15)',color:'#F6AD09',padding:'1px 7px',borderRadius:4,fontWeight:700,fontSize:11}}>{val}</span>{detailProd.shipping_fee?<span style={{color:'var(--sub)',fontSize:11,marginLeft:6}}>{Number(detailProd.shipping_fee).toLocaleString()}원</span>:null}</span>
                          :val}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                  <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>반품배송비</span>
                  <span style={{fontSize:13,color:'var(--text)'}}>

                <div style={{flex:1}}>

                {detailProd.cs_info&&(
                  <div style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>

                    <span style={{fontSize:12,color:'var(--text)',flex:1,lineHeight:1.8,whiteSpace:'pre-wrap'}}>{detailProd.cs_info}</span>
                  </div>
                )}
                {detailProd.memo&&(
                  <div style={{display:'flex',gap:12,marginBottom:10,alignItems:'flex-start'}}>
                    <span style={{fontSize:11,color:'var(--sub)',width:72,flexShrink:0,paddingTop:2,textTransform:'uppercase',letterSpacing:'.04em'}}>메모</span>
                    <span style={{fontSize:12,color:'var(--sub)',flex:1,lineHeight:1.8,whiteSpace:'pre-wrap'}}>{detailProd.memo}</span>
                  </div>
                )}
              </>
            )}
            <div style={{marginTop:20,paddingTop:16,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:10}}>
              <button className="btn-cancel" onClick={()=>setDetailProd(null)}>닫기</button>
              <button className="btn-save" onClick={()=>startEdit(detailProd)}>수정</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── SUPPLIERS MANAGEMENT PAGE ───────────────────
function SuppliersPage({isCrew=false,isMaster=false,isManager=false}){
  const canManage = isMaster || isManager;
  const [suppliers,setSuppliers]=useState([]);     // [{name,channel,fee,cond,threshold,memo}]
  const [productCounts,setProductCounts]=useState({}); // {supplier_name: count}
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [sortBy,setSortBy]=useState('name');       // name | products_desc | products_asc | unset_first
  const [filterChannel,setFilterChannel]=useState('all'); // all|kakao|nateon|email|none
  const [filterCond,setFilterCond]=useState('all');       // all|unset|<cond>
  const [edit,setEdit]=useState({});               // 인라인 편집 임시 상태 {name: {fee,cond,threshold,memo}}
  const [saving,setSaving]=useState(null);
  // CSV 업로드 모달
  const [csvModal,setCsvModal]=useState(null);     // null | {rows, stats, fileName} — 미리보기 데이터
  const [csvUploading,setCsvUploading]=useState(false);
  const [csvResult,setCsvResult]=useState(null);   // null | {success, fail, total}

  // Constants 재사용 (ProductsPage와 동일하게 자기 충족적)
  const SUP_CHANNELS={
    kakao:  {label:'카카오톡', icon:'💬', bg:'#F6AD09', color:'#3A2E00', border:'#D89400'},
    nateon: {label:'네이트온', icon:'📨', bg:'#A89AE0', color:'#2D1F66', border:'#8B7BCC'},
    email:  {label:'메일',     icon:'✉️', bg:'#A8DEF6', color:'#0F4A6B', border:'#7AC4E8'},
    none:   {label:'미설정',   icon:'⚪', bg:'#dce8ff', color:'#1a3a8f', border:'#b4ccf0'},
  };
  const SUP_SHIP_CONDS=['무료','고정 배송비','금액 조건부 무료','수량 비례','수량별 차등','금액별 차등','무게별 차등','메모 확인'];
  const memoConds=['메모 확인','수량별 차등','금액별 차등','무게별 차등'];

  // 데이터 로드: suppliers 전체 + products별 공급사명 카운트
  const loadAll=async()=>{
    setLoading(true);
    // 1. suppliers 테이블
    const{data:supRows}=await sb.from('suppliers').select('name,channel,default_shipping_fee,default_shipping_cond,default_shipping_threshold,shipping_memo,default_shipping_method,default_payment_type,cafe24_supplier_code,updated_at');
    const supList=(supRows||[]).map(s=>({
      name:s.name,
      channel:s.channel||null,
      fee:s.default_shipping_fee,
      cond:s.default_shipping_cond||'',
      threshold:s.default_shipping_threshold,
      memo:s.shipping_memo||'',
      method:s.default_shipping_method||'',
      payment:s.default_payment_type||'',
      cafe24Code:s.cafe24_supplier_code||'',
      updated_at:s.updated_at,
    }));
    // 2. products 테이블에서 supplier_name 카운트 (페이지네이션)
    const counts={};
    let from=0; const PAGE=1000;
    while(true){
      const{data:prodRows}=await sb.from('products').select('supplier_name').range(from,from+PAGE-1);
      if(!prodRows||prodRows.length===0) break;
      prodRows.forEach(p=>{
        const n=(p.supplier_name||'').trim();
        if(n) counts[n]=(counts[n]||0)+1;
      });
      if(prodRows.length<PAGE) break;
      from+=PAGE;
    }
    // products에 있지만 suppliers에 없는 공급사도 목록에 포함
    const knownNames=new Set(supList.map(s=>s.name));
    Object.keys(counts).forEach(n=>{
      if(!knownNames.has(n)) supList.push({name:n,channel:null,fee:null,cond:'',threshold:null,memo:'',method:'',payment:'',updated_at:null});
    });
    setSuppliers(supList);
    setProductCounts(counts);
    setLoading(false);
  };
  useEffect(()=>{loadAll();},[]);

  // 채널 변경 (즉시 저장)
  const updateChannel=async(name,channel)=>{
    if(!canManage){alert('권한이 없습니다 (master/manager 전용)');return;}
    setSuppliers(prev=>prev.map(s=>s.name===name?{...s,channel}:s));
    const{error}=await sb.from('suppliers').upsert({name,channel,updated_at:new Date().toISOString()},{onConflict:'name'});
    if(error){alert('채널 저장 실패: '+error.message); loadAll();}
  };
  // 배송비 저장
  const updateShipping=async(name,shipping)=>{
    if(!canManage){alert('권한이 없습니다 (master/manager 전용)');return;}
    setSaving(name);
    const fee = shipping.cond==='메모 확인' ? null : (shipping.fee===''||shipping.fee==null?null:Number(shipping.fee));
    const threshold = shipping.cond==='금액 조건부 무료' ? (shipping.threshold===''||shipping.threshold==null?null:Number(shipping.threshold)) : null;
    const memo = memoConds.includes(shipping.cond) ? (shipping.memo||null) : null;
    const method = shipping.method||null;
    const payment = shipping.payment||null;
    const payload = {
      name,
      default_shipping_fee:fee,
      default_shipping_cond:shipping.cond||null,
      default_shipping_threshold:threshold,
      shipping_memo:memo,
      default_shipping_method:method,
      default_payment_type:payment,
      updated_at:new Date().toISOString(),
    };
    setSuppliers(prev=>prev.map(s=>s.name===name?{...s,fee,cond:shipping.cond||'',threshold,memo:memo||'',method:method||'',payment:payment||''}:s));
    const{error}=await sb.from('suppliers').upsert(payload,{onConflict:'name'});
    setSaving(null);
    if(error){alert('배송비 저장 실패: '+error.message); loadAll();}
    else setEdit(prev=>{const n={...prev}; delete n[name]; return n;});
  };

  // ─── CSV 업로드 처리 ──────────────────────────
  // 카페24 코드 → 한글 매핑
  const CAFE24_COND_MAP = {
    'T':'무료',
    'M':'금액 조건부 무료',
    'R':'고정 배송비',
    'N':'수량 비례',
    'C':'수량별 차등',
    'D':'금액별 차등',
  };
  const CAFE24_METHOD_MAP = {
    '택배':'택배',
    '직접배송':'직배송',
    '빠른등기':'빠른등기',
    '일반등기':'일반등기',
    '퀵배송':'퀵배송',
    '화물배송':'화물배송',
    '매장직접수령':'매장직접수령',
    '배송필요없음':'배송필요없음',
    '기타':'기타',
  };
  const CAFE24_PAYMENT_MAP = {
    'P':'선결제',
    'C':'착불',
    'B':'선결제/착불',
  };

  // CSV 한 줄 파싱 (간단한 따옴표 처리)
  const parseCSVLine=(line)=>{
    const result=[];
    let cur='';
    let inQuote=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){
        if(inQuote && line[i+1]==='"'){cur+='"';i++;}
        else inQuote=!inQuote;
      } else if(c===',' && !inQuote){
        result.push(cur);cur='';
      } else {
        cur+=c;
      }
    }
    result.push(cur);
    return result;
  };

  // 카페24 CSV → 우리 DB 형식 변환
  // 배송비 상세설정 형식:
  //   T (무료): "0" → cond=무료, fee=0
  //   N (수량 비례): "5000.00" → cond=수량 비례, fee=5000
  //   M (금액 조건부 무료): "기준|배송비"
  //     - 일반: "100000.00|2500.00" → cond=금액 조건부 무료, threshold=100000, fee=2500
  //     - 무한대: "99999999999999.00|3000.00" → cond=고정 배송비, fee=3000 (조건 없음)
  //   R (고정 배송비): "3000.00" → cond=고정 배송비, fee=3000
  //   C/D (차등): "최소|최대|배송비//구간2..." → memo에 텍스트로
  // 반환: {cond, fee, threshold, memo}
  const parseDetailSetting=(cond,detail)=>{
    if(!detail||detail==='0'||detail==='0.00') return {cond,fee:cond==='무료'?0:null,threshold:null,memo:null};
    if(cond==='무료') return {cond,fee:0,threshold:null,memo:null};
    if(cond==='수량 비례'||cond==='고정 배송비'){
      const n=parseFloat(detail);
      return {cond,fee:isNaN(n)?null:Math.round(n),threshold:null,memo:null};
    }
    if(cond==='금액 조건부 무료'){
      // "기준|배송비" 형태 — 단, 9999... 같은 큰 값은 사실상 무한대 → 실제로는 "고정 배송비"
      const parts=detail.split('|');
      if(parts.length>=2){
        const threshold=parseFloat(parts[0]);
        const fee=parseFloat(parts[1]);
        const isUnreachable=threshold>=99999999;
        if(isUnreachable){
          // M + 무한대 임계값 = 실질적으로 고정 배송비
          return {
            cond:'고정 배송비',
            fee:isNaN(fee)?null:Math.round(fee),
            threshold:null,
            memo:null,
          };
        }
        return {
          cond,
          fee:isNaN(fee)?null:Math.round(fee),
          threshold:isNaN(threshold)?null:Math.round(threshold),
          memo:null,
        };
      }
      return {cond,fee:null,threshold:null,memo:detail};
    }
    if(cond==='수량별 차등'||cond==='금액별 차등'){
      // 구간들 → 메모로 변환: "1.00|20.00|3300.00//20.00|10000.00|0.00"
      const segments=detail.split('//');
      const lines=segments.map(seg=>{
        const p=seg.split('|');
        if(p.length>=3){
          const min=parseFloat(p[0]),max=parseFloat(p[1]),fee=parseFloat(p[2]);
          const unit=cond==='수량별 차등'?'개':'원';
          const isMaxInf=max>=99999999;
          if(isMaxInf) return `${Math.round(min)}${unit} 이상: ${Math.round(fee)}원`;
          return `${Math.round(min)}~${Math.round(max)}${unit}: ${Math.round(fee)}원`;
        }
        return seg;
      });
      return {cond,fee:null,threshold:null,memo:lines.join(', ')};
    }
    return {cond,fee:null,threshold:null,memo:detail};
  };

  // 파일 선택 → 파싱 → 미리보기 모달
  const onCsvFileSelect=(file)=>{
    if(!file) return;
    setCsvResult(null);
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const text=e.target.result;
        // BOM 제거
        const cleaned=text.replace(/^\uFEFF/,'');
        const lines=cleaned.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){alert('파일에 데이터가 없습니다');return;}
        // 헤더 파싱
        const headers=parseCSVLine(lines[0]);
        const required=['공급사코드','공급사명','배송방법','배송비 설정','배송비 선결제 설정','배송비 상세설정'];
        const missing=required.filter(r=>!headers.includes(r));
        if(missing.length>0){
          alert('필수 컬럼이 누락되었습니다: '+missing.join(', '));
          return;
        }
        const idx={};
        required.forEach(r=>{idx[r]=headers.indexOf(r);});
        // 기존 공급사 맵 (코드 우선, 없으면 이름)
        const byCode={};
        const byName={};
        suppliers.forEach(s=>{
          if(s.cafe24Code) byCode[s.cafe24Code]=s;
          byName[s.name]=s;
        });
        // 데이터 파싱
        const rows=[];
        const stats={total:0,newAdd:0,update:0,unmatched:0};
        for(let i=1;i<lines.length;i++){
          const cells=parseCSVLine(lines[i]);
          if(cells.length<headers.length) continue;
          const code=(cells[idx['공급사코드']]||'').trim();
          const name=(cells[idx['공급사명']]||'').trim();
          if(!code||!name) continue;
          const methodRaw=(cells[idx['배송방법']]||'').trim();
          const condRaw=(cells[idx['배송비 설정']]||'').trim();
          const paymentRaw=(cells[idx['배송비 선결제 설정']]||'').trim();
          const detail=(cells[idx['배송비 상세설정']]||'').trim();
          // 한글 변환
          const method=CAFE24_METHOD_MAP[methodRaw]||methodRaw;
          const initialCond=CAFE24_COND_MAP[condRaw]||'';
          const payment=CAFE24_PAYMENT_MAP[paymentRaw]||'';
          // 배송비 상세 파싱 (cond가 보정될 수 있음: M+무한대 → 고정 배송비)
          const parsed=parseDetailSetting(initialCond,detail);
          const cond=parsed.cond;
          // 매칭 판정
          let matched=null;
          if(byCode[code]) matched=byCode[code];
          else if(byName[name]) matched=byName[name];
          let action='new';
          if(matched) action='update';
          stats.total++;
          if(action==='new') stats.newAdd++;
          else stats.update++;
          rows.push({
            code,
            name,
            method,
            cond,
            payment,
            fee:parsed.fee,
            threshold:parsed.threshold,
            memo:parsed.memo,
            action,
            matchedBy:matched?(byCode[code]?'code':'name'):null,
            originalName:matched?matched.name:name,
            skip:false,
          });
        }
        // 중복 공급사명 감지 (같은 파일 내 동일 이름이 2개 이상)
        // — 매칭 이름(originalName) 기준으로 카운트
        const nameCount={};
        rows.forEach(r=>{
          const n=r.originalName;
          nameCount[n]=(nameCount[n]||0)+1;
        });
        // 중복인 행은 skip=true 표시하고 stats 보정
        const duplicateNames=[];
        rows.forEach(r=>{
          if(nameCount[r.originalName]>1){
            r.skip=true;
            r.skipReason='중복 이름';
            if(!duplicateNames.includes(r.originalName)) duplicateNames.push(r.originalName);
          }
        });
        // stats 재계산
        stats.skipped=rows.filter(r=>r.skip).length;
        stats.newAdd=rows.filter(r=>!r.skip&&r.action==='new').length;
        stats.update=rows.filter(r=>!r.skip&&r.action==='update').length;
        stats.duplicateNames=duplicateNames;
        setCsvModal({rows,stats,fileName:file.name});
      }catch(err){
        alert('CSV 파싱 오류: '+err.message);
      }
    };
    reader.readAsText(file,'UTF-8');
  };

  // CSV 일괄 업서트
  const onCsvConfirm=async()=>{
    if(!csvModal||!canManage) return;
    setCsvUploading(true);
    const{rows}=csvModal;
    // 중복 표시된 행은 자동 업로드 제외
    const uploadRows=rows.filter(r=>!r.skip);
    
    // 3분기로 나눔:
    //   A. 코드로 매칭됨 → upsert(onConflict='cafe24_supplier_code') 사용
    //   B. 이름으로만 매칭됨 (DB 행의 code가 NULL) → name으로 UPDATE만 (code 채워주기)
    //   C. 매칭 안 됨 (완전 신규) → upsert(onConflict='cafe24_supplier_code')
    // A와 C는 같은 방식이라 합침, B만 별도 처리
    const matchedByName = uploadRows.filter(r => r.matchedBy === 'name');
    const others = uploadRows.filter(r => r.matchedBy !== 'name');
    
    let success=0,fail=0;
    const errors=[];
    const BATCH=50;
    
    // ── 카테고리 B: 이름으로만 매칭된 행 — UPDATE (code 채워주기 + 데이터 갱신)
    for(const r of matchedByName){
      const payload = {
        cafe24_supplier_code: r.code,
        default_shipping_method: r.method||null,
        default_shipping_cond: r.cond||null,
        default_payment_type: r.payment||null,
        default_shipping_fee: r.fee,
        default_shipping_threshold: r.threshold,
        shipping_memo: r.memo,
        updated_at: new Date().toISOString(),
      };
      const{error}=await sb.from('suppliers').update(payload).eq('name', r.originalName);
      if(error){
        fail++;
        errors.push(`${r.originalName} 업데이트 실패: ${error.message}`);
      } else {
        success++;
      }
    }
    
    // ── 카테고리 A+C: 코드 기반 upsert
    for(let i=0;i<others.length;i+=BATCH){
      const chunk=others.slice(i,i+BATCH);
      const payloads=chunk.map(r=>({
        name:r.originalName,
        cafe24_supplier_code:r.code,
        default_shipping_method:r.method||null,
        default_shipping_cond:r.cond||null,
        default_payment_type:r.payment||null,
        default_shipping_fee:r.fee,
        default_shipping_threshold:r.threshold,
        shipping_memo:r.memo,
        updated_at:new Date().toISOString(),
      }));
      const{error}=await sb.from('suppliers').upsert(payloads,{onConflict:'cafe24_supplier_code'});
      if(error){
        fail+=chunk.length;
        errors.push(`배치 ${i}: ${error.message}`);
      } else {
        success+=chunk.length;
      }
    }
    
    setCsvUploading(false);
    setCsvResult({success,fail,total:uploadRows.length,skipped:rows.length-uploadRows.length,errors});
    if(success>0){
      await loadAll();
    }
  };
  // ─── CSV 업로드 끝 ───────────────────────────

  // 통계 (KPI)
  const total = suppliers.length;
  const channelUnsetCount = suppliers.filter(s=>!s.channel).length;
  const condUnsetCount = suppliers.filter(s=>!s.cond).length;

  // 필터/정렬 적용
  const filtered=suppliers.filter(s=>{
    if(search&&!s.name.toLowerCase().includes(search.toLowerCase())) return false;
    if(filterChannel!=='all'){
      if(filterChannel==='none') {if(s.channel) return false;}
      else if(s.channel!==filterChannel) return false;
    }
    if(filterCond!=='all'){
      if(filterCond==='unset') {if(s.cond) return false;}
      else if(s.cond!==filterCond) return false;
    }
    return true;
  });
  const sorted=[...filtered].sort((a,b)=>{
    if(sortBy==='name') return a.name.localeCompare(b.name,'ko');
    if(sortBy==='products_desc') return (productCounts[b.name]||0)-(productCounts[a.name]||0);
    if(sortBy==='products_asc')  return (productCounts[a.name]||0)-(productCounts[b.name]||0);
    if(sortBy==='unset_first'){
      const ax=(!a.channel||!a.cond)?0:1;
      const bx=(!b.channel||!b.cond)?0:1;
      if(ax!==bx) return ax-bx;
      return a.name.localeCompare(b.name,'ko');
    }
    return 0;
  });

  // 배송비 cond별 카운트 (필터 옵션 표시용)
  const condCounts={};
  SUP_SHIP_CONDS.forEach(c=>{condCounts[c]=0;});
  let condUnset=0;
  suppliers.forEach(s=>{
    if(!s.cond) condUnset++;
    else if(condCounts[s.cond]!==undefined) condCounts[s.cond]++;
  });
  // 채널별 카운트
  const chCounts={
    all:total,
    kakao:suppliers.filter(s=>s.channel==='kakao').length,
    nateon:suppliers.filter(s=>s.channel==='nateon').length,
    email:suppliers.filter(s=>s.channel==='email').length,
    none:channelUnsetCount,
  };

  if(loading) return <div style={{padding:30,textAlign:'center',color:'var(--sub)'}}>📦 공급사 정보 로드 중...</div>;

  return (
    <div style={{padding:'20px 28px'}}>
      {/* 페이지 헤더 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <h1 style={{fontSize:18,fontWeight:700,color:'var(--text)',margin:0,marginBottom:4}}>공급사 관리</h1>
          <div style={{fontSize:11,color:'var(--sub)'}}>
            공급사별 소통 채널과 기본 배송비를 관리합니다
            {!canManage&&<span style={{color:'#F6AD09',marginLeft:8}}>· 읽기 전용 (master/manager만 편집 가능)</span>}
          </div>
        </div>
        {canManage&&(
          <label style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',background:'#2A478D',border:'1px solid #2A478D',borderRadius:6,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>

            <input type="file" accept=".csv" style={{display:'none'}}

          </label>
        )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:12,marginBottom:18}}>

          <div style={{fontSize:11,color:'var(--sub)',marginBottom:4}}>총 공급사</div>
          <div style={{fontSize:22,color:'var(--text)',fontWeight:700}}>{total}<span style={{fontSize:12,color:'var(--sub)',fontWeight:400,marginLeft:4}}>개</span></div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 18px'}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:4}}>채널 미설정</div>
          <div style={{fontSize:22,color:channelUnsetCount>0?'#F6AD09':'var(--text)',fontWeight:700}}>{channelUnsetCount}<span style={{fontSize:12,color:'var(--sub)',fontWeight:400,marginLeft:4}}>개</span></div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 18px'}}>
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:4}}>배송비 미설정</div>
          <div style={{fontSize:22,color:condUnsetCount>0?'#F6AD09':'var(--text)',fontWeight:700}}>{condUnsetCount}<span style={{fontSize:12,color:'var(--sub)',fontWeight:400,marginLeft:4}}>개</span></div>
        </div>
      </div>

      {/* 검색/필터 + 결과 카운트 + 테이블을 모두 동일 너비 wrapper에 넣어 정렬 통일 */}
      <div style={{maxWidth:'100%',overflowX:'auto'}}>
        {/* 검색 + 정렬 + 필터 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:8,marginBottom:14}}>
          <input type="text" placeholder="공급사명 검색..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{padding:'8px 12px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none'}}/>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            style={{padding:'8px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit'}}>
            <option value="name">정렬: 이름순 (가나다)</option>
            <option value="products_desc">정렬: 상품수 ↓ (많은 순)</option>
            <option value="products_asc">정렬: 상품수 ↑ (적은 순)</option>
            <option value="unset_first">정렬: 미설정 우선</option>
          </select>
          <select value={filterChannel} onChange={e=>setFilterChannel(e.target.value)}
            style={{padding:'8px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit'}}>
            <option value="all">채널: 전체 ({chCounts.all})</option>
            <option value="kakao">카카오톡 ({chCounts.kakao})</option>
            <option value="nateon">네이트온 ({chCounts.nateon})</option>
            <option value="email">메일 ({chCounts.email})</option>
            <option value="none">미설정 ({chCounts.none})</option>
          </select>
          <select value={filterCond} onChange={e=>setFilterCond(e.target.value)}

            <option value="all">배송조건: 전체 ({total})</option>
            <option value="unset">미설정 ({condUnset})</option>

            <span>📋 기본 정보</span>
            <span></span>
            <span></span>
            {/* 영역 사이 강한 구분선 */}
            <span style={{borderLeft:'2px solid rgba(168,222,251,.5)',height:14}}></span>
            {/* 영역 2: 채널 */}
            <span>💬 소통 채널</span>
            {/* 영역 사이 강한 구분선 */}
            <span style={{borderLeft:'2px solid rgba(168,222,251,.5)',height:14}}></span>
            {/* 영역 3: 배송 방식 (배송방법+선결제) */}

            <span></span>
            {/* 영역 사이 강한 구분선 */}
            <span style={{borderLeft:'2px solid rgba(168,222,251,.5)',height:14}}></span>
            {/* 영역 4: 배송비 설정 (배송조건+배송비+금액조건+메모) */}
            <span>💰 배송비 설정</span>
            <span></span><span></span><span></span>
            {/* 영역 사이 강한 구분선 */}
            <span style={{borderLeft:'2px solid rgba(168,222,251,.5)',height:14}}></span>
            {/* 영역 5: 저장 */}
            <span></span>

          {/* 컬럼 헤더 */}
          <div style={{display:'grid',gridTemplateColumns:'minmax(140px,1.4fr) 1px minmax(56px,0.6fr) 2px minmax(240px,2.4fr) 2px minmax(96px,1fr) minmax(96px,1fr) 2px minmax(110px,1.1fr) minmax(84px,0.9fr) minmax(90px,1fr) minmax(180px,2.6fr) 2px minmax(60px,0.7fr)',gap:8,padding:'10px 14px',background:'#F1F5FB',color:'#5F7195',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:'1px solid #DCE8FF'}}>
            <span>공급사명</span>
            <span></span>
            <span style={{textAlign:'right'}}>상품수</span>
            <span style={{borderLeft:'2px solid #B4CCF0'}}></span>
            <span>채널 선택</span>
            <span style={{borderLeft:'2px solid #B4CCF0'}}></span>
            <span>배송방법</span>
            <span>선결제</span>
            <span style={{borderLeft:'2px solid #B4CCF0'}}></span>
            <span>배송 조건</span>
            <span>배송비(원)</span>
            <span>금액 조건(원)</span>
            <span>메모</span>
            <span style={{borderLeft:'2px solid #B4CCF0'}}></span>
            <span style={{textAlign:'center'}}>저장</span>
          </div>
          {/* 행 */}
          {sorted.map(s=>{
            const cur=edit[s.name]||{cond:s.cond||'',fee:s.fee==null?'':s.fee,threshold:s.threshold==null?'':s.threshold,memo:s.memo||'',method:s.method||'',payment:s.payment||''};
            const isDirty=!!edit[s.name];
            const isSaving=saving===s.name;
            const memoEnabled=memoConds.includes(cur.cond);
            const feeDisabled=cur.cond==='메모 확인';
            const thresholdEnabled=cur.cond==='금액 조건부 무료';
            const updateEdit=(patch)=>setEdit(prev=>({...prev,[s.name]:{...cur,...patch}}));
            const onCondChange=(newCond)=>{
              const patch={cond:newCond};
              if(newCond==='메모 확인') patch.fee='';
              if(newCond!=='금액 조건부 무료') patch.threshold='';
              if(!memoConds.includes(newCond)) patch.memo='';
              updateEdit(patch);
            };
            const productCount=productCounts[s.name]||0;
            const curCh=s.channel||'none';
            const curChStyle=SUP_CHANNELS[curCh];
            // 라이트 테마 input 공통 스타일
            const inputBg='#FFFFFF';
            const inputBgDisabled='#F1F5FB';
            const inputBorder='1px solid #DCE8FF';
            const inputColor='#1A2240';
            return (
              <div key={s.name} style={{display:'grid',gridTemplateColumns:'minmax(140px,1.4fr) 1px minmax(56px,0.6fr) 2px minmax(240px,2.4fr) 2px minmax(96px,1fr) minmax(96px,1fr) 2px minmax(110px,1.1fr) minmax(84px,0.9fr) minmax(90px,1fr) minmax(180px,2.6fr) 2px minmax(60px,0.7fr)',gap:8,padding:'8px 14px',borderBottom:'1px solid #ECF1F8',alignItems:'center',fontSize:12,
                background:isDirty?'rgba(246,173,9,.18)':'#FFFFFF',
                // 좌측 막대는 boxShadow inset로 처리 — width/padding 영향 없음
                boxShadow:isDirty?'inset 3px 0 0 #F6AD09':'none'}}>
                <span style={{color:'#1A2240',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={s.name}>{s.name}</span>
                {/* 그룹 내 구분선 (공급사명 ↔ 상품수) */}
                <span style={{borderLeft:'1px solid #DCE8FF',height:28}}></span>
                <span style={{textAlign:'right',color:productCount>0?'#1A2240':'#8895B0',fontVariantNumeric:'tabular-nums',fontSize:11}}>{productCount.toLocaleString()}</span>
                {/* 영역 사이 강한 구분선 (영역1↔2) */}
                <span style={{borderLeft:'2px solid #B4CCF0',height:28}}></span>
                {/* 채널: 4개 버튼 */}
                <span style={{display:'flex',gap:3}}>
                  {['kakao','nateon','email','none'].map(ck=>{
                    const cs=SUP_CHANNELS[ck];
                    const active=curCh===ck;
                    return (
                      <button key={ck} onClick={()=>canManage&&updateChannel(s.name,ck==='none'?null:ck)}
                        disabled={!canManage}
                        title={cs.label}
                        style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:3,padding:'4px 4px',borderRadius:3,fontSize:10,fontWeight:600,cursor:canManage?'pointer':'default',fontFamily:'inherit',whiteSpace:'nowrap',
                          background:active?cs.bg:'transparent',
                          color:active?cs.color:'#1A2240',
                          // 미선택 상태일 때 테두리 좀 더 진하게 (#B4CCF0)
                          border:'1px solid '+(active?cs.border:'#B4CCF0'),
                          opacity:active?1:(canManage?.85:.5),
                          transition:'all .12s'}}>
                        <span style={{fontSize:11}}>{cs.icon}</span>
                        <span>{cs.label}</span>
                      </button>
                    );
                  })}
                </span>
                {/* 영역 사이 강한 구분선 (영역2↔3) */}
                <span style={{borderLeft:'2px solid #B4CCF0',height:28}}></span>
                {/* 배송방법 */}
                <select value={cur.method} onChange={e=>canManage&&updateEdit({method:e.target.value})} disabled={!canManage}
                  style={{padding:'5px 6px',background:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',opacity:canManage?1:.5}}>
                  <option value="">— 미설정 —</option>
                  {SHIP_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                {/* 선결제 */}
                <select value={cur.payment} onChange={e=>canManage&&updateEdit({payment:e.target.value})} disabled={!canManage}
                  style={{padding:'5px 6px',background:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',opacity:canManage?1:.5}}>
                  <option value="">— 미설정 —</option>
                  {PAYMENT_TYPES.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
                {/* 영역 사이 강한 구분선 (영역3↔4) */}
                <span style={{borderLeft:'2px solid #B4CCF0',height:28}}></span>
                {/* 배송 조건 */}
                <select value={cur.cond} onChange={e=>canManage&&onCondChange(e.target.value)} disabled={!canManage}
                  style={{padding:'5px 6px',background:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',opacity:canManage?1:.5}}>
                  <option value="">— 미설정 —</option>
                  {SUP_SHIP_CONDS.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                {/* 배송비 */}
                <input type="number" value={feeDisabled?'메모':cur.fee} disabled={feeDisabled||!canManage}
                  onChange={e=>canManage&&updateEdit({fee:e.target.value})}
                  placeholder="0"
                  style={{padding:'5px 8px',background:(feeDisabled||!canManage)?inputBgDisabled:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                {/* 구매 금액 조건 */}
                <input type="number" value={thresholdEnabled?cur.threshold:''} disabled={!thresholdEnabled||!canManage}
                  onChange={e=>canManage&&updateEdit({threshold:e.target.value})}

                  style={{padding:'5px 8px',background:(!thresholdEnabled||!canManage)?inputBgDisabled:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                {/* 메모 */}
                <input type="text" value={memoEnabled?cur.memo:''} disabled={!memoEnabled||!canManage}
                  onChange={e=>canManage&&updateEdit({memo:e.target.value})}
                  placeholder={
                    cur.cond==='수량별 차등'?'예: 1~3개 3000원, 4~6개 6000원':
                    cur.cond==='금액별 차등'?'예: 5만원 미만 3000원, 5~10만원 2000원':
                    cur.cond==='무게별 차등'?'예: 1kg 이하 3000원, 1~5kg 5000원':
                    cur.cond==='메모 확인'?'직접 메모 입력':'-'
                  }
                  style={{padding:'5px 8px',background:(!memoEnabled||!canManage)?inputBgDisabled:inputBg,border:inputBorder,borderRadius:4,color:inputColor,fontSize:11,fontFamily:'inherit',outline:'none',width:'100%'}}/>
                {/* 영역 사이 강한 구분선 (영역4↔5) */}
                <span style={{borderLeft:'2px solid #B4CCF0',height:28}}></span>
                {/* 저장 */}
                <button disabled={!canManage||!isDirty||isSaving}

                  style={{padding:'5px 8px',background:isDirty&&canManage?'#2A478D':'#F1F5FB',border:'1px solid '+(isDirty&&canManage?'#2A478D':'#DCE8FF'),borderRadius:4,color:isDirty&&canManage?'#fff':'#8895B0',fontSize:10,fontWeight:700,cursor:(canManage&&isDirty&&!isSaving)?'pointer':'default',fontFamily:'inherit',opacity:isSaving?0.5:1}}>

      {/* CSV 미리보기 모달 */}

            {/* 헤더 */}

              <div>
                <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>📤 카페24 CSV 업로드 미리보기</div>
                <div style={{fontSize:11,color:'#a8defb',marginTop:3}}>{csvModal.fileName} · 총 {csvModal.stats.total}건</div>
              </div>

            {/* 결과 표시 (있을 때) */}

                </div>

                  <div style={{fontSize:11,color:'#a85800',marginTop:6,maxHeight:80,overflowY:'auto'}}>
                    {csvResult.errors.slice(0,5).map((e,i)=><div key={i}>{e}</div>)}
                  </div>
                )}
              </div>

            {/* 중복 경고 영역 (있을 때만) */}

              <div style={{padding:'12px 22px',background:'#fef3e8',borderBottom:'1px solid #DCE8FF'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#a85800',marginBottom:4}}>
                  ⚠️ 중복 공급사명 감지 — {csvModal.stats.duplicateNames.length}개 이름 / {csvModal.stats.skipped}건 자동 제외
                </div>
                <div style={{fontSize:11,color:'#1A2240',lineHeight:1.6}}>
                  같은 이름의 다른 공급사가 발견되어 자동 업로드에서 제외됐어요. 카페24에서 사용 중지된 공급사일 수 있어요.<br/>
                  업로드 후 <strong>공급사 관리 페이지</strong>에서 실제 사용 중인 공급사 데이터만 수동으로 입력해주세요.
                </div>
                <div style={{fontSize:11,color:'#5F7195',marginTop:6}}>
                  중복 이름: {csvModal.stats.duplicateNames.map(n=><span key={n} style={{display:'inline-block',padding:'2px 8px',background:'#fff',border:'1px solid #d89400',borderRadius:3,marginRight:4,marginBottom:3,color:'#a85800',fontWeight:600}}>{n}</span>)}
                </div>
              </div>
            )}

            {!csvResult&&(
              <div style={{padding:'12px 22px',background:'#F1F5FB',borderBottom:'1px solid #DCE8FF',display:'flex',gap:24,fontSize:12,flexWrap:'wrap'}}>
                <div><span style={{color:'#5F7195'}}>전체:</span> <strong style={{color:'#1A2240'}}>{csvModal.stats.total}건</strong></div>
                <div><span style={{color:'#5F7195'}}>신규 등록:</span> <strong style={{color:'#22d3a0'}}>{csvModal.stats.newAdd}건</strong></div>
                <div><span style={{color:'#5F7195'}}>업데이트:</span> <strong style={{color:'#2A478D'}}>{csvModal.stats.update}건</strong></div>
                {csvModal.stats.skipped>0&&<div><span style={{color:'#5F7195'}}>제외:</span> <strong style={{color:'#a85800'}}>{csvModal.stats.skipped}건</strong></div>}
              </div>
            )}
            {/* 미리보기 테이블 (앞 30건만) */}
            <div style={{padding:'14px 22px',overflowY:'auto',overflowX:'auto',flex:1}}>
              <div style={{fontSize:11,color:'#5F7195',marginBottom:8}}>※ 미리보기는 앞 30건만 표시됩니다 (전체 {csvModal.stats.total}건 중 {csvModal.stats.total-csvModal.stats.skipped}건이 업로드됨)</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,minWidth:1000}}>
                <thead>
                  <tr style={{background:'#1d2e54',color:'#a8defb'}}>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>처리</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>공급사코드</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>공급사명</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>배송방법</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>선결제</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>배송조건</th>
                    <th style={{padding:'8px 6px',textAlign:'right',fontWeight:600,fontSize:10}}>배송비</th>
                    <th style={{padding:'8px 6px',textAlign:'right',fontWeight:600,fontSize:10}}>금액조건</th>
                    <th style={{padding:'8px 6px',textAlign:'left',fontWeight:600,fontSize:10}}>메모</th>
                  </tr>
                </thead>
                <tbody>
                  {csvModal.rows.slice(0,30).map((r,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid #ECF1F8',color:'#1A2240',background:r.skip?'#fef3e8':'transparent',opacity:r.skip?0.7:1}}>
                      <td style={{padding:'6px'}}>
                        {r.skip?
                          <span style={{padding:'2px 6px',background:'rgba(246,173,9,.25)',color:'#a85800',borderRadius:3,fontSize:10,fontWeight:600}} title={r.skipReason}>제외</span>:
                          r.action==='new'?
                          <span style={{padding:'2px 6px',background:'rgba(34,211,160,.18)',color:'#0a6a3a',borderRadius:3,fontSize:10,fontWeight:600}}>신규</span>:
                          <span style={{padding:'2px 6px',background:'rgba(168,222,251,.4)',color:'#0F4A6B',borderRadius:3,fontSize:10,fontWeight:600}}>업데이트</span>
                        }
                      </td>
                      <td style={{padding:'6px',fontFamily:'monospace',color:'#5F7195'}}>{r.code}</td>
                      <td style={{padding:'6px',fontWeight:500}}>
                        {r.originalName!==r.name&&r.action==='update'?
                          <span title={'CSV명: '+r.name}>{r.originalName} <span style={{color:'#8895B0',fontSize:10}}>({r.name})</span></span>:
                          r.name
                        }
                      </td>
                      <td style={{padding:'6px'}}>{r.method||'-'}</td>
                      <td style={{padding:'6px'}}>{r.payment||'-'}</td>
                      <td style={{padding:'6px'}}>{r.cond||'-'}</td>
                      <td style={{padding:'6px',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{r.fee==null?'-':r.fee.toLocaleString()}</td>
                      <td style={{padding:'6px',textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{r.threshold==null?'-':r.threshold.toLocaleString()}</td>
                      <td style={{padding:'6px',color:'#5F7195',maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.memo||''}>{r.memo||'-'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {/* 액션 버튼 */}
            <div style={{padding:'14px 22px',background:'#F1F5FB',borderTop:'1px solid #DCE8FF',display:'flex',justifyContent:'flex-end',gap:8}}>
              <button onClick={()=>{if(!csvUploading){setCsvModal(null);setCsvResult(null);}}} disabled={csvUploading}
                style={{padding:'8px 18px',background:'transparent',border:'1px solid #DCE8FF',borderRadius:6,color:'#5F7195',fontSize:12,fontWeight:600,cursor:csvUploading?'default':'pointer',fontFamily:'inherit'}}>
                {csvResult?'닫기':'취소'}
              </button>
              {!csvResult&&(
                <button onClick={onCsvConfirm} disabled={csvUploading}
                  style={{padding:'8px 18px',background:csvUploading?'#8895B0':'#2A478D',border:'1px solid '+(csvUploading?'#8895B0':'#2A478D'),borderRadius:6,color:'#fff',fontSize:12,fontWeight:600,cursor:csvUploading?'default':'pointer',fontFamily:'inherit'}}>
                  {csvUploading?'업로드 중...':`✅ ${csvModal.stats.total-csvModal.stats.skipped}건 일괄 적용`}
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  coral:  {bg:'rgba(255,138,114,.18)', fg:'#FF8A72'},

};

  '신한금융투자','신한은행','신한은행(구)','씨티은행','우리은행','우체국','유진투자증권','전북은행','제주은행','카카오뱅크',

  'BNK투자증권','DB증권','HMC투자증권','IBK투자증권','KB증권','KEB하나은행','KTB투자증권','NH투자증권','SC은행','SK증권',
];


// ─── RefundAddModal: 환불 요청 추가 모달 (신규 등록 전용) ───────────
// props: reasons (사유 마스터 배열), currentUserEmail, onClose, onSaved
function RefundAddModal({ reasons, currentUserEmail, onClose, onSaved }){
  // 필수 필드
  const [reasonId,    setReasonId]    = useState('');
  const [refundAmount,setRefundAmount]= useState('');     // 문자열로 보관 후 저장 시 숫자 변환
  const [orderId,     setOrderId]     = useState('');
  const [bankName,    setBankName]    = useState('');
  const [bankQuery,   setBankQuery]   = useState('');    // 은행 검색어
  const [bankOpen,    setBankOpen]    = useState(false); // 은행 검색 결과 펼침
  const [bankHoverIdx,setBankHoverIdx]= useState(0);     // 키보드 ↑↓ 으로 이동하는 활성 인덱스
  const [accountNumber,setAccountNumber]=useState('');
  const [accountHolder,setAccountHolder]=useState('');
  const [pgInfo,      setPgInfo]      = useState('수기 송금');
  // 선택 필드 (카페24 자동 채움 예정)
  const [customerName,setCustomerName]= useState('');
  const [customerPhone,setCustomerPhone]=useState('');
  const [productName, setProductName] = useState('');
  const [supplierName,setSupplierName]= useState('');
  const [notes,       setNotes]       = useState('');
  // 카페24 조회 상태
  const [fetching,setFetching]=useState(false);       // 조회 중
  const [fetchMsg,setFetchMsg]=useState(null);        // {type:'ok'|'err', text} 조회 결과 안내
  const [refPaymentAmount,setRefPaymentAmount]=useState(null); // 참고용 결제액
  const [refPaymentMethod,setRefPaymentMethod]=useState('');   // 참고용 결제수단
  // 저장 상태
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  // 카페24 주문 조회 → 필드 자동 채움
  const fetchOrder = async ()=>{
    const oid = orderId.trim();
    if(!oid){ setFetchMsg({type:'err', text:'주문번호를 먼저 입력해주세요.'}); return; }
    setFetching(true);
    setFetchMsg(null);
    try {
      const { data, error } = await sb.functions.invoke('refund-fetch-order', {
        body: { order_id: oid },
      });
      if(error){
        setFetchMsg({type:'err', text:'조회 실패: '+(error.message||String(error))});
        setFetching(false);
        return;
      }
      if(!data || !data.found){
        setFetchMsg({type:'err', text:(data && data.reason) ? data.reason : '주문 정보를 찾을 수 없습니다. 수기로 입력해주세요.'});
        setFetching(false);
        return;
      }
      // 자동 채움 (덮어쓰기)
      if(data.product_name)   setProductName(data.product_name);
      if(data.supplier_name)  setSupplierName(data.supplier_name);
      if(data.customer_name)  setCustomerName(data.customer_name);
      if(data.customer_phone) setCustomerPhone(data.customer_phone);
      setRefPaymentAmount(data.ref_payment_amount ?? null);
      setRefPaymentMethod(data.ref_payment_method || '');
      const refInfo = [];
      if(data.ref_payment_method) refInfo.push(`결제수단 ${data.ref_payment_method}`);
      if(data.ref_payment_amount!=null) refInfo.push(`결제액 ${KRW(data.ref_payment_amount)}`);
      const baseMsg = '카페24 주문 정보를 불러왔습니다.'+(refInfo.length?` (${refInfo.join(' · ')})`:'')+' 금액은 직접 입력해주세요.';
      // 다품목 주문을 주문단위로 조회한 경우 경고 톤으로 안내
      if(data.note){
        setFetchMsg({type:'err', text:data.note});
      } else {
        setFetchMsg({type:'ok', text:baseMsg});
      }
    } catch(e){
      setFetchMsg({type:'err', text:'조회 중 오류: '+String(e)});
    }
    setFetching(false);
  };

  // 필수 입력 체크
  const isValid = reasonId && refundAmount && orderId && bankName && accountNumber && accountHolder && pgInfo;

  const save = async ()=>{
    if(!isValid){
      setErr('필수 항목(*)을 모두 입력해주세요.');
      return;
    }
    const amt = parseInt(String(refundAmount).replace(/[^\d]/g,''),10);
    if(isNaN(amt) || amt<0){
      setErr('금액은 0 이상의 숫자여야 합니다.');
      return;
    }
    setSaving(true);
    setErr('');
    const { error } = await sb.from('refunds').insert({
      created_by:     currentUserEmail || 'unknown',
      reason_id:      parseInt(reasonId,10),
      refund_amount:  amt,
      order_id:       orderId.trim(),
      bank_name:      bankName,
      account_number: accountNumber.trim(),
      account_holder: accountHolder.trim(),
      pg_info:        pgInfo,
      customer_name:  customerName.trim() || null,
      customer_phone: customerPhone.trim() || null,
      product_name:   productName.trim()  || null,
      supplier_name:  supplierName.trim() || null,
      notes:          notes.trim()        || null,
    });
    setSaving(false);
    if(error){ setErr('저장 실패: '+error.message); return; }
    onSaved();
  };

  // 입력 필드 공통 스타일
  const inp = {width:'100%',fontSize:13,padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:6,fontFamily:'inherit',boxSizing:'border-box'};
  const lbl = {fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:500};

  return (
    <div onMouseDown={e=>{if(e.target===e.currentTarget && !saving) onClose();}}
      style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:1900,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'var(--surface)',borderRadius:10,width:'100%',maxWidth:560,maxHeight:'90vh',display:'flex',flexDirection:'column',border:'1px solid var(--border)'}}>
        {/* 헤더 */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>환불 요청 추가</div>
          <button onClick={()=>{if(!saving) onClose();}} style={{background:'transparent',border:'none',fontSize:18,color:'var(--sub)',cursor:'pointer'}}>✕</button>
        </div>

        {/* 본문 (스크롤) */}
        <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>
          {/* 주문번호 + 카페24 조회 */}
          <div style={lbl}>주문번호 *</div>
          <div style={{display:'flex',gap:8}}>
            <input type="text" value={orderId}
              onChange={e=>{setOrderId(e.target.value); setFetchMsg(null);}}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault(); fetchOrder();}}}
              placeholder="예: 20260525-0009306-01" style={{...inp,fontFamily:'monospace',flex:1}}/>
            <button type="button" onClick={fetchOrder} disabled={fetching||!orderId.trim()}
              style={{fontSize:12,padding:'8px 14px',whiteSpace:'nowrap',background:(fetching||!orderId.trim())?'var(--bg)':'rgba(120,170,255,.18)',border:'1px solid '+((fetching||!orderId.trim())?'var(--border)':'rgba(120,170,255,.5)'),color:(fetching||!orderId.trim())?'var(--sub)':'#78AAFF',borderRadius:6,cursor:(fetching||!orderId.trim())?'not-allowed':'pointer',fontWeight:600}}>
              {fetching?'조회 중...':'카페24 조회'}
            </button>
          </div>
          {fetchMsg ? (
            <div style={{fontSize:10,marginTop:4,marginBottom:14,padding:'6px 8px',borderRadius:4,
              background: fetchMsg.type==='ok'?'rgba(126,217,87,.10)':'rgba(255,107,107,.10)',
              color: fetchMsg.type==='ok'?'#7ED957':'#FF6B6B'}}>
              {fetchMsg.type==='ok'?'✅ ':'⚠️ '}{fetchMsg.text}
            </div>
          ) : (
            <div style={{fontSize:10,color:'var(--sub)',marginTop:4,marginBottom:14,padding:'6px 8px',background:'rgba(120,170,255,.08)',borderRadius:4}}>
              ℹ️ 주문번호 입력 후 [카페24 조회]를 누르면 상품 · 공급사 · 고객정보가 자동으로 채워집니다.
            </div>
          )}

          {/* 사유 + 금액 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <div style={lbl}>환불 사유 *</div>
              <select value={reasonId} onChange={e=>setReasonId(e.target.value)} style={inp}>
                <option value="">선택...</option>
                {reasons.filter(r=>r.is_active).map(r=>(<option key={r.id} value={r.id}>{r.name}</option>))}
              </select>
            </div>
            <div>
              <div style={{...lbl,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>환불 금액 *</span>
                {refPaymentAmount!=null && (
                  <span
                    onClick={()=>setRefundAmount(Number(refPaymentAmount).toLocaleString())}
                    title="클릭하면 이 금액으로 입력됩니다"
                    style={{fontSize:10,color:'#78AAFF',cursor:'pointer',fontWeight:400}}>
                    결제액 {KRW(refPaymentAmount)} ↵
                  </span>
                )}
              </div>
              <input type="text" value={refundAmount}
                onChange={e=>{
                  // 숫자만 입력 받고 천 단위 콤마 자동 표시
                  const v = e.target.value.replace(/[^\d]/g,'');
                  setRefundAmount(v ? Number(v).toLocaleString() : '');
                }}
                placeholder="₩" style={{...inp,textAlign:'right'}}/>
            </div>
          </div>

          {/* 고객 정보 (선택) */}
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:600,marginTop:8}}>고객 정보</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
            <input type="text" value={customerName} onChange={e=>setCustomerName(e.target.value)} placeholder="주문자명" style={inp}/>
            <input type="text" value={customerPhone} onChange={e=>setCustomerPhone(e.target.value)} placeholder="휴대전화" style={inp}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            <input type="text" value={productName} onChange={e=>setProductName(e.target.value)} placeholder="상품명" style={inp}/>
            <input type="text" value={supplierName} onChange={e=>setSupplierName(e.target.value)} placeholder="공급사명" style={inp}/>
          </div>

          {/* 송금 정보 */}
          <div style={{fontSize:11,color:'var(--sub)',marginBottom:6,fontWeight:600}}>송금 정보 *</div>
          <div style={{display:'grid',gridTemplateColumns:'160px 1fr 110px',gap:8,marginBottom:14}}>
            {/* 은행 검색 typeahead */}
            {(()=>{
              // 현재 매칭된 은행 목록 (키보드 핸들러와 렌더가 공유)
              const q = bankQuery.trim().toLowerCase();
              const matched = q ? REFUND_BANKS.filter(b=>b.toLowerCase().includes(q)) : REFUND_BANKS;
              const safeIdx = matched.length>0 ? Math.min(bankHoverIdx, matched.length-1) : 0;
              return (
              <div style={{position:'relative'}}>
                <input type="text"
                  value={bankName || bankQuery}
                  onChange={e=>{
                    setBankName('');
                    setBankQuery(e.target.value);
                    setBankOpen(true);
                    setBankHoverIdx(0);
                  }}
                  onFocus={()=>setBankOpen(true)}
                  onBlur={()=>setTimeout(()=>setBankOpen(false),200)}
                  onKeyDown={e=>{
                    if(!bankOpen) return;
                    if(e.key==='ArrowDown'){
                      e.preventDefault();
                      setBankHoverIdx(i => Math.min(i+1, matched.length-1));
                    } else if(e.key==='ArrowUp'){
                      e.preventDefault();
                      setBankHoverIdx(i => Math.max(i-1, 0));
                    } else if(e.key==='Enter'){
                      if(matched.length>0){
                        e.preventDefault();
                        const picked = matched[safeIdx];
                        setBankName(picked);
                        setBankQuery('');
                        setBankOpen(false);
                      }
                    } else if(e.key==='Escape'){
                      e.preventDefault();
                      setBankOpen(false);
                    }
                  }}
                  placeholder="은행 검색"
                  style={inp}/>
                {bankName && (
                  <button type="button"
                    onClick={()=>{setBankName('');setBankQuery('');setBankHoverIdx(0);setBankOpen(true);}}
                    style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'transparent',border:'none',color:'var(--sub)',cursor:'pointer',fontSize:14,padding:0,lineHeight:1}}>✕</button>
                )}
                {bankOpen && !bankName && (
                  <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:2,maxHeight:220,overflowY:'auto',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>
                    {matched.length===0 ? <div style={{padding:'10px 12px',fontSize:12,color:'var(--sub)'}}>검색 결과 없음</div> :
                      matched.map((b,i)=>(
                        <div key={b}
                          ref={el=>{ if(el && i===safeIdx) el.scrollIntoView({block:'nearest'}); }}
                          onMouseDown={e=>{e.preventDefault(); setBankName(b); setBankQuery(''); setBankOpen(false);}}
                          onMouseEnter={()=>setBankHoverIdx(i)}
                          style={{padding:'8px 12px',fontSize:12,color:'var(--text)',cursor:'pointer',borderBottom:'1px solid var(--border)',background:i===safeIdx?'rgba(246,173,9,.12)':'transparent'}}>
                          {b}
                        </div>
                      ))
                    }
                  </div>
                )}
              </div>
              );
            })()}
            <input type="text" value={accountNumber} onChange={e=>setAccountNumber(e.target.value)} placeholder="계좌번호" style={{...inp,fontFamily:'monospace'}}/>
            <input type="text" value={accountHolder} onChange={e=>setAccountHolder(e.target.value)} placeholder="예금주" style={inp}/>
          </div>

          {/* PG 정보 */}
          <div style={lbl}>PG 정보 *</div>
          <select value={pgInfo} onChange={e=>setPgInfo(e.target.value)} style={{...inp,marginBottom:14}}>
            <option value="수기 송금">수기 송금</option>
          </select>

          {/* 특이사항 */}
          <div style={lbl}>특이사항</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="자유롭게 메모 입력 (예: voc 민원 보상 지급 건)"
            style={{...inp,minHeight:70,resize:'vertical',fontFamily:'inherit'}}/>

          {/* 에러 메시지 */}
