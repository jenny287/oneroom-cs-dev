      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 18px',marginBottom:14}}>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:'var(--sub)',letterSpacing:'.04em'}}>빠른 선택</span>
          <div style={{display:'flex',gap:6}}>
            {QUICK_RANGES.map(opt=>(
              <button key={opt.label} onClick={()=>onQuickClick(opt)}
                style={{padding:'6px 12px',
                  background:activeQuick===opt.label?'#2A478D':'transparent',
                  color:activeQuick===opt.label?'#fff':'var(--text)',
                  border:'1px solid '+(activeQuick===opt.label?'#2A478D':'var(--border)'),
                  borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
                {opt.label}
              </button>
            ))}
          </div>
          <div style={{borderLeft:'1px solid var(--border)',height:20,margin:'0 8px'}}></div>
          <span style={{fontSize:11,color:'var(--sub)'}}>직접 선택</span>
          <input type="date" value={from} onChange={e=>onDateChange('from',e.target.value)}
            style={{padding:'6px 10px',background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,fontFamily:'inherit'}}/>
          <span style={{color:'var(--sub)'}}>~</span>
          <input type="date" value={to} onChange={e=>onDateChange('to',e.target.value)}
            style={{padding:'6px 10px',background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,fontFamily:'inherit'}}/>
        </div>
      </div>

      {/* 요약 정보 */}
      <div style={{fontSize:11,color:'var(--sub)',marginBottom:8,paddingLeft:4}}>
        📊 {from} ~ {to} ({stats.totalDays}일간) · 상담원 {stats.rows.length}명 · 평균 처리 {Math.round(stats.avgCurrent).toLocaleString()}건
      </div>

      {/* 비교 테이블 */}
      {stats.rows.length===0?(
        <div style={{padding:40,textAlign:'center',color:'var(--sub)',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8}}>
          해당 기간에 데이터가 없습니다
        </div>
      ):(
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
          {/* 헤더 */}
          <div style={{display:'grid',gridTemplateColumns:'120px 110px 110px 130px 130px 90px',gap:10,padding:'10px 16px',background:'#1d2e54',color:'var(--sub)',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>
            <span>상담원</span>
            <span style={{textAlign:'right'}}>기간 합계</span>
            <span style={{textAlign:'right'}}>일평균</span>
            <span style={{textAlign:'right'}}>전체 평균 대비</span>
            <span style={{textAlign:'right'}}>본인 과거 대비</span>
            <span style={{textAlign:'center'}}>상태</span>
          </div>
          {/* 행 */}
          {stats.rows.map(r=>{
            const vsAvg=fmtPct(r.vsAvg);
            const vsPrev=fmtPct(r.vsPrev);
            return (
              <div key={r.name} style={{display:'grid',gridTemplateColumns:'120px 110px 110px 130px 130px 90px',gap:10,padding:'10px 16px',alignItems:'center',fontSize:12,borderTop:'1px solid rgba(120,140,200,.1)',
                background:r.isLow?'rgba(246,173,9,.12)':'transparent',
                boxShadow:r.isLow?'inset 3px 0 0 #F6AD09':'none'}}>
                <span style={{color:'var(--text)',fontWeight:500}}>{r.name}</span>
                <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums',fontWeight:500,color:'var(--text)'}}>{r.current.toLocaleString()}</span>
                <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums',color:'var(--text)'}}>{r.dailyAvg.toFixed(1)}</span>
                <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums',color:vsAvg.color}}>{vsAvg.arrow} {vsAvg.text}</span>
                <span style={{textAlign:'right',fontVariantNumeric:'tabular-nums',color:vsPrev.color}}>{vsPrev.arrow} {vsPrev.text}</span>
                <span style={{textAlign:'center'}}>
                  <span style={{background:r.statusBg,color:r.statusColor,padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600}}>{r.status}</span>
                </span>
              </div>
            );
          })}
        </div>
      )}

      {/* 일별 추이 차트 */}
      {stats.rows.length>0&&(
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'14px 18px',marginTop:14}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:12}}>📈 일별 처리량 추이 (평균선 점선)</div>
          <div style={{position:'relative',height:280}}>
            <ChartComp type="line" options={{
              responsive:true,
              maintainAspectRatio:false,
              plugins:{legend:{position:'bottom',labels:{color:'#c4d3e6',font:{size:11}}}},
              scales:{
                x:{ticks:{color:'#8fa8d0',font:{size:10}},grid:{color:'rgba(120,140,200,.08)'}},
                y:{beginAtZero:true,ticks:{color:'#8fa8d0',font:{size:10}},grid:{color:'rgba(120,140,200,.08)'}},
              },
            }} data={chartData}/>
          </div>
        </div>
      )}
    </div>
  );
}

function HistoryPage({ onEdit }) {
  const [opsMap,setOpsMap]=useState({}); const [agents,setAgents]=useState([]); const [allDates,setAllDates]=useState([]); const [loading,setLoading]=useState(true);
  const load=async()=>{
    setLoading(true);
    const[r1,r2]=await Promise.all([sb.from('daily_ops').select('*'),sb.from('agent_daily_ops').select('*')]);
    const ops=r1.data||[]; const ag=r2.data||[];
    const map={}; ops.forEach(r=>{map[r.date]=r;});
    const dates=[...new Set([...ops.map(r=>r.date),...ag.map(r=>r.date)])].sort().reverse();
    setOpsMap(map); setAgents(ag); setAllDates(dates); setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const del=async date=>{ if(!confirm(`${date} 데이터를 삭제하시겠습니까?`))return; await Promise.all([sb.from('daily_ops').delete().eq('date',date),sb.from('agent_daily_ops').delete().eq('date',date)]); load(); };
  return (
    <div>
      <div className="page-header"><div><div className="page-title">데이터 내역</div><div className="page-sub">입력된 운영 데이터 목록</div></div></div>
      <div className="section">

          {loading?<div className="loading">불러오는 중...</div>:allDates.length===0?<div className="empty-state">입력된 데이터가 없습니다</div>:
          <div className="table-wrap">
            <table className="hist">
              <thead><tr><th>날짜</th><th>응대율</th><th>인입호</th><th>요청호</th><th>응대호(유선)</th><th>상담원</th><th>응대호 합계</th><th>관리</th></tr></thead>
              <tbody>{allDates.map(date=>{ const r=opsMap[date]||{}; const da=agents.filter(a=>a.date===date); const tot=da.reduce((s,a)=>s+(Number(a.answered_calls)||0),0); return (
                <tr key={date}>
                  <td>{date}</td>
                  <td>{r.response_rate!=null?<span className={`badge ${Number(r.response_rate)>=90?'badge-green':'badge-red'}`}>{fmtPct(r.response_rate)}</span>:<span style={{color:'var(--sub)',fontSize:11}}>-</span>}</td>
                  <td>{r.inbound_calls??'-'}</td><td>{r.request_calls??'-'}</td><td>{r.answered_calls??'-'}</td>
                  <td>{r.ob_contacts??'-'}</td>
                  <td>{da.map(a=><span key={a.id} className="agent-badge">{a.agent_name}</span>)}</td>
                  <td>{tot||'-'}</td>
                  <td>{da.reduce((s,a)=>s+(Number(a.board_count)||0),0)||'-'}</td>
                  <td>{da.reduce((s,a)=>s+(Number(a.chat_count)||0),0)||'-'}</td>
                  <td><button className="btn-edit" onClick={()=>onEdit(date)}>수정</button><button className="btn-delete" onClick={()=>del(date)}>삭제</button></td>
                </tr>
              );})}</tbody>
            </table>
          </div>}
        </div>
      </div>
    </div>
  );
}

  useEffect(()=>{
    sb.from('delayed_options').select('supplier_name_snapshot').then(({data,error})=>{
      if(error){ console.error('공급사 목록 조회 실패:',error); return; }
      const uniq = [...new Set((data||[]).map(r=>r.supplier_name_snapshot).filter(Boolean))].sort();
      setSupplierList(uniq);
    });
  },[]);

  // 진행 중 건수 (탭 헤더 뱃지 + KPI)
  const refreshActiveCount = ()=>{
    sb.from('delayed_options').select('id',{count:'exact',head:true}).eq('is_delayed',true)
      .then(({count,error})=>{
        if(error){ console.error('진행 중 건수 조회 실패:',error); return; }
        const c = count||0;
        setActiveCount(c);
        onCountChange?.(c);
      });
  };
  // 이번 달 등록 / 해제 건수 (KST 기준)
  const refreshMonthCounts = ()=>{
    // 이번 달 1일 00:00:00 KST → UTC ISO
    const now = new Date();
    const kstYear = now.getFullYear();
    const kstMonth = now.getMonth(); // 0-indexed
    // KST 00:00 = UTC 전날 15:00. 단순화: 월초 KST를 UTC ISO로 변환
    const monthStartKst = new Date(Date.UTC(kstYear, kstMonth, 1, -9, 0, 0)); // KST 자정 → UTC
    const monthStartIso = monthStartKst.toISOString();
    // 이번 달 등록 (delayed_at 기준)
    sb.from('delayed_options').select('id',{count:'exact',head:true}).gte('delayed_at',monthStartIso)
      .then(({count,error})=>{
        if(error){ console.error('이번 달 등록 건수 조회 실패:',error); return; }
        setMonthRegisteredCount(count||0);
      });
    // 이번 달 해제 (released_at 기준, not null)
    sb.from('delayed_options').select('id',{count:'exact',head:true}).gte('released_at',monthStartIso)
      .then(({count,error})=>{
        if(error){ console.error('이번 달 해제 건수 조회 실패:',error); return; }
        setMonthReleasedCount(count||0);
      });
  };
  useEffect(()=>{ refreshActiveCount(); refreshMonthCounts(); },[]);

  // 메인 데이터 로드
  const load = async(p, s, stat, sup, sort)=>{
    setLoading(true);
    try {
      let q = sb.from('delayed_options').select('*',{count:'exact'});
      if(stat==='active')        q = q.eq('is_delayed',true);
      else if(stat==='released') q = q.eq('is_delayed',false);
      if(sup) q = q.eq('supplier_name_snapshot',sup);

      if(sort==='delayed_at_desc')      q = q.order('delayed_at',{ascending:false}).order('id',{ascending:false});
      else if(sort==='delayed_at_asc')  q = q.order('delayed_at',{ascending:true}).order('id',{ascending:true});
      else if(sort==='eta_asc')         q = q.order('delay_eta_date',{ascending:true,nullsFirst:false}).order('delayed_at',{ascending:false}).order('id',{ascending:false});

      q = q.range(p*PAGE,(p+1)*PAGE-1);

      const {data,count,error} = await q;
      if(error) throw error;

      // 클라이언트 측 검색 필터 (ProductsPage 패턴과 동일)
      let filtered = data||[];
      if(s){
        const term = s.toLowerCase();
        filtered = filtered.filter(r=>
          (r.product_name_snapshot||'').toLowerCase().includes(term)
          || (r.option_text_snapshot||'').toLowerCase().includes(term)
          || (r.supplier_name_snapshot||'').toLowerCase().includes(term)
          || (r.product_code||'').toLowerCase().includes(term)
        );
      }
      setRows(filtered);
      setTotal(s ? filtered.length : (count||0));
    } catch(e){
      console.error('지연 옵션 조회 실패:',e);
      alert('데이터를 불러오는 중 오류가 발생했습니다. 브라우저 콘솔을 확인해주세요.');
      setRows([]); setTotal(0);
    } finally {
      setLoading(false);
    }
  };

  // 필터 변경 시: page 리셋 + debounce 후 로드
  useEffect(()=>{
    setPage(0);
    const timer = setTimeout(()=>{
      load(0, search, statusFilter, supplierFilter, sortBy);
    }, 300);
    return ()=>clearTimeout(timer);
  },[search,statusFilter,supplierFilter,sortBy]);

  // 페이지 변경 시 로드 (필터 변경 useEffect가 이미 page=0 처리)
  useEffect(()=>{
    if(page>0) load(page, search, statusFilter, supplierFilter, sortBy);
  },[page]);

  const handleAddClick = ()=>{
    setEditingRow(null);
    setShowAddModal(true);
  };
  const handleEditClick = (row)=>{
    setEditingRow(row);
    setShowAddModal(true);
  };
  const handleModalSaved = ()=>{
    // 등록·편집 완료 후 즉시 반영
    refreshActiveCount();
    refreshMonthCounts();
    load(0, search, statusFilter, supplierFilter, sortBy);
    // 공급사 목록도 갱신
    sb.from('delayed_options').select('supplier_name_snapshot').then(({data})=>{
      const uniq = [...new Set((data||[]).map(r=>r.supplier_name_snapshot).filter(Boolean))].sort();
      setSupplierList(uniq);
    });
  };
  const handleReleaseClick = async(row)=>{
    const opt = row.option_text_snapshot ? ` / ${row.option_text_snapshot}` : '';
    if(!window.confirm(`아래 지연 등록을 해제합니다.\n\n${row.product_name_snapshot}${opt}\n사유: ${row.delay_reason||'-'}\n\n해제 시:\n- 신규 주문에 알림톡 발송이 중단됩니다\n- 이력은 "해제됨" 필터에서 확인 가능합니다\n\n계속하시겠습니까?`)){
      return;
    }
    try {
      const {data:authData} = await sb.auth.getUser();
      const userEmail = authData?.user?.email || 'unknown';

      // 1. delayed_options 해제 처리 (DB 트리거가 자동으로 products.delay_memo 갱신함)
      const {error:updateErr} = await sb.from('delayed_options')
        .update({
          is_delayed: false,
          released_at: new Date().toISOString(),
          released_by: userEmail,
        })
        .eq('id', row.id);
      if(updateErr) throw updateErr;

      handleModalSaved();
    } catch(e){
      console.error('해제 실패:',e);
      alert('해제 실패: '+(e?.message||e));
    }
  };

  // 즉시발송 "발송하기" 버튼 핸들러 — 드라이런 → 확인 → 실 발송
  const handleBlastClick = async(row)=>{
    if(!row.initial_date_from || !row.initial_date_to){
      alert('이 행에는 발송 대상 주문 기간이 설정되어 있지 않습니다. 행을 해제 후 즉시 발송으로 새로 등록해주세요.');
      return;
    }

    const {data:authData} = await sb.auth.getUser();
    const userEmail = authData?.user?.email || 'unknown';

    // 1단계: 드라이런
    let dryResp;
    try {
      const dryRes = await fetch(`${SUPABASE_URL}/functions/v1/notify-blast`,{
        method:'POST',
        headers:{
          'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,
          'apikey':SUPABASE_ANON_KEY,
          'Content-Type':'application/json',
        },
        body: JSON.stringify({
          delayed_option_id: row.id,
          date_from: row.initial_date_from,
          date_to: row.initial_date_to,
          dryrun: true,
          user_email: userEmail,
        }),
      });
      dryResp = await dryRes.json();
      if(!dryRes.ok){
        alert(`발송 대상 조회 실패\n\n${dryResp?.error||'알 수 없는 오류'}\n${dryResp?.detail||''}`);
        return;
      }
    } catch(e){
      alert('네트워크 오류: '+e.message);
      return;
    }

    // 2단계: 확인 다이얼로그
    const sendNow = dryResp.send_window === 'now';
    const scheduledTime = dryResp.scheduled_at
      ? new Date(dryResp.scheduled_at).toLocaleString('ko-KR',{hour12:false})
      : null;

    let confirmMsg = `📊 발송 대상 분석\n\n`;
    confirmMsg += `대상 기간: ${row.initial_date_from} ~ ${row.initial_date_to}\n`;
    confirmMsg += `조회된 주문: ${dryResp.total_orders}건\n`;
    confirmMsg += `이미 발송됨: ${dryResp.already_sent}건 (중복 방지로 제외)\n`;
    confirmMsg += `발송 예정: ${dryResp.to_send}건\n\n`;
    if(sendNow){
      confirmMsg += `✉️ 현재 발송 가능 시간입니다. 즉시 발송됩니다.\n\n`;
    } else {
      confirmMsg += `🕐 현재 발송 불가 시간입니다.\n${scheduledTime}에 자동 예약 발송됩니다.\n\n`;
    }
    confirmMsg += `계속 진행하시겠습니까?`;

    if(!window.confirm(confirmMsg)) return;

    if(dryResp.to_send === 0){
      // 보낼 게 없어도 상태 진행으로 전환
      if(!window.confirm('발송 대상이 0건입니다.\n발송 실행으로 표시만 처리하시겠습니까?\n(이 행은 더이상 "발송하기"가 표시되지 않습니다)')){
        return;
      }
    }

    // 3단계: 실 발송
    try {
      const sendRes = await fetch(`${SUPABASE_URL}/functions/v1/notify-blast`,{
        method:'POST',
        headers:{
          'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,
          'apikey':SUPABASE_ANON_KEY,
          'Content-Type':'application/json',
        },
        body: JSON.stringify({
          delayed_option_id: row.id,
          date_from: row.initial_date_from,
          date_to: row.initial_date_to,
          dryrun: false,
          user_email: userEmail,
        }),
      });
      const sendResp = await sendRes.json();
      if(!sendRes.ok){
        alert(`발송 실패\n\n${sendResp?.error||'알 수 없는 오류'}\n${sendResp?.detail||''}`);
        return;
      }

      let resultMsg = `✅ 발송 처리 완료\n\n`;
      resultMsg += `즉시 발송: ${sendResp.sent||0}건\n`;
      if(sendResp.scheduled){
        resultMsg += `예약 발송: ${sendResp.scheduled}건 (${scheduledTime})\n`;
      }
      if(sendResp.failed){
        resultMsg += `실패: ${sendResp.failed}건 (발송 내역에서 확인 가능)\n`;
      }
      alert(resultMsg);
      handleModalSaved();
    } catch(e){
      console.error('발송 실패:',e);
      alert('발송 실패: '+(e?.message||e));
    }
  };

  const totalPages = Math.max(1, Math.ceil(total/PAGE));
  const startIdx = total ? page*PAGE+1 : 0;
  const endIdx = Math.min((page+1)*PAGE, total);
  const fmtDate = d => d ? String(d).slice(0,10) : '-';

  return (
    <div>
      {/* KPI 카드 3개 + 검색바 + 추가 버튼 (한 줄) */}
      <div style={{display:'flex',gap:8,alignItems:'stretch',marginBottom:14,flexWrap:'wrap'}}>
        <input type="text" placeholder="상품명 / 상품코드 / 공급사 검색" value={search} onChange={e=>setSearch(e.target.value)}
          style={{flex:'1 1 240px',minWidth:200,padding:'10px 14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}/>
        <button onClick={handleAddClick}
          style={{padding:'10px 16px',background:'#2A478D',border:'1px solid #2A478D',borderRadius:8,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
          + 지연 상품 추가
        </button>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 14px',minWidth:100,display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{fontSize:10,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>진행 중</div>
          <div style={{fontSize:18,fontWeight:700,color:'#F6AD09',marginTop:2}}>
            {activeCount.toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:'var(--sub)',marginLeft:3}}>건</span>
          </div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 14px',minWidth:100,display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{fontSize:10,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>이번 달 등록</div>
          <div style={{fontSize:18,fontWeight:700,color:'var(--text)',marginTop:2}}>
            {monthRegisteredCount.toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:'var(--sub)',marginLeft:3}}>건</span>
          </div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 14px',minWidth:100,display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{fontSize:10,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>이번 달 해제</div>
          <div style={{fontSize:18,fontWeight:700,color:'#22d3a0',marginTop:2}}>
            {monthReleasedCount.toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:'var(--sub)',marginLeft:3}}>건</span>
          </div>
        </div>
      </div>

      {/* 필터 바 */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,padding:'10px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'var(--sub)',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase'}}>필터</span>
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
          style={{padding:'6px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none',cursor:'pointer'}}>
          <option value="active">진행 중</option>
          <option value="released">해제됨</option>
          <option value="all">전체</option>
        </select>
        <select value={supplierFilter} onChange={e=>setSupplierFilter(e.target.value)}
          style={{padding:'6px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none',cursor:'pointer',maxWidth:180}}>
          <option value="">공급사: 전체</option>
          {supplierList.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
          style={{padding:'6px 10px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:12,fontFamily:'inherit',outline:'none',cursor:'pointer'}}>
          <option value="delayed_at_desc">정렬: 최근 등록순</option>
          <option value="eta_asc">예상 발송일 가까운 순</option>
          <option value="delayed_at_asc">지연 오래된 순</option>
        </select>
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--sub)'}}>
          {statusFilter==='active' ? '진행 중 ' : statusFilter==='released' ? '해제됨 ' : '전체 '}
          <span style={{color:'var(--text)',fontWeight:600}}>{total}</span>건
          {search ? ' (검색 결과)' : ''}
        </span>
      </div>

      {/* 테이블 카드 */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        {loading ? (
          <div style={{padding:'60px 20px',textAlign:'center',color:'var(--sub)',fontSize:13}}>
            {search?'🔍 검색 중입니다...':'로딩 중...'}
          </div>
        ) : rows.length === 0 ? (
          <div style={{padding:'80px 24px',textAlign:'center',color:'var(--sub)'}}>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>
              {search ? '검색 결과 없음' : (statusFilter==='active' ? '현재 지연 등록된 상품이 없습니다' : '데이터 없음')}
            </div>
            <div style={{fontSize:12,maxWidth:480,margin:'0 auto',lineHeight:1.6}}>
              {!search && statusFilter==='active'
                ? '상단 [+ 지연 상품 추가] 버튼으로 신규 등록할 수 있습니다.'
                : !search && statusFilter==='released'
                ? '해제된 지연 이력이 없습니다.'
                : '다른 조건으로 검색해보세요.'}
            </div>
          </div>
        ) : (
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:'17%'}}/><col style={{width:'21%'}}/><col style={{width:'12%'}}/>
              <col style={{width:'14%'}}/><col style={{width:'8%'}}/><col style={{width:'7%'}}/>
              <col style={{width:'7%'}}/><col style={{width:'5%'}}/><col style={{width:'9%'}}/>
            </colgroup>
            <thead>
              <tr style={{background:'var(--bg)',color:'var(--sub)'}}>
                <th style={{textAlign:'left',padding:'10px 14px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>상품명</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>옵션</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>공급사</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>사유</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>발송 대상 주문</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>예상발송</th>
                <th style={{textAlign:'left',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>해제일</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>상태</th>
                <th style={{textAlign:'center',padding:'10px 8px',fontSize:11,fontWeight:700,letterSpacing:'.04em',borderBottom:'1px solid var(--border)'}}>조작</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
                  <td style={{padding:'12px 14px'}}>
                    <div style={{fontWeight:500,color:'var(--text)'}}>{r.product_name_snapshot||'-'}</div>
                    <div style={{color:'var(--sub)',fontSize:10,fontFamily:'monospace',marginTop:2}}>{r.product_code}</div>
                  </td>
                  <td style={{padding:'12px 8px',color:'var(--text)',wordBreak:'break-all'}}>
                    {r.option_text_snapshot || <span style={{color:'var(--sub)',fontStyle:'italic'}}>단일 옵션</span>}
                  </td>
                  <td style={{padding:'12px 8px',color:'var(--text)'}}>{r.supplier_name_snapshot||'-'}</td>
                  <td style={{padding:'12px 8px',color:'var(--text)'}}>
                    <div>{r.delay_reason||'-'}</div>
                    {r.send_mode==='elapsed_days' ? (
                      <span style={{display:'inline-block',marginTop:4,fontSize:10,padding:'1px 6px',background:'rgba(246,173,9,.15)',color:'#F6AD09',borderRadius:3,fontWeight:600,whiteSpace:'nowrap'}}>주문일+{r.elapsed_days||'?'}일</span>
                    ) : r.initial_send_type==='blast' ? (
                      <span style={{display:'inline-block',marginTop:4,fontSize:10,padding:'1px 6px',background:'rgba(246,173,9,.15)',color:'#F6AD09',borderRadius:3,fontWeight:600,whiteSpace:'nowrap'}}>즉시발송</span>
                    ) : (
                      <span style={{display:'inline-block',marginTop:4,fontSize:10,padding:'1px 6px',background:'rgba(143,168,208,.12)',color:'var(--sub)',borderRadius:3,fontWeight:600,whiteSpace:'nowrap'}}>신규주문</span>
                    )}
                  </td>
                  <td style={{padding:'12px 8px',color:'var(--text)'}}>
                    {(()=>{
                      const STATUS_LABEL = {N10:'상품준비중',N20:'배송준비중',N30:'배송중'};
                      if(r.send_mode==='elapsed_days'){
                        return (
                          <span style={{display:'inline-block',background:'rgba(143,168,208,.12)',color:'var(--text)',fontSize:10,padding:'2px 7px',borderRadius:3,fontWeight:600,whiteSpace:'nowrap',width:'fit-content'}}>
                            배송준비중
                          </span>
                        );
                      }
                      const arr = Array.isArray(r.target_order_statuses) ? r.target_order_statuses : [];
                      if(arr.length===0) return <span style={{color:'var(--sub)'}}>-</span>;
                      return (
                        <div style={{display:'flex',flexDirection:'column',gap:3}}>
                          {arr.map(code=>(
                            <span key={code} style={{display:'inline-block',background:'rgba(143,168,208,.12)',color:'var(--text)',fontSize:10,padding:'2px 7px',borderRadius:3,fontWeight:600,whiteSpace:'nowrap',width:'fit-content'}}>
                              {STATUS_LABEL[code]||code}
                            </span>
                          ))}
                        </div>
                      );
                    })()}
                  </td>
                  <td style={{padding:'12px 8px',color:'var(--text)',fontFamily:'monospace'}}>
                    {fmtDate(r.delay_eta_date)}
                  </td>
                  <td style={{padding:'12px 8px',color:'var(--text)',fontFamily:'monospace'}}>
                    {r.is_delayed
                      ? (r.scheduled_release_date ? fmtDate(r.scheduled_release_date) : <span style={{color:'var(--sub)'}}>-</span>)
                      : fmtDate(r.released_at)}
                  </td>
                  <td style={{padding:'12px 8px',textAlign:'center'}}>
                    {!r.is_delayed
                      ? <span style={{background:'rgba(143,168,208,.15)',color:'var(--sub)',fontSize:10,padding:'2px 8px',borderRadius:3,fontWeight:700,letterSpacing:'.04em'}}>해제</span>
                      : r.initial_send_type==='blast' && !r.blast_sent_at
                        ? <button onClick={()=>handleBlastClick(r)}
                            style={{background:'#F6AD09',border:'1px solid #F6AD09',padding:'4px 10px',fontSize:11,borderRadius:4,cursor:'pointer',color:'#fff',fontWeight:700,fontFamily:'inherit'}}>
                            발송하기
                          </button>
                        : <span style={{background:'rgba(246,173,9,.15)',color:'#F6AD09',fontSize:10,padding:'2px 8px',borderRadius:3,fontWeight:700,letterSpacing:'.04em'}}>진행</span>}
                  </td>
                  <td style={{padding:'12px 8px',textAlign:'center'}}>
                    <div style={{display:'inline-flex',gap:4,justifyContent:'center'}}>
                      <button onClick={()=>handleEditClick(r)}
                        style={{background:'transparent',border:'1px solid var(--border)',padding:'4px 10px',fontSize:11,borderRadius:4,cursor:'pointer',color:'var(--sub)',fontFamily:'inherit'}}>
                        편집
                      </button>
                      {r.is_delayed && (
                        <button onClick={()=>handleReleaseClick(r)}
                          style={{background:'rgba(34,211,160,.1)',border:'1px solid rgba(34,211,160,.4)',padding:'4px 10px',fontSize:11,borderRadius:4,cursor:'pointer',color:'#22d3a0',fontFamily:'inherit'}}>
                          해제
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {/* 페이지네이션 (rows 있을 때만) */}
        {!loading && rows.length > 0 && (
          <div style={{padding:'12px 16px',display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'center',fontSize:11,color:'var(--sub)',borderTop:'1px solid var(--border)'}}>
            <div style={{justifySelf:'start'}}>
              총 {total}건 중 {startIdx}-{endIdx}번째
            </div>
            <div style={{display:'flex',gap:4,alignItems:'center',fontFamily:'monospace'}}>
              <button disabled={page===0} onClick={()=>setPage(0)} style={delayPageBtn(page===0)}>«</button>
              <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={delayPageBtn(page===0)}>‹</button>
              <span style={{padding:'0 8px',color:'var(--text)'}}>{page+1} / {totalPages}</span>
              <button disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)} style={delayPageBtn(page>=totalPages-1)}>›</button>
              <button disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)} style={delayPageBtn(page>=totalPages-1)}>»</button>
            </div>
            <div/>
          </div>
        )}
      </div>

      {showAddModal && <DelayAddModal
        editingRow={editingRow}
        onClose={()=>{setShowAddModal(false); setEditingRow(null);}}
        onSaved={handleModalSaved}
      />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// DelayAddModal: 지연 상품 추가 모달 (Phase 6b-2)
// ─────────────────────────────────────────────────────────────────────────────
function DelayAddModal({ editingRow, onClose, onSaved }){
  const isEdit = !!editingRow;
  // ISO 시각을 "YYYY-MM-DD HH:MM" 로 포맷 (로컬 타임존)
  const fmtIso = (iso)=>{
    if(!iso) return '-';
    const d = new Date(iso);
    const pad = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  // 사유 옵션 (설계 문서 7항목 + 직접 입력)
  const REASONS = [
    '입고 지연',
    '순차출고 예약 상품',
    '해외 배송 상품',
    '일시 품절·입고 후 출고',
    '주문 폭주로 인한 순차출고',
    '기타(고객센터 문의)',
    '직접 입력',
  ];
  // 주문 상태 (N10 상품준비중 / N20 배송준비중 / N30 배송중)
  const ORDER_STATUS_OPTIONS = [
    { code:'N10', label:'N10 상품준비중' },
    { code:'N20', label:'N20 배송준비중' },
    { code:'N30', label:'N30 배송중'    },
  ];

  // 필드 1: 상품 검색
  const [productQuery,setProductQuery] = useState('');
  const [productResults,setProductResults] = useState([]);
  const [searchingProduct,setSearchingProduct] = useState(false);
  // 편집 모드: editingRow의 snapshot에서 가짜 selectedProduct 구성 (UI 표시용)
  const [selectedProduct,setSelectedProduct] = useState(isEdit ? {
    product_code: editingRow.product_code,
    product_name: editingRow.product_name_snapshot,
    supplier_name: editingRow.supplier_name_snapshot,
    product_url: null,  // 편집에선 variant 재조회 안 함
  } : null);
  const [activeIdx,setActiveIdx] = useState(-1);
  // 검색 결과 드롭다운 ref — 키보드 ↑↓ 시 활성 항목 자동 스크롤용
  const productResultsRef = useRef(null);
  useEffect(()=>{
    if(activeIdx < 0 || !productResultsRef.current) return;
    const wrap = productResultsRef.current;
    const el = wrap.querySelector(`[data-product-idx="${activeIdx}"]`);
    if(el && typeof el.scrollIntoView === 'function'){
      el.scrollIntoView({block:'nearest'});
    }
  },[activeIdx]);

  // 필드 2: 옵션 다중 선택
  const [variants,setVariants] = useState([]);
  const [loadingVariants,setLoadingVariants] = useState(false);
  const [variantError,setVariantError] = useState('');
  const [allVariants,setAllVariants] = useState(false);
  const [selectedVariantCodes,setSelectedVariantCodes] = useState(new Set());

  // 필드 3: 사유 — 편집 모드면 기존 사유에서 추출
  const initReason = (()=>{
    if(!isEdit) return { sel:'입고 지연', custom:'' };
    const REASONS_PREDEFINED = ['입고 지연','순차출고 예약 상품','해외 배송 상품','일시 품절·입고 후 출고','주문 폭주로 인한 순차출고','기타(고객센터 문의)'];
    const r = editingRow.delay_reason || '';
    if(REASONS_PREDEFINED.includes(r)) return { sel:r, custom:'' };
    return { sel:'직접 입력', custom:r };
  })();
  const [reasonSelect,setReasonSelect] = useState(initReason.sel);
  const [customReason,setCustomReason] = useState(initReason.custom);

  // 필드 4·5: 날짜
  const [etaDate,setEtaDate] = useState(isEdit ? (editingRow.delay_eta_date||'') : '');
  const [autoReleaseDate,setAutoReleaseDate] = useState(isEdit ? (editingRow.scheduled_release_date||'') : '');

  // 필드 6: 주문 상태 — 편집 모드면 target_order_statuses 배열에서 복원, 신규는 모두 미체크
  const initOrderStatuses = (()=>{
    if(!isEdit) return { N10:false, N20:false, N30:false };
    const arr = Array.isArray(editingRow.target_order_statuses) ? editingRow.target_order_statuses : [];
    return { N10:arr.includes('N10'), N20:arr.includes('N20'), N30:arr.includes('N30') };
  })();
  const [orderStatuses,setOrderStatuses] = useState(initOrderStatuses);

  // 필드 7: 처리 방향 (편집 모드에선 의미 없음 — 표시 안 함)
  const [sendType,setSendType] = useState('register_only');
  // 주문일+N일 경과 발송 모드의 N일 (elapsed_days일 때만 사용, 1~14)
  const [elapsedDays,setElapsedDays] = useState('3');

  // 즉시 발송 시 카페24 주문 조회 기간 (immediate일 때만 사용)
  const todayStr = new Date().toISOString().slice(0,10);
  const monthAgoStr = (()=>{ const d=new Date(); d.setDate(d.getDate()-30); return d.toISOString().slice(0,10); })();
  const [blastDateFrom,setBlastDateFrom] = useState(monthAgoStr);
  const [blastDateTo,setBlastDateTo] = useState(todayStr);

  // 필드 8: 메모
  const [notes,setNotes] = useState(isEdit ? (editingRow.notes||'') : '');

  // 저장 진행 상태
  const [saving,setSaving] = useState(false);

  // 상품 검색 — 300ms debounce
  useEffect(()=>{
    if(!productQuery.trim() || selectedProduct){
      setProductResults([]);
      return;
    }
    setSearchingProduct(true);
    const timer = setTimeout(async()=>{
      try {
        const term = productQuery.trim();
        const {data,error} = await sb.from('products')
          .select('product_code,product_name,supplier_name,product_url')
          .or(`product_code.ilike.%${term}%,product_name.ilike.%${term}%`)
          .limit(10);
        if(error) throw error;
        setProductResults(data||[]);
        setActiveIdx(-1);
      } catch(e) {
        console.error('상품 검색 실패:',e);
        setProductResults([]);
      } finally {
        setSearchingProduct(false);
      }
    },300);
    return ()=>clearTimeout(timer);
  },[productQuery,selectedProduct]);

  // product_url 에서 product_no 추출
  const extractProductNo = (url)=>{
    const m = String(url||'').match(/product_no=(\d+)/);
    return m ? m[1] : null;
  };

  // 상품 선택 → Edge Function 호출하여 variants 조회
  const handleSelectProduct = async (p)=>{
    setSelectedProduct(p);
    setProductResults([]);
    setProductQuery(p.product_name);
    setAllVariants(false);
    setSelectedVariantCodes(new Set());
    setVariants([]);
    setVariantError('');

    const productNo = extractProductNo(p.product_url);
    if(!productNo){
      setVariantError(`이 상품의 product_url에서 product_no를 추출할 수 없습니다. URL: ${p.product_url||'(없음)'}\n"전체 옵션"으로만 등록 가능합니다.`);
      setAllVariants(true);
      return;
    }

    setLoadingVariants(true);
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/notify-fetch-variants`,{
        method:'POST',
        headers:{
          'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,
          'apikey':SUPABASE_ANON_KEY,
          'Content-Type':'application/json',
        },
        body: JSON.stringify({ product_no: productNo }),
      });
      const data = await res.json();
      if(!res.ok){
        setVariantError(`옵션 조회 실패 (${res.status}): ${data?.error||'알 수 없는 오류'}\n${data?.detail||''}`);
        return;
      }
      const list = data.variants||[];
      // 정렬: 진열함+판매함 → 진열함+판매안함 → 진열안함+판매함 → 진열안함+판매안함
      // (display=1, selling=2: 더 큰 가중치가 우선)
      const sorted = [...list].sort((a,b)=>{
        const sa = (a.is_displayed?2:0) + (a.is_selling?1:0);
        const sb = (b.is_displayed?2:0) + (b.is_selling?1:0);
        if(sa !== sb) return sb - sa;
        // 같은 상태 그룹 내에서는 variant_code 순
        return String(a.variant_code).localeCompare(String(b.variant_code));
      });
      setVariants(sorted);
      if(sorted.length===0){
        setVariantError('옵션이 없는 단일 상품입니다. "전체 옵션"으로 자동 선택됩니다.');
        setAllVariants(true);
      }
    } catch(e){
      console.error('Edge Function 호출 실패:',e);
      setVariantError('옵션 조회 중 네트워크 오류: '+e.message);
    } finally {
      setLoadingVariants(false);
    }
  };

  // 상품 선택 해제
  const clearProduct = ()=>{
    setSelectedProduct(null);
    setProductQuery('');
    setVariants([]);
    setVariantError('');
    setAllVariants(false);
    setSelectedVariantCodes(new Set());
  };

  // 옵션 체크박스 토글
  const toggleVariant = (vc)=>{
    setSelectedVariantCodes(prev=>{
      const n = new Set(prev);
      if(n.has(vc)) n.delete(vc); else n.add(vc);
      return n;
    });
  };

  // 저장
  const handleSave = async()=>{
    // 검증
    if(!selectedProduct){ alert('상품을 선택해주세요'); return; }

    const reasonText = reasonSelect==='직접 입력' ? customReason.trim() : reasonSelect;
    if(!reasonText){ alert('사유를 입력해주세요'); return; }

    if(!etaDate){ alert('예상 발송일을 선택해주세요'); return; }

    const orderStatusList = ORDER_STATUS_OPTIONS
      .filter(o=>orderStatuses[o.code])
      .map(o=>o.code);
    // 주문일+N일 방식은 N20 고정이라 주문상태 체크박스 검증 skip
    if(!(!isEdit && sendType==='elapsed_days') && orderStatusList.length===0){
      alert('주문 상태를 1개 이상 선택해주세요'); return;
    }

    // 신규 등록 모드에서만 옵션 검증
    if(!isEdit && !allVariants && variants.length>0 && selectedVariantCodes.size===0){
      alert('옵션을 1개 이상 선택하거나 "전체 옵션"을 선택해주세요'); return;
    }

    // 즉시 발송 선택 시 조회 기간 검증
    if(!isEdit && sendType==='immediate'){
      if(!blastDateFrom || !blastDateTo){
        alert('발송 대상 주문의 시작일과 종료일을 선택해주세요'); return;
      }
      if(blastDateFrom > blastDateTo){
        alert('시작일은 종료일보다 빨라야 합니다'); return;
      }
    }

    // 주문일+N일 경과 발송 선택 시 N일 검증
    let elapsedDaysNum = null;
    if(!isEdit && sendType==='elapsed_days'){
      elapsedDaysNum = parseInt(elapsedDays,10);
      if(!Number.isInteger(elapsedDaysNum) || elapsedDaysNum<1 || elapsedDaysNum>14){
        alert('경과 일수(N)는 1~14 사이 숫자로 입력해주세요'); return;
      }
    }

    setSaving(true);
    try {
      const {data:authData} = await sb.auth.getUser();
      const userEmail = authData?.user?.email || 'unknown';

      if(isEdit){
        // ─── 편집 모드: UPDATE 1행 (변경 가능한 필드만) ───
        const {error} = await sb.from('delayed_options')
          .update({
            delay_reason: reasonText,
            delay_eta_date: etaDate,
            notes: notes.trim()||null,
            target_order_statuses: orderStatusList,
            scheduled_release_date: autoReleaseDate||null,
            updated_at: new Date().toISOString(),
            updated_by: userEmail,
          })
          .eq('id', editingRow.id);
        if(error) throw error;
        alert('수정 완료');
      } else {
        // ─── 신규 등록 모드: INSERT (옵션마다 1행) ───
        const rows = (allVariants || variants.length===0)
          ? [{ variant_code:null, option_text:'단일 옵션' }]
          : Array.from(selectedVariantCodes).map(vc=>{
              const v = variants.find(x=>x.variant_code===vc);
              return { variant_code:vc, option_text: v?.option_text||'단일 옵션' };
            });

        const nowIso = new Date().toISOString();
        const inserts = rows.map(r=>({
          product_code: selectedProduct.product_code,
          variant_code: r.variant_code,
          product_name_snapshot: selectedProduct.product_name,
          option_text_snapshot: r.option_text,
          supplier_name_snapshot: selectedProduct.supplier_name||null,
          is_delayed: true,
          delay_reason: reasonText,
          delay_eta_date: etaDate,
          notes: notes.trim()||null,
          target_order_statuses: orderStatusList,
          initial_send_type: sendType==='immediate' ? 'blast' : 'new_only',
          initial_date_from: sendType==='immediate' ? blastDateFrom : null,
          initial_date_to:   sendType==='immediate' ? blastDateTo : null,
          send_mode: sendType,
          elapsed_days: sendType==='elapsed_days' ? elapsedDaysNum : null,
          scheduled_release_date: autoReleaseDate||null,
          delayed_at: nowIso,
          delayed_by: userEmail,
        }));

        const {error} = await sb.from('delayed_options').insert(inserts);
        if(error) throw error;

        if(sendType==='immediate'){
          alert(`등록 완료 (${inserts.length}건).\n\n테이블에서 해당 행의 "발송하기" 버튼을 클릭하면\n${blastDateFrom} ~ ${blastDateTo} 기간 내 주문에 알림톡이 발송됩니다.`);
        } else if(sendType==='elapsed_days'){
          alert(`등록 완료 (${inserts.length}건).\n\n주문일로부터 ${elapsedDaysNum}일이 경과했고 아직 배송준비중인 주문에\n자동으로 알림톡이 발송됩니다. (매시간 자동 확인)`);
        } else {
          alert(`등록 완료 (${inserts.length}건).`);
        }
      }

      onSaved?.();
      onClose();
    } catch(e){
      console.error('저장 실패:',e);
      alert('저장 실패: '+(e?.message||e));
    } finally {
      setSaving(false);
    }
  };

  // 공통 스타일
  const labelStyle = {fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:6,display:'block',letterSpacing:'.02em'};
  const fieldStyle = {marginBottom:18};
  const inputStyle = {width:'100%',padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};

  return (
    <div onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }} style={{position:'fixed',top:0,left:0,width:'100vw',height:'100vh',background:'rgba(0,0,0,.7)',zIndex:1900,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,width:1100,maxWidth:'94vw',maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* 헤더 */}
        <div style={{padding:'16px 22px',background:'#162244',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>🚚 {isEdit?'지연 정보 편집':'지연 상품 추가'}</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:3}}>
              {isEdit?'사유·날짜·주문상태·메모만 수정 가능합니다. 상품·옵션 변경 시 해제 후 새로 등록해주세요.':'상품·옵션을 선택하고 사유·예상 발송일을 입력하세요'}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--sub)',fontSize:20,cursor:'pointer'}}>✕</button>
        </div>

        {/* 본문: 좌측 폼 + 우측 알림톡 미리보기 (1100px 이하에서는 세로 스택) */}
        <div style={{flex:1,overflowY:'auto',padding:'20px 22px',display:'grid',gridTemplateColumns:'minmax(0,1fr) 320px',gap:24,alignContent:'start'}} className="delay-modal-body">
          <div style={{minWidth:0}}>
          {/* 필드 1: 상품 검색 */}
          <div style={fieldStyle}>
            <label style={labelStyle}>상품 <span style={{color:'#f87171'}}>*</span></label>
            {selectedProduct ? (
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(34,211,160,.08)',border:'1px solid rgba(34,211,160,.4)',borderRadius:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selectedProduct.product_name}</div>
                  <div style={{fontSize:11,color:'var(--sub)',marginTop:3}}>{selectedProduct.product_code} · {selectedProduct.supplier_name||'공급사 미지정'}</div>
                </div>
                {!isEdit && (
                  <button onClick={clearProduct} style={{padding:'6px 12px',background:'transparent',border:'1px solid var(--border)',borderRadius:5,color:'var(--sub)',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>변경</button>
                )}
              </div>
            ) : (
              <div style={{position:'relative'}}>
                <input type="text" value={productQuery}
                  onChange={e=>setProductQuery(e.target.value)}
                  onKeyDown={e=>{
                    if(productResults.length===0) return;
                    if(e.key==='ArrowDown'){
                      e.preventDefault();
                      setActiveIdx(i=>Math.min(productResults.length-1, i+1));
                    } else if(e.key==='ArrowUp'){
                      e.preventDefault();
                      setActiveIdx(i=>Math.max(0, i-1));
                    } else if(e.key==='Enter'){
                      e.preventDefault();
                      const idx = activeIdx>=0 ? activeIdx : 0;
                      if(productResults[idx]) handleSelectProduct(productResults[idx]);
                    } else if(e.key==='Escape'){
                      setProductResults([]);
                      setActiveIdx(-1);
                    }
                  }}
                  placeholder="상품명 또는 상품코드 검색 (↑↓ 선택, Enter 확정)"
                  style={inputStyle}/>
                {(productResults.length>0 || searchingProduct) && (
                  <div ref={productResultsRef} style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,maxHeight:240,overflowY:'auto',zIndex:10,boxShadow:'0 4px 12px rgba(0,0,0,.4)'}}>
                    {searchingProduct ? (
                      <div style={{padding:'12px 14px',fontSize:12,color:'var(--sub)'}}>🔍 검색 중...</div>
                    ) : productResults.map((p,idx)=>{
                      const isActive = idx===activeIdx;
                      return (
                        <div key={p.product_code}
                          data-product-idx={idx}
                          onClick={()=>handleSelectProduct(p)}
                          onMouseEnter={()=>setActiveIdx(idx)}
                          style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',transition:'background .1s',background:isActive?'var(--hover)':'transparent'}}>
                          <div style={{fontSize:13,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.product_name}</div>
                          <div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>{p.product_code} · {p.supplier_name||'공급사 미지정'}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* 필드 2: 옵션 — 신규는 다중 선택, 편집은 read-only 표시 */}
          {selectedProduct && isEdit ? (
            <div style={fieldStyle}>
              <label style={labelStyle}>옵션</label>
              <div style={{padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,fontSize:13,color:'var(--text)'}}>
                {editingRow.variant_code
                  ? <><span style={{fontFamily:'monospace',color:'var(--sub)',marginRight:8}}>{editingRow.variant_code}</span>{editingRow.option_text_snapshot||'단일 옵션'}</>
                  : <span>전체 옵션 <span style={{fontSize:11,color:'var(--sub)',marginLeft:6}}>(옵션 구분 없이 적용)</span></span>}
              </div>
            </div>
          ) : selectedProduct && (
            <div style={fieldStyle}>
              <label style={labelStyle}>옵션</label>
              {loadingVariants ? (
                <div style={{padding:'12px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,color:'var(--sub)'}}>⏳ 카페24에서 옵션 조회 중...</div>
              ) : (
                <>
                  {variantError && <div style={{padding:'10px 14px',background:'rgba(246,173,9,.1)',border:'1px solid rgba(246,173,9,.4)',borderRadius:6,fontSize:11,color:'#F6AD09',marginBottom:8,whiteSpace:'pre-wrap'}}>{variantError}</div>}
                  <div style={{padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6}}>
                    <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'4px 0',fontSize:13,color:'var(--text)',fontWeight:600}}>
                      <input type="checkbox" checked={allVariants} onChange={e=>setAllVariants(e.target.checked)}/>
                      전체 옵션 <span style={{fontSize:11,color:'var(--sub)',fontWeight:400,marginLeft:6}}>(옵션 구분 없이 적용)</span>
                    </label>
                    {variants.length>0 && (
                      <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',maxHeight:240,overflowY:'auto'}}>
                        {variants.map(v=>{
                          // 뱃지 스타일 헬퍼
                          const badgeOn  = {fontSize:10,padding:'1px 6px',background:'rgba(34,211,160,.15)',color:'#22d3a0',borderRadius:3,whiteSpace:'nowrap'};
                          const badgeOff = (color)=>({fontSize:10,padding:'1px 6px',background:`rgba(${color},.15)`,color:`rgb(${color})`,borderRadius:3,whiteSpace:'nowrap'});
                          return (
                            <label key={v.variant_code}
                              style={{display:'grid',gridTemplateColumns:'20px 110px 1fr 64px 64px',alignItems:'center',gap:6,padding:'4px 0',fontSize:12,color:allVariants?'var(--sub)':'var(--text)',cursor:allVariants?'not-allowed':'pointer',opacity:allVariants?.5:1}}>
                              <input type="checkbox"
                                checked={selectedVariantCodes.has(v.variant_code)}
                                disabled={allVariants}
                                onChange={()=>toggleVariant(v.variant_code)}/>
                              <span style={{fontFamily:'monospace',fontSize:11,color:'var(--sub)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={v.variant_code}>{v.variant_code}</span>
                              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}} title={v.option_text}>{v.option_text}</span>
                              <span style={v.is_displayed?badgeOn:badgeOff('143,168,208')}>
                                {v.is_displayed?'진열함':'진열안함'}
                              </span>
                              <span style={v.is_selling?badgeOn:badgeOff('248,113,113')}>
                                {v.is_selling?'판매함':'판매안함'}
                              </span>
                            </label>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
          )}

          {/* 필드 3: 사유 */}
          <div style={fieldStyle}>
            <label style={labelStyle}>사유 <span style={{color:'#f87171'}}>*</span></label>
            <select value={reasonSelect} onChange={e=>setReasonSelect(e.target.value)} style={inputStyle}>
              {REASONS.map(r=><option key={r} value={r}>{r}</option>)}
            </select>
            {reasonSelect==='직접 입력' && (
              <input type="text" value={customReason} onChange={e=>setCustomReason(e.target.value.slice(0,200))}
                placeholder="사유 직접 입력 (최대 200자)" style={{...inputStyle,marginTop:8}}/>
            )}
          </div>

          {/* 필드 4·5: 날짜 (2단 그리드) */}
          <div style={{...fieldStyle,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label style={labelStyle}>예상 발송일 <span style={{color:'#f87171'}}>*</span></label>
              <input type="date" value={etaDate} onChange={e=>setEtaDate(e.target.value)} style={inputStyle}/>
            </div>
            <div>
              <label style={labelStyle}>자동 해제일 <span style={{fontSize:10,color:'var(--sub)',fontWeight:400}}>(선택)</span></label>
              <input type="date" value={autoReleaseDate} onChange={e=>setAutoReleaseDate(e.target.value)} style={inputStyle}/>
            </div>
          </div>

          {/* 필드 6: 주문 상태 — 주문일+N일 방식은 N20 고정이라 숨김 */}
          {!(!isEdit && sendType==='elapsed_days') && (
            <div style={fieldStyle}>
              <label style={labelStyle}>알림톡 발송 대상 주문 상태 <span style={{color:'#f87171'}}>*</span></label>
              <div style={{display:'flex',gap:14,padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,flexWrap:'wrap'}}>
                {ORDER_STATUS_OPTIONS.map(o=>(
                  <label key={o.code} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color:'var(--text)'}}>
                    <input type="checkbox"
                      checked={orderStatuses[o.code]}
                      onChange={e=>setOrderStatuses(s=>({...s,[o.code]:e.target.checked}))}/>
                    {o.label}
                  </label>
                ))}
              </div>

          )}

          {/* 필드 7: 처리 방향 — 신규는 선택, 편집은 read-only 표시 */}
          {!isEdit ? (
            <>
              <div style={fieldStyle}>
                <label style={labelStyle}>처리 방향</label>
                <div style={{display:'flex',gap:14,padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,flexWrap:'wrap'}}>
                  <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color:'var(--text)'}}>
                    <input type="radio" name="sendType" value="register_only" checked={sendType==='register_only'} onChange={()=>setSendType('register_only')}/>
